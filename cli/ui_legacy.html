    function ProjectSwitcher({ registry }) {
      const [open, setOpen] = useState(false);
      const ref = React.useRef(null);
      const myPort = parseInt(window.location.port) || 3333;

      useEffect(() => {
        if (!open) return;
        const handler = (e) => { if (ref.current && !ref.current.contains(e.target)) setOpen(false); };
        document.addEventListener("mousedown", handler);
        return () => document.removeEventListener("mousedown", handler);
      }, [open]);

      // Derive a display name from registry entry — fallback chain:
      // 1. project_name field  2. last segment of project_path  3. "Unknown"
      const entryName = (e) => {
        if (e.project_name && e.project_name.trim()) return e.project_name.trim();
        if (e.project_path) {
          const parts = e.project_path.replace(/\\/g, "/").split("/").filter(Boolean);
          return parts[parts.length - 1] || e.project_path;
        }
        return "Unknown";
      };

      // Compact path: show last 2 segments of project_path
      const shortPath = (e) => {
        if (!e.project_path) return `port ${e.port}`;
        const parts = e.project_path.replace(/\\/g, "/").split("/").filter(Boolean);
        const tail = parts.slice(-2).join("/");
        return tail || e.project_path;
      };

      const others = (registry || []).filter(e => e.port !== myPort);
      if (others.length === 0) return null;

      const current = (registry || []).find(e => e.port === myPort);
      const label = current ? entryName(current) : "This project";

      return (
        <div ref={ref} style={{ position: "relative", flexShrink: 0 }}>
          <button onClick={() => setOpen(o => !o)}
            style={{
              display: "flex", alignItems: "center", gap: 5, padding: "4px 10px",
              borderRadius: 6, border: `1px solid ${T.border}`, background: open ? T.surfaceAlt : "transparent",
              cursor: "pointer", color: T.text, fontSize: 12, fontWeight: 500,
              transition: "all 0.15s", fontFamily: "'DM Sans', sans-serif"
            }}
            onMouseEnter={e => { if (!open) e.currentTarget.style.background = T.surfaceAlt; }}
            onMouseLeave={e => { if (!open) e.currentTarget.style.background = "transparent"; }}>
            <I name="layers" size={12} color={T.accent} />
            <span style={{ maxWidth: 140, overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }}>{label}</span>
            <span className="mono" style={{ fontSize: 9, color: T.textDim, background: `${T.accent}18`, padding: "1px 4px", borderRadius: 3 }}>{others.length + 1}</span>
            <I name="chevron" size={10} color={T.textMuted} style={{ transform: open ? "rotate(90deg)" : "rotate(0deg)", transition: "transform 0.15s" }} />
          </button>
          {open && (
            <div style={{
              position: "absolute", top: "calc(100% + 6px)", right: 0,
              background: T.surface, border: `1px solid ${T.border}`, borderRadius: 8,
              boxShadow: "0 8px 24px rgba(0,0,0,0.4)", minWidth: 260, zIndex: 1000, overflow: "hidden"
            }}>
              {/* Current */}
              <div style={{
                padding: "8px 12px 4px", fontSize: 9, fontWeight: 700, color: T.textDim,
                textTransform: "uppercase", letterSpacing: 1
              }}>Current</div>
              <div style={{
                padding: "6px 12px 6px", display: "flex", alignItems: "center", gap: 8,
                background: `${T.accent}10`, borderBottom: `1px solid ${T.border}`
              }}>
                <GlowDot color={T.accent} size={5} />
                <div style={{ flex: 1, minWidth: 0 }}>
                  <div style={{
                    fontSize: 12, fontWeight: 600, color: T.text,
                    overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap"
                  }}>{label}</div>
                  <div className="mono" style={{
                    fontSize: 9, color: T.textDim, marginTop: 1,
                    overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap"
                  }}
                    title={current?.project_path || ""}>
                    {current ? shortPath(current) : ""} <span style={{ opacity: 0.6 }}>:{myPort}</span>
                  </div>
                </div>
              </div>
              {/* Others */}
              <div style={{
                padding: "8px 12px 4px", fontSize: 9, fontWeight: 700, color: T.textDim,
                textTransform: "uppercase", letterSpacing: 1
              }}>Switch to</div>
              {others.map(e => (
                <a key={e.port} href={`http://localhost:${e.port}`}
                  style={{
                    display: "flex", alignItems: "center", gap: 8, padding: "7px 12px",
                    textDecoration: "none", transition: "background 0.1s", cursor: "pointer"
                  }}
                  onMouseEnter={ev => { ev.currentTarget.style.background = T.surfaceAlt; }}
                  onMouseLeave={ev => { ev.currentTarget.style.background = "transparent"; }}>
                  <GlowDot color={T.blue} size={5} />
                  <div style={{ flex: 1, minWidth: 0 }}>
                    <div style={{
                      fontSize: 12, fontWeight: 500, color: T.text,
                      overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap"
                    }}>{entryName(e)}</div>
                    <div className="mono" style={{
                      fontSize: 9, color: T.textDim, marginTop: 1,
                      overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap"
                    }}
                      title={e.project_path || ""}>
                      {shortPath(e)} <span style={{ opacity: 0.6 }}>:{e.port}</span>
                    </div>
                  </div>
                  <I name="external" size={10} color={T.textDim} />
                </a>
              ))}
              <div style={{ height: 4 }} />
            </div>
          )}
        </div>
      );
    }

    function App() {
      const [tab, setTab] = useState("dashboard");
      const [darkMode, setDarkMode] = useState(() => localStorage.getItem('c3-theme') !== 'light');
      const [conversationUiState, setConversationUiState] = useState(() => {
        try {
          return JSON.parse(localStorage.getItem('c3-conversations-ui') || '{}');
        } catch {
          return {};
        }
      });

      // Sync global T before children render
      T = darkMode ? DARK : LIGHT;

      useEffect(() => {
        localStorage.setItem('c3-theme', darkMode ? 'dark' : 'light');
        document.body.style.background = T.bg;
        document.body.style.color = T.text;
        // Update scrollbar colors
        let styleEl = document.getElementById('c3-scrollbar-style');
        if (!styleEl) { styleEl = document.createElement('style'); styleEl.id = 'c3-scrollbar-style'; document.head.appendChild(styleEl); }
        styleEl.textContent = `::-webkit-scrollbar-thumb { background: ${T.border} !important; } ::-webkit-scrollbar-thumb:hover { background: ${T.borderHover} !important; }`;
      }, [darkMode]);

      useEffect(() => {
        localStorage.setItem('c3-conversations-ui', JSON.stringify(conversationUiState || {}));
      }, [conversationUiState]);

      const toggleTheme = useCallback(() => setDarkMode(d => !d), []);

      const [stats, setStats] = useState(null);
      const [files, setFiles] = useState([]);
      const [loading, setLoading] = useState(true);
      const [sidebarPinned, setSidebarPinned] = useState(() => localStorage.getItem('c3-sidebar-pinned') !== 'false');
      const [rightBarPinned, setRightBarPinned] = useState(() => localStorage.getItem('c3-rightbar-pinned') !== 'false');
      const [sidebarHover, setSidebarHover] = useState(false);
      const [rightBarHover, setRightBarHover] = useState(false);
      const sidebarOpen = sidebarPinned || sidebarHover;
      const rightBarOpen = rightBarPinned || rightBarHover;
      const toggleSidebarPin = useCallback(() => {
        setSidebarPinned(p => { const n = !p; localStorage.setItem('c3-sidebar-pinned', String(n)); return n; });
      }, []);
      const toggleRightBarPin = useCallback(() => {
        setRightBarPinned(p => { const n = !p; localStorage.setItem('c3-rightbar-pinned', String(n)); return n; });
      }, []);
      const [connected, setConnected] = useState(true);
      const [health, setHealth] = useState(null);
      const [healthChecking, setHealthChecking] = useState(false);
      const [actAutoRefresh, setActAutoRefresh] = useState(false);
      const [notifications, setNotifications] = useState([]);
      const [registry, setRegistry] = useState([]);
      const [showShutdownConfirm, setShowShutdownConfirm] = useState(false);
      const [shutdownBusy, setShutdownBusy] = useState(false);
      const [shutdownForceTerminal, setShutdownForceTerminal] = useState(false);

      const loadRegistry = useCallback(async () => {
        try { const r = await api.get('/api/registry'); setRegistry(r); } catch (e) { }
      }, []);

      const loadNotifications = useCallback(async () => {
        try { const n = await api.get('/api/notifications?limit=50'); setNotifications(n); } catch (e) { }
      }, []);

      const ackNotification = useCallback(async (id) => {
        try { await api.post('/api/notifications/ack', { id }); setNotifications(prev => prev.filter(x => x.id !== id)); } catch (e) { }
      }, []);

      const ackAllNotifications = useCallback(async () => {
        try { await api.post('/api/notifications/ack-all'); setNotifications([]); } catch (e) { }
      }, []);

      const loadHealth = useCallback(async () => {
        setHealthChecking(true);
        try { const h = await api.get('/api/health'); setHealth(h); } catch (e) { }
        setHealthChecking(false);
      }, []);

      const shutdownC3 = useCallback(() => {
        setShowShutdownConfirm(true);
      }, []);

      const confirmShutdownC3 = useCallback(async (forceTerminalClose = false) => {
        setShutdownBusy(true);
        setShutdownForceTerminal(!!forceTerminalClose);
        try { await api.post('/api/shutdown', { force_close_terminal: !!forceTerminalClose }); } catch (e) { }
        setConnected(false);
        setTimeout(() => {
          try { window.close(); } catch (_e) { }
          window.location.href = 'about:blank';
        }, 450);
      }, []);

      const cancelShutdownC3 = useCallback(() => {
        if (shutdownBusy) return;
        setShowShutdownConfirm(false);
        setShutdownForceTerminal(false);
      }, []);

      useEffect(() => {
        const load = async () => {
          try {
            const [s, f] = await Promise.all([api.get('/api/stats'), api.get('/api/files')]);
            setStats(s); setFiles(f); setConnected(true);
          } catch (e) { setConnected(false); }
          setLoading(false);
        };
        load(); loadHealth(); loadNotifications(); loadRegistry();
        const iv = setInterval(load, 30000);
        const hv = setInterval(loadHealth, 15000);
        const nv = setInterval(loadNotifications, 10000);
        const rv = setInterval(loadRegistry, 30000);
        return () => { clearInterval(iv); clearInterval(hv); clearInterval(nv); clearInterval(rv); };
      }, [loadNotifications, loadHealth, loadRegistry]);

      const renderPanel = () => {
        switch (tab) {
          case "dashboard": return <Dashboard stats={stats} loading={loading} notifications={notifications} ackNotification={ackNotification} ackAllNotifications={ackAllNotifications} />;
          case "compress": return <Compressor files={files} />;
          case "index": return <SmartIndex />;
          case "sessions": return <Sessions />;
          case "memory": return <Memory />;
          case "activity": return <ActivityLog autoRefresh={actAutoRefresh} setAutoRefresh={setActAutoRefresh} />;
          case "conversations": return <ConversationsTab persistedState={conversationUiState} onPersistState={setConversationUiState} />;
          case "hybrid": return <HybridTab />;
          case "agents": return <AgentsTab />;
          case "proxy": return <ProxyTab />;
          case "settings": return <Settings stats={stats} />;
        }
      };

      return (
        <div style={{ display: "flex", height: "100vh", width: "100vw", background: T.bg, overflow: "hidden" }}>
          {/* Sidebar */}
          <div style={{
            width: sidebarOpen ? 210 : 54, flexShrink: 0, background: T.surface, borderRight: `1px solid ${T.border}`,
            display: "flex", flexDirection: "column", transition: "width 0.25s ease", overflow: "hidden"
          }}
            onMouseEnter={() => setSidebarHover(true)}
            onMouseLeave={() => setSidebarHover(false)}>
            <div style={{
              padding: sidebarOpen ? "16px 14px" : "16px 10px", borderBottom: `1px solid ${T.border}`,
              display: "flex", alignItems: "center", gap: 10
            }}>
              <div style={{
                width: 32, height: 32, borderRadius: 8, background: `${T.accent}18`, border: `1px solid ${T.accent}40`,
                display: "flex", alignItems: "center", justifyContent: "center", flexShrink: 0
              }}>
                <I name="terminal" size={16} color={T.accent} />
              </div>
              {sidebarOpen && (
                <>
                  <div>
                    <div style={{ fontSize: 15, fontWeight: 700, color: T.text, letterSpacing: -0.5, lineHeight: 1 }}>
                      C<span style={{ color: T.accent }}>3</span>
                    </div>
                    <div style={{ fontSize: 9, color: T.textMuted, textTransform: "uppercase", letterSpacing: 1.5, marginTop: 2 }}>Context Control</div>
                  </div>
                  <button onClick={toggleSidebarPin} title={sidebarPinned ? "Unpin sidebar" : "Pin sidebar open"}
                    style={{
                      marginLeft: "auto", width: 22, height: 22, borderRadius: 4, border: "none",
                      background: "transparent", cursor: "pointer", display: "flex", alignItems: "center",
                      justifyContent: "center", flexShrink: 0
                    }}>
                    <I name="pin" size={12} color={sidebarPinned ? T.accent : T.textDim} />
                  </button>
                </>
              )}
            </div>

            <nav style={{ padding: "8px 6px", flex: 1, display: "flex", flexDirection: "column", gap: 2 }}>
              {tabs.map(t => {
                const active = tab === t.id;
                return (
                  <button key={t.id} onClick={() => setTab(t.id)}
                    style={{
                      display: "flex", alignItems: "center", gap: 10, width: "100%",
                      padding: sidebarOpen ? "9px 12px" : "9px 0", justifyContent: sidebarOpen ? "flex-start" : "center",
                      borderRadius: 6, border: "none", cursor: "pointer",
                      background: active ? T.accentDim : "transparent", color: active ? T.accent : T.textMuted,
                      fontSize: 13, fontWeight: active ? 600 : 400, transition: "all 0.15s", position: "relative"
                    }}>
                    {active && <div style={{ position: "absolute", left: 0, top: "20%", bottom: "20%", width: 3, borderRadius: "0 2px 2px 0", background: T.accent }} />}
                    <I name={t.icon} size={16} />
                    {sidebarOpen && <span>{t.label}</span>}
                  </button>
                );
              })}
            </nav>

            {sidebarOpen && (
              <div style={{ padding: "10px 14px", borderTop: `1px solid ${T.border}`, fontSize: 10, color: T.textDim }}>
                <div style={{ display: "flex", alignItems: "center", gap: 6, marginBottom: 4 }}>
                  <GlowDot color={connected ? T.accent : T.error} size={5} />
                  <span style={{ color: T.textMuted }}>{connected ? "Connected" : "Disconnected"}</span>
                  {health?.session && (
                    <span className="mono" style={{ marginLeft: "auto", color: T.textDim, fontSize: 9 }}>
                      {health.session.tool_calls} calls
                    </span>
                  )}
                  <button onClick={loadHealth} disabled={healthChecking} title="Check connections"
                    style={{
                      marginLeft: health?.session ? 0 : "auto", padding: "1px 4px", borderRadius: 3,
                      border: `1px solid ${T.border}`, background: "transparent",
                      cursor: healthChecking ? "default" : "pointer", display: "flex", alignItems: "center",
                      opacity: healthChecking ? 0.5 : 1
                    }}>
                    <I name="refresh" size={9} color={T.textDim}
                      style={healthChecking ? { animation: "spin 0.6s linear infinite" } : {}} />
                  </button>
                </div>
                {health?.sources && (
                  <div style={{ display: "flex", gap: 4, flexWrap: "wrap", marginBottom: 3 }}>
                    {Object.entries(health.sources).map(([name, ok]) => (
                      <span key={name} style={{
                        padding: "1px 5px", borderRadius: 3, fontSize: 9, fontFamily: "'JetBrains Mono', monospace",
                        background: ok ? `${T.accent}18` : `${T.error}18`,
                        color: ok ? T.accent : T.error,
                        border: `1px solid ${ok ? T.accent : T.error}30`,
                      }}>{name}</span>
                    ))}
                  </div>
                )}
                <div className="mono" style={{ fontSize: 9, color: T.textDim, marginTop: 2, opacity: 0.7 }}>
                  build {BUILD_TIME}
                </div>
              </div>
            )}
          </div>

          {/* Main */}
          <div style={{ flex: 1, display: "flex", flexDirection: "column", overflow: "hidden" }}>
            <div style={{
              padding: "0 24px", height: 52, borderBottom: `1px solid ${T.border}`,
              display: "flex", alignItems: "center", gap: 16,
              background: `linear-gradient(180deg, ${T.surface} 0%, ${T.bg}88 100%)`
            }}>
              {/* Tab icon + title */}
              <div style={{ display: "flex", alignItems: "center", gap: 10 }}>
                <div style={{
                  width: 30, height: 30, borderRadius: 7,
                  background: `${(tabs.find(t => t.id === tab)?.id === "dashboard" ? T.accent : T.blue)}12`,
                  border: `1px solid ${(tabs.find(t => t.id === tab)?.id === "dashboard" ? T.accent : T.blue)}25`,
                  display: "flex", alignItems: "center", justifyContent: "center"
                }}>
                  <I name={tabs.find(t => t.id === tab)?.icon || "gauge"} size={14}
                    color={tabs.find(t => t.id === tab)?.id === "dashboard" ? T.accent : T.blue} />
                </div>
                <h1 style={{ fontSize: 16, fontWeight: 700, color: T.text, letterSpacing: -0.3, margin: 0 }}>
                  {tabs.find(t => t.id === tab)?.label}
                </h1>
              </div>

              {/* Separator */}
              <div style={{ width: 1, height: 20, background: T.border, flexShrink: 0 }} />

              {/* Connection status */}
              <div style={{ display: "flex", alignItems: "center", gap: 6 }}>
                <GlowDot color={connected ? T.accent : T.error} size={5} />
                <span className="mono" style={{ fontSize: 10, color: connected ? T.textMuted : T.error }}>
                  {connected ? "Live" : "Offline"}
                </span>
                {health?.sources && (
                  <div style={{ display: "flex", gap: 3, marginLeft: 2 }}>
                    {Object.entries(health.sources).map(([name, ok]) => (
                      <span key={name} className="mono" style={{
                        padding: "1px 4px", borderRadius: 3, fontSize: 9,
                        background: ok ? `${T.accent}15` : `${T.error}15`,
                        color: ok ? T.accent : T.error,
                        border: `1px solid ${ok ? T.accent : T.error}25`,
                      }}>{name}</span>
                    ))}
                  </div>
                )}
                {health?.session && connected && (
                  <span className="mono" style={{ fontSize: 9, color: T.textDim, marginLeft: 2 }}>
                    {health.session.tool_calls} calls
                  </span>
                )}
                <button onClick={loadHealth} disabled={healthChecking} title="Check connections"
                  style={{
                    padding: "1px 4px", borderRadius: 3, border: `1px solid ${T.border}`,
                    background: "transparent", cursor: healthChecking ? "default" : "pointer",
                    display: "flex", alignItems: "center", opacity: healthChecking ? 0.5 : 1
                  }}>
                  <I name="refresh" size={9} color={T.textDim}
                    style={healthChecking ? { animation: "spin 0.6s linear infinite" } : {}} />
                </button>
              </div>

              {/* Spacer */}
              <div style={{ flex: 1 }} />

              {/* Project switcher */}
              <ProjectSwitcher registry={registry} />

              {/* Quick stats strip */}
              {stats && connected && (
                <div style={{ display: "flex", alignItems: "center", gap: 12 }}>
                  <div style={{ display: "flex", alignItems: "center", gap: 5 }}>
                    <I name="minimize" size={11} color={T.accent} />
                    <span className="mono" style={{ fontSize: 11, color: T.accent, fontWeight: 600 }}>
                      {stats.savings_pct}%
                    </span>
                    <span style={{ fontSize: 10, color: T.textDim }}>saved</span>
                  </div>
                  <div style={{ display: "flex", alignItems: "center", gap: 5 }}>
                    <I name="file" size={11} color={T.blue} />
                    <span className="mono" style={{ fontSize: 11, color: T.blue, fontWeight: 600 }}>
                      {stats.index?.files_indexed || 0}
                    </span>
                    <span style={{ fontSize: 10, color: T.textDim }}>files</span>
                  </div>
                </div>
              )}

              {/* Action buttons */}
              <div style={{ display: "flex", gap: 4, alignItems: "center" }}>
                {!connected && <Badge color={T.error}>API Offline</Badge>}

                <button onClick={async () => {
                  try {
                    const [s, f] = await Promise.all([api.get('/api/stats'), api.get('/api/files')]);
                    setStats(s); setFiles(f); setConnected(true);
                  } catch (e) { setConnected(false); }
                }} title="Refresh data"
                  style={{
                    width: 32, height: 32, borderRadius: 6, border: `1px solid ${T.border}`,
                    background: "transparent", cursor: "pointer",
                    display: "flex", alignItems: "center", justifyContent: "center",
                    transition: "all 0.15s"
                  }}
                  onMouseEnter={e => { e.currentTarget.style.background = T.surfaceAlt; e.currentTarget.style.borderColor = T.borderHover; }}
                  onMouseLeave={e => { e.currentTarget.style.background = "transparent"; e.currentTarget.style.borderColor = T.border; }}>
                  <I name="refresh" size={13} color={T.textMuted} />
                </button>

                <button onClick={toggleTheme} title={darkMode ? "Switch to light mode" : "Switch to dark mode"}
                  style={{
                    width: 32, height: 32, borderRadius: 6, border: `1px solid ${T.border}`,
                    background: "transparent", cursor: "pointer",
                    display: "flex", alignItems: "center", justifyContent: "center",
                    transition: "all 0.15s"
                  }}
                  onMouseEnter={e => { e.currentTarget.style.background = T.surfaceAlt; e.currentTarget.style.borderColor = T.borderHover; }}
                  onMouseLeave={e => { e.currentTarget.style.background = "transparent"; e.currentTarget.style.borderColor = T.border; }}>
                  <I name={darkMode ? "sun" : "moon"} size={13} color={T.textMuted} />
                </button>

                <button
                  onClick={async () => {
                    let url = "http://localhost:3330";
                    try {
                      const info = await api.get('/api/hub/info');
                      if (info?.url) url = info.url;
                    } catch (e) {}
                    window.location.href = url;
                  }}
                  title="Open Projects Hub"
                  style={{
                    height: 32, padding: "0 10px", borderRadius: 6, border: `1px solid ${T.accent}50`,
                    background: `${T.accent}14`, cursor: "pointer",
                    display: "flex", alignItems: "center", gap: 5,
                    transition: "all 0.15s"
                  }}
                  onMouseEnter={e => { e.currentTarget.style.background = `${T.accent}22`; e.currentTarget.style.borderColor = `${T.accent}70`; }}
                  onMouseLeave={e => { e.currentTarget.style.background = `${T.accent}14`; e.currentTarget.style.borderColor = `${T.accent}50`; }}>
                  <I name="home" size={13} color={T.accent} />
                  <span style={{ fontSize: 11, color: T.accent, fontWeight: 600, letterSpacing: 0.2 }}>Projects Hub</span>
                </button>

                <a href="/nano" title="Switch to Nano UI"
                  style={{
                    height: 32, padding: "0 10px", borderRadius: 6, border: `1px solid ${T.blue}50`,
                    background: `${T.blue}14`, cursor: "pointer", textDecoration: "none",
                    display: "flex", alignItems: "center", gap: 5,
                    transition: "all 0.15s"
                  }}
                  onMouseEnter={e => { e.currentTarget.style.background = `${T.blue}22`; e.currentTarget.style.borderColor = `${T.blue}70`; }}
                  onMouseLeave={e => { e.currentTarget.style.background = `${T.blue}14`; e.currentTarget.style.borderColor = `${T.blue}50`; }}>
                  <I name="panelRight" size={13} color={T.blue} />
                  <span style={{ fontSize: 11, color: T.blue, fontWeight: 600, letterSpacing: 0.2 }}>Nano</span>
                </a>

                <a href="/docs" target="_blank" title="Open documentation"
                  style={{
                    height: 32, padding: "0 10px", borderRadius: 6, border: `1px solid ${T.border}`,
                    background: "transparent", cursor: "pointer", textDecoration: "none",
                    display: "flex", alignItems: "center", gap: 5,
                    transition: "all 0.15s"
                  }}
                  onMouseEnter={e => { e.currentTarget.style.background = T.surfaceAlt; e.currentTarget.style.borderColor = T.borderHover; }}
                  onMouseLeave={e => { e.currentTarget.style.background = "transparent"; e.currentTarget.style.borderColor = T.border; }}>
                  <I name="book-open" size={13} color={T.textMuted} />
                  <span style={{ fontSize: 11, color: T.textMuted, fontWeight: 500, letterSpacing: 0.2 }}>Docs</span>
                </a>

                <button onClick={shutdownC3} title="Shut down C3 server"
                  style={{
                    height: 32, padding: "0 10px", borderRadius: 6, border: `1px solid ${T.error}55`,
                    background: `${T.error}16`, cursor: "pointer",
                    display: "flex", alignItems: "center", gap: 5,
                    transition: "all 0.15s"
                  }}
                  onMouseEnter={e => { e.currentTarget.style.background = `${T.error}22`; e.currentTarget.style.borderColor = `${T.error}75`; }}
                  onMouseLeave={e => { e.currentTarget.style.background = `${T.error}16`; e.currentTarget.style.borderColor = `${T.error}55`; }}>
                  <I name="xCircle" size={13} color={T.error} />
                  <span style={{ fontSize: 11, color: T.error, fontWeight: 600, letterSpacing: 0.2 }}>Shut Down</span>
                </button>

                <div style={{ width: 1, height: 20, background: T.border, margin: "0 4px", flexShrink: 0 }} />

                <button onClick={toggleRightBarPin} title={rightBarPinned ? "Unpin right panel" : "Pin right panel open"}
                  style={{
                    width: 32, height: 32, borderRadius: 6, border: `1px solid ${rightBarPinned ? T.accent + "40" : T.border}`,
                    background: rightBarPinned ? T.accentDim : "transparent", cursor: "pointer",
                    display: "flex", alignItems: "center", justifyContent: "center",
                    transition: "all 0.15s"
                  }}>
                  <I name="panelRight" size={14} color={rightBarPinned ? T.accent : T.textMuted} />
                </button>
              </div>
            </div>
            <div style={{ flex: 1, overflow: "hidden", position: "relative" }}>
              {!connected ? (
                <div style={{ display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center", height: "100%", gap: 16, color: T.textMuted, padding: 24 }}>
                  <I name="terminal" size={48} color={T.textDim} />
                  <div style={{ fontSize: 18, fontWeight: 600, color: T.text }}>Cannot connect to C3 server</div>
                  <div style={{ fontSize: 13, maxWidth: 400, textAlign: "center", lineHeight: 1.6 }}>
                    Make sure the server is running:<br />
                    <code className="mono" style={{ color: T.accent, background: T.surfaceAlt, padding: "2px 8px", borderRadius: 4 }}>c3 ui</code>
                  </div>
                </div>
              ) : <>
                <div style={{ display: tab === "dashboard" ? "block" : "none", height: "100%", overflow: "auto", padding: 24 }}>
                  <Dashboard stats={stats} loading={loading} notifications={notifications} ackNotification={ackNotification} ackAllNotifications={ackAllNotifications} />
                </div>
                {tab !== "dashboard" && <div style={{ height: "100%", overflow: "auto", padding: 24 }}>{renderPanel()}</div>}
              </>}
            </div>
            <BottomDrawer setTab={setTab} notifications={notifications} ackNotification={ackNotification} ackAllNotifications={ackAllNotifications} />
          </div>

          {/* Right Sidebar */}
          <RightBar open={rightBarOpen} pinned={rightBarPinned} onTogglePin={toggleRightBarPin}
            onMouseEnter={() => setRightBarHover(true)} onMouseLeave={() => setRightBarHover(false)}
            setTab={setTab} stats={stats} />

          {showShutdownConfirm && (
            <div style={{
              position: "fixed", inset: 0, background: "rgba(3,8,14,0.64)",
              display: "flex", alignItems: "center", justifyContent: "center", zIndex: 9999
            }}>
              <div style={{
                width: "min(460px, calc(100vw - 32px))",
                background: T.surface, border: `1px solid ${T.borderHover}`, borderRadius: 10,
                boxShadow: "0 24px 80px rgba(0,0,0,0.42)", padding: 18, display: "flex", flexDirection: "column", gap: 12
              }}>
                <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
                  <I name="xCircle" size={16} color={T.error} />
                  <div style={{ fontSize: 15, fontWeight: 700, color: T.text }}>Shut Down C3?</div>
                </div>
                <div style={{ fontSize: 13, color: T.textMuted, lineHeight: 1.6 }}>
                  This will stop the C3 server process, close the active session, and disconnect this dashboard.
                  It is the same as pressing <span className="mono">Ctrl+C</span> in the terminal.
                </div>
                <div style={{ fontSize: 12, color: T.textDim, lineHeight: 1.5 }}>
                  Optional: <strong>Shut Down + Close Terminal</strong> attempts to close the terminal window too (Windows only).
                  For safety, it only targets known shell/terminal parent processes.
                </div>
                <div style={{ display: "flex", justifyContent: "flex-end", gap: 8, marginTop: 2 }}>
                  <button onClick={cancelShutdownC3}
                    style={{
                      height: 32, padding: "0 12px", borderRadius: 6, border: `1px solid ${T.border}`,
                      background: "transparent", color: T.textMuted, cursor: shutdownBusy ? "default" : "pointer",
                      opacity: shutdownBusy ? 0.5 : 1
                    }}
                    disabled={shutdownBusy}>
                    Cancel
                  </button>
                  <button onClick={() => confirmShutdownC3(false)}
                    style={{
                      height: 32, padding: "0 12px", borderRadius: 6, border: `1px solid ${T.error}70`,
                      background: `${T.error}18`, color: T.error, fontWeight: 700, cursor: "pointer",
                      opacity: shutdownBusy ? 0.75 : 1
                    }}
                    disabled={shutdownBusy}>
                    {shutdownBusy && !shutdownForceTerminal ? "Shutting down..." : "Shut Down"}
                  </button>
                  <button onClick={() => confirmShutdownC3(true)}
                    style={{
                      height: 32, padding: "0 12px", borderRadius: 6, border: `1px solid ${T.error}80`,
                      background: `${T.error}26`, color: T.error, fontWeight: 700, cursor: "pointer",
                      opacity: shutdownBusy ? 0.75 : 1
                    }}
                    disabled={shutdownBusy}>
                    {shutdownBusy && shutdownForceTerminal ? "Closing terminal..." : "Shut Down + Close Terminal"}
                  </button>
                </div>
              </div>
            </div>
          )}
        </div>
      );
    }

    ReactDOM.render(React.createElement(App), document.getElementById('root'));
  </script>
</body>

</html>
