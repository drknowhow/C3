            <div style={{ background: T.surface, border: `1px solid ${T.border}`, borderRadius: 8, overflow: "hidden" }}>
              <div onClick={() => setHistoryExpanded(!historyExpanded)}
                style={{
                  display: "flex", alignItems: "center", justifyContent: "space-between", padding: "10px 18px",
                  background: T.surfaceAlt, cursor: "pointer", borderBottom: historyExpanded ? `1px solid ${T.border}` : "none"
                }}>
                <span style={{ fontSize: 12, fontWeight: 600, color: T.textMuted, textTransform: "uppercase", letterSpacing: 1, display: "flex", alignItems: "center", gap: 6 }}>
                  <I name="clock" size={13} color={T.purple} /> Search History
                  <Badge color={T.purple}>{history.length}</Badge>
                </span>
                <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
                  <button onClick={e => { e.stopPropagation(); setHistory([]); setActiveHistory(null); }}
                    style={{
                      padding: "2px 8px", borderRadius: 4, border: `1px solid ${T.border}`, background: "transparent",
                      color: T.textMuted, fontSize: 10, cursor: "pointer"
                    }}>Clear</button>
                  <I name="chevron" size={14} color={T.textMuted} style={{ transform: historyExpanded ? "rotate(90deg)" : "none", transition: "transform 0.15s" }} />
                </div>
              </div>
              {historyExpanded && (
                <div style={{ maxHeight: 200, overflow: "auto" }}>
                  {history.map((h, i) => (
                    <div key={i} onClick={() => restoreHistory(h)}
                      style={{
                        display: "flex", alignItems: "center", gap: 10, padding: "8px 18px", cursor: "pointer",
                        borderBottom: i < history.length - 1 ? `1px solid ${T.border}20` : "none",
                        background: activeHistory === h ? `${T.accent}10` : "transparent",
                        transition: "background 0.1s"
                      }}
                      onMouseEnter={e => e.currentTarget.style.background = activeHistory === h ? `${T.accent}15` : `${T.border}30`}
                      onMouseLeave={e => e.currentTarget.style.background = activeHistory === h ? `${T.accent}10` : "transparent"}>
                      <I name="search" size={11} color={T.textDim} />
                      <span className="mono" style={{ flex: 1, fontSize: 12, color: T.text, overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }}>{h.query}</span>
                      <Badge color={T.blue}>{h.results.results?.length || 0}</Badge>
                      <Badge color={T.accent}>{h.results.context_tokens} tok</Badge>
                      <span className="mono" style={{ fontSize: 10, color: T.textDim, flexShrink: 0 }}>{timeAgo(h.time)}</span>
                    </div>
                  ))}
                </div>
              )}
            </div>
          )}

          {/* Results View */}
          {displayResults?.length > 0 && (
            <div style={{ background: T.surface, border: `1px solid ${T.border}`, borderRadius: 8, overflow: "hidden" }}>
              <div style={{ padding: "12px 18px", borderBottom: `1px solid ${T.border}`, display: "flex", justifyContent: "space-between", alignItems: "center" }}>
                <span style={{ fontSize: 12, fontWeight: 600, color: T.textMuted, textTransform: "uppercase", letterSpacing: 1 }}>
                  {displayResults.length} chunks found
                </span>
                <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
                  <Badge color={T.accent}>{totalTokens} tokens</Badge>
                  <button onClick={copyAll}
                    style={{
                      padding: "4px 10px", borderRadius: 4, border: `1px solid ${T.border}`, background: copied === "all" ? T.accentDim : "transparent",
                      color: copied === "all" ? T.accent : T.textMuted, fontSize: 11, cursor: "pointer", display: "flex", alignItems: "center", gap: 4, transition: "all 0.15s"
                    }}>
                    <I name={copied === "all" ? "check" : "copy"} size={12} />
                    {copied === "all" ? "Copied" : "Copy All"}
                  </button>
                </div>
              </div>
              {displayResults.map((r, i) => {
                const isExpanded = expandedResults.has(i);
                const lines = (r.content || "").split('\n');
                const previewLines = lines.slice(0, 3);
                const ext = getExt(r.file);
                return (
                  <div key={i} style={{ borderBottom: i < displayResults.length - 1 ? `1px solid ${T.border}` : "none" }}>
                    <div onClick={() => toggleExpand(i)}
                      style={{
                        display: "flex", justifyContent: "space-between", alignItems: "center", padding: "12px 18px", cursor: "pointer",
                        background: isExpanded ? `${T.accent}06` : "transparent", transition: "background 0.1s"
                      }}
                      onMouseEnter={e => { if (!isExpanded) e.currentTarget.style.background = `${T.border}20`; }}
                      onMouseLeave={e => { if (!isExpanded) e.currentTarget.style.background = "transparent"; }}>
                      <div style={{ display: "flex", alignItems: "center", gap: 8, overflow: "hidden", flex: 1, minWidth: 0 }}>
                        <I name="chevron" size={12} color={T.textDim} style={{ transform: isExpanded ? "rotate(90deg)" : "none", transition: "transform 0.15s", flexShrink: 0 }} />
                        <I name="file" size={14} color={colorMap[ext] || T.blue} style={{ flexShrink: 0 }} />
                        <span className="mono" style={{ fontSize: 12, color: T.text, overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }}>{r.file}</span>
                        {r.name && <>
                          <span style={{ color: T.textDim, flexShrink: 0 }}>→</span>
                          <span className="mono" style={{ fontSize: 12, color: T.accent, fontWeight: 600, flexShrink: 0 }}>{r.name}</span>
                        </>}
                      </div>
                      <div style={{ display: "flex", alignItems: "center", gap: 6, flexShrink: 0, marginLeft: 12 }}>
                        <Badge color={T.purple}>{r.type}</Badge>
                        <Badge color={T.warn}>L{r.lines}</Badge>
                        <Badge color={T.accent}>{r.tokens} tok</Badge>
                        <div style={{ width: 60 }}><ProgressBar value={r.score} max={1} color={T.accent} height={3} /></div>
                      </div>
                    </div>
                    {/* Collapsed preview */}
                    {!isExpanded && (
                      <div style={{ padding: "0 18px 10px 50px" }}>
                        <pre className="mono" style={{ margin: 0, fontSize: 11, lineHeight: 1.5, color: T.textDim, overflow: "hidden", whiteSpace: "pre", textOverflow: "ellipsis" }}>
                          {previewLines.join('\n')}{lines.length > 3 ? "\n..." : ""}
                        </pre>
                      </div>
                    )}
                    {/* Expanded line-numbered view */}
                    {isExpanded && (
                      <div style={{ borderTop: `1px solid ${T.border}20` }}>
                        <div style={{ display: "flex", justifyContent: "flex-end", padding: "6px 18px 0", gap: 8 }}>
                          <button onClick={e => { e.stopPropagation(); handleCopy(r.content, i); }}
                            style={{
                              padding: "3px 10px", borderRadius: 4, border: `1px solid ${T.border}`, background: copied === i ? T.accentDim : "transparent",
                              color: copied === i ? T.accent : T.textMuted, fontSize: 11, cursor: "pointer", display: "flex", alignItems: "center", gap: 4, transition: "all 0.15s"
                            }}>
                            <I name={copied === i ? "check" : "copy"} size={11} />
                            {copied === i ? "Copied" : "Copy"}
                          </button>
                        </div>
                        <div style={{ overflow: "auto", maxHeight: 400, padding: "4px 0 8px" }}>
                          {lines.map((line, li) => (
                            <div key={li} style={{ display: "flex", fontSize: 12, lineHeight: 1.7, fontFamily: "'JetBrains Mono', monospace" }}>
                              <span style={{
                                width: 44, flexShrink: 0, textAlign: "right", padding: "0 10px 0 0", color: T.textDim,
                                userSelect: "none", borderRight: `1px solid ${T.border}30`
                              }}>{li + 1}</span>
                              <span style={{ padding: "0 12px", whiteSpace: "pre", color: T.text }}>{line}</span>
                            </div>
                          ))}
                        </div>
                      </div>
                    )}
                  </div>
                );
              })}
            </div>
          )}

          {/* No Results */}
          {results && displayResults?.length === 0 && (
            <div style={{ padding: 30, textAlign: "center", color: T.textMuted, background: T.surface, border: `1px dashed ${T.border}`, borderRadius: 8 }}>
              <I name="search" size={20} color={T.textDim} style={{ marginBottom: 8 }} />
              <div>No relevant chunks found for "<span style={{ color: T.text }}>{query}</span>". Try different terms or broaden your query.</div>
            </div>
          )}

          {/* Error */}
          {results?.error && (
            <div style={{ padding: 16, background: T.errorDim, border: `1px solid ${T.error}30`, borderRadius: 8, color: T.error, fontSize: 13, display: "flex", alignItems: "center", gap: 8 }}>
              <I name="zap" size={14} color={T.error} /> Search error: {results.error}
            </div>
          )}

          {/* Initial empty state */}
          {!results && !searching && (
            <div style={{ padding: 30, textAlign: "center", background: T.surface, border: `1px dashed ${T.border}`, borderRadius: 8 }}>
              <div style={{ fontSize: 13, color: T.textMuted, marginBottom: 8 }}>Search your indexed codebase using natural language</div>
              <div className="mono" style={{ fontSize: 11, color: T.textDim }}>
                Try: "authentication middleware" | "database connection" | "error handling patterns"
              </div>
            </div>
          )}
        </div>
      );
    };

    // ─── Sessions ─────────────────────────────
    const Sessions = () => {
      const [sessions, setSessions] = useState([]);
      const [currentSession, setCurrentSession] = useState(null);
      const [expanded, setExpanded] = useState(null);
      const [detail, setDetail] = useState(null);
      const [loading, setLoading] = useState(true);

      const liveDuration = useLiveDuration(currentSession?.started, currentSession?.live);

      const loadSessions = useCallback(async () => {
        try {
          const s = await api.get('/api/sessions');
          setSessions(s);
          setLoading(false);
        } catch (e) { setLoading(false); }
      }, []);

      const loadCurrentSession = useCallback(async () => {
        try {
          const cur = await api.get('/api/sessions/current');
          setCurrentSession(cur);
        } catch (e) { }
      }, []);

      useEffect(() => { loadSessions(); loadCurrentSession(); }, [loadSessions, loadCurrentSession]);

      // Auto-refresh sessions list + current session + expanded detail every 5s
      useEffect(() => {
        const iv = setInterval(async () => {
          await loadSessions();
          await loadCurrentSession();
          if (expanded !== null && detail?.id) {
            try {
              const d = await api.get(`/api/sessions/${detail.id}`);
              if ((!d.tool_calls || d.tool_calls.length === 0) && d.started) {
                const params = new URLSearchParams({ type: "tool_call", limit: "200", since: d.started });
                if (d.ended) params.set("until", d.ended);
                const activityTools = await api.get(`/api/activity?${params}`);
                if (activityTools.length > 0) {
                  d.tool_calls = activityTools.map(e => ({
                    tool: e.tool || "unknown", args: e.args || {},
                    result_summary: e.result_summary || "", timestamp: e.timestamp || "",
                  })).reverse();
                }
              }
              setDetail(d);
            } catch (e) { }
          }
        }, 5000);
        return () => clearInterval(iv);
      }, [expanded, detail?.id, loadSessions, loadCurrentSession]);

      const handleExpand = async (i, id) => {
        if (expanded === i) { setExpanded(null); setDetail(null); return; }
        setExpanded(i);
        if (i === "current") return; // current session card uses currentSession data directly
        try {
          const d = await api.get(`/api/sessions/${id}`);
          // If session has no tool_calls, pull from activity log for this session's time range
          if ((!d.tool_calls || d.tool_calls.length === 0) && d.started) {
            const params = new URLSearchParams({ type: "tool_call", limit: "200", since: d.started });
            if (d.ended) params.set("until", d.ended);
            const activityTools = await api.get(`/api/activity?${params}`);
            if (activityTools.length > 0) {
              d.tool_calls = activityTools.map(e => ({
                tool: e.tool || "unknown",
                args: e.args || {},
                result_summary: e.result_summary || "",
                timestamp: e.timestamp || "",
              })).reverse();
            }
          }
          setDetail(d);
        } catch (e) { setDetail(null); }
      };

      return (
        <div className="fade-up" style={{ display: "flex", flexDirection: "column", gap: 16 }}>
          <div style={{ display: "flex", gap: 12, flexWrap: "wrap" }}>
            <StatBox label="Total Sessions" value={sessions.length} color={T.blue} loading={loading} />
            <StatBox label="Decisions" value={sessions.reduce((s, x) => s + (x.decisions || 0), 0)} color={T.purple} loading={loading} />
            <StatBox label="Total Duration" value={(() => { const t = sessions.reduce((s, x) => s + (x.duration_seconds || 0), 0); if (t < 60) return t + "s"; const m = Math.floor(t / 60); if (m < 60) return m + "m"; return Math.floor(m / 60) + "h " + (m % 60) + "m"; })()} color={T.accent} loading={loading} />
            <StatBox label="Total Tool Calls" value={sessions.reduce((s, x) => s + (x.tool_calls || 0), 0)} color={T.warn} loading={loading} />
            <StatBox label="C3 Tokens" value={(() => { const t = sessions.reduce((s, x) => s + (x.response_tokens || 0), 0); return t >= 1000 ? (t / 1000).toFixed(1) + "K" : t; })()} color={T.blue} loading={loading} />
          </div>

          {/* Current Session Card */}
          {currentSession && (() => {
            const cur = currentSession;
            const isLive = cur.live === true;
            const decisions = Array.isArray(cur.decisions) ? cur.decisions : [];
            const filesTouched = Array.isArray(cur.files_touched) ? cur.files_touched : [];
            const toolCalls = Array.isArray(cur.tool_calls) ? cur.tool_calls : [];
            const displayDuration = isLive ? liveDuration : (cur.duration || "");
            return (
              <div style={{
                background: T.surface, border: `1px solid ${isLive ? T.accent : T.border}30`, borderLeft: `3px solid ${isLive ? T.accent : T.textMuted}`,
                borderRadius: 8, padding: 18
              }}>
                <div style={{
                  fontSize: 10, fontWeight: 700, color: isLive ? T.accent : T.textMuted, textTransform: "uppercase", letterSpacing: 1.2, marginBottom: 10,
                  display: "flex", alignItems: "center", gap: 6
                }}>
                  {isLive && <GlowDot color={T.accent} size={6} />}
                  {isLive ? "Live Session" : "Last Session"}
                </div>
                <div style={{ fontSize: 14, fontWeight: 600, color: T.text, marginBottom: 4 }}>
                  {cur.description || cur.summary || "No summary"}
                </div>
                {cur.description && cur.summary && cur.summary !== cur.description && (
                  <div style={{ fontSize: 12, color: T.textMuted, marginBottom: 6 }}>{cur.summary}</div>
                )}
                <div className="mono" style={{ fontSize: 11, color: T.textMuted, marginBottom: 12 }}>
                  {cur.started ? new Date(cur.started).toLocaleString() : "—"}
                  {displayDuration && <span style={{ color: T.accent, marginLeft: 10 }}>{displayDuration}</span>}
                </div>
                <div style={{ display: "flex", gap: 8, marginBottom: 12 }}>
                  <div style={{ flex: 1, padding: "8px 10px", background: T.surfaceAlt, borderRadius: 6, textAlign: "center" }}>
                    <div className="mono" style={{ fontSize: 16, fontWeight: 700, color: T.purple }}>{decisions.length}</div>
                    <div style={{ fontSize: 9, color: T.textDim }}>decisions</div>
                  </div>
                  <div style={{ flex: 1, padding: "8px 10px", background: T.surfaceAlt, borderRadius: 6, textAlign: "center" }}>
                    <div className="mono" style={{ fontSize: 16, fontWeight: 700, color: T.blue }}>{filesTouched.length}</div>
                    <div style={{ fontSize: 9, color: T.textDim }}>files</div>
                  </div>
                  <div style={{ flex: 1, padding: "8px 10px", background: T.surfaceAlt, borderRadius: 6, textAlign: "center" }}>
                    <div className="mono" style={{ fontSize: 16, fontWeight: 700, color: T.warn }}>{toolCalls.length}</div>
                    <div style={{ fontSize: 9, color: T.textDim }}>tool calls</div>
                  </div>
                </div>
                <button onClick={() => handleExpand("current", cur.id)}
                  style={{
                    padding: "6px 12px", background: "none", border: `1px solid ${T.border}`, borderRadius: 5,
                    color: T.accent, fontSize: 11, cursor: "pointer", fontFamily: "'JetBrains Mono', monospace"
                  }}>
                  {expanded === "current" ? "Collapse details" : "View details →"}
                </button>
                {expanded === "current" && (() => {
                  const d = cur;
                  return (
                    <div style={{ marginTop: 12, paddingTop: 12, borderTop: `1px solid ${T.border}`, fontSize: 12, color: T.textMuted, lineHeight: 1.8 }}>
                      <div style={{ display: "flex", gap: 16, marginBottom: 8, padding: "8px 12px", background: T.surfaceAlt, borderRadius: 6, fontSize: 11 }} className="mono">
                        <span><strong style={{ color: T.text }}>Start:</strong> {d.started ? new Date(d.started).toLocaleString() : "—"}</span>
                        <span><strong style={{ color: T.text }}>End:</strong> {d.ended ? new Date(d.ended).toLocaleString() : (isLive ? "Running" : "—")}</span>
                        {displayDuration && <span><strong style={{ color: T.text }}>Duration:</strong> {displayDuration}</span>}
                      </div>
                      {decisions.length > 0 && (
                        <div style={{ marginBottom: 6 }}>
                          <strong style={{ color: T.text }}>Decisions:</strong>
                          {decisions.map((dd, j) => <div key={j} style={{ paddingLeft: 12 }}>• {dd.decision}</div>)}
                        </div>
                      )}
                      {filesTouched.length > 0 && (
                        <div><strong style={{ color: T.text }}>Files:</strong> {filesTouched.map(f => f.file).join(", ")}</div>
                      )}
                      {(d.context_notes || []).length > 0 && (
                        <div style={{ marginTop: 4 }}><strong style={{ color: T.text }}>Notes:</strong> {d.context_notes.join("; ")}</div>
                      )}
                      {toolCalls.length > 0 && (
                        <div style={{ marginTop: 8 }}>
                          <strong style={{ color: T.text }}>Tool Calls ({toolCalls.length}):</strong>
                          <div style={{ display: "flex", flexDirection: "column", gap: 4, marginTop: 6 }}>
                            {toolCalls.map((tc, j) => (
                              <div key={j} style={{ display: "flex", alignItems: "center", gap: 8, padding: "4px 8px", borderRadius: 4, background: T.surfaceAlt }}>
                                <Badge color={getToolColor(tc.tool)}>{tc.tool}</Badge>
                                <span className="mono" style={{ fontSize: 11, color: T.textMuted, flex: 1, overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }}>
                                  {typeof tc.args === 'object' ? JSON.stringify(tc.args).slice(0, 60) : String(tc.args || "").slice(0, 60)}
                                </span>
                                {tc.result_summary && <span className="mono" style={{ fontSize: 10, color: T.textDim }}>{String(tc.result_summary).slice(0, 40)}</span>}
                                {tc.timestamp && <span className="mono" style={{ fontSize: 10, color: T.textDim }}>{localTime(tc.timestamp)}</span>}
                              </div>
                            ))}
                          </div>
                        </div>
                      )}
                      {(() => {
                        const cb = d.context_budget || {};
                        const bt = cb.by_tool || {};
                        const respTok = cb.response_tokens || 0;
                        if (respTok === 0) return null;
                        const toolEntries = Object.entries(bt).sort((a, b) => b[1] - a[1]);
                        return (
                          <div style={{ marginTop: 8 }}>
                            <strong style={{ color: T.text }}>C3 Token Usage:</strong>
                            <div style={{ display: "flex", gap: 12, flexWrap: "wrap", marginTop: 6, padding: "10px 12px", background: T.surfaceAlt, borderRadius: 6 }}>
                              <div style={{ textAlign: "center", minWidth: 80 }}>
                                <div className="mono" style={{ fontSize: 16, fontWeight: 700, color: T.blue }}>{(respTok / 1000).toFixed(1)}K</div>
                                <div style={{ fontSize: 9, color: T.textDim }}>response tokens</div>
                              </div>
                              <div style={{ textAlign: "center", minWidth: 80 }}>
                                <div className="mono" style={{ fontSize: 16, fontWeight: 700, color: T.accent }}>{cb.call_count || 0}</div>
                                <div style={{ fontSize: 9, color: T.textDim }}>C3 calls</div>
                              </div>
                              <div style={{ textAlign: "center", minWidth: 80 }}>
                                <div className="mono" style={{ fontSize: 16, fontWeight: 700, color: cb.over_budget ? T.error : T.accent }}>{cb.over_budget ? "OVER" : "OK"}</div>
                                <div style={{ fontSize: 9, color: T.textDim }}>budget</div>
                              </div>
                              <div style={{ textAlign: "center", minWidth: 80 }}>
                                <div className="mono" style={{ fontSize: 16, fontWeight: 700, color: T.warn }}>{cb.peak_tokens ? (cb.peak_tokens / 1000).toFixed(1) + "K" : "0"}</div>
                                <div style={{ fontSize: 9, color: T.textDim }}>peak response</div>
                              </div>
                            </div>
                            {toolEntries.length > 0 && (
                              <div style={{ display: "flex", gap: 6, flexWrap: "wrap", marginTop: 6 }}>
                                {toolEntries.map(([tool, tokens]) => (
                                  <Badge key={tool} color={getToolColor(tool)}>{tool}: {tokens >= 1000 ? (tokens / 1000).toFixed(1) + "K" : tokens}</Badge>
                                ))}
                              </div>
                            )}
                          </div>
                        );
                      })()}
                    </div>
                  );
                })()}
              </div>
            );
          })()}

          {sessions.length === 0 && !currentSession && !loading && (
            <div style={{ background: T.surface, border: `1px solid ${T.border}`, borderRadius: 8, padding: 30, textAlign: "center", color: T.textMuted, fontSize: 13 }}>
              No sessions yet. Sessions are created automatically when the MCP server starts.
            </div>
          )}

          {/* Past Sessions */}
          {sessions.length > 0 && (
            <div>
              <div style={{
                fontSize: 12, fontWeight: 600, color: T.textMuted, textTransform: "uppercase", letterSpacing: 1, marginBottom: 10,
                display: "flex", alignItems: "center", gap: 8
              }}>
                Saved Sessions <Badge>{sessions.length}</Badge>
              </div>
              <div style={{ background: T.surface, border: `1px solid ${T.border}`, borderRadius: 8, overflow: "hidden" }}>
                {sessions.map((s, i) => {
                  const idx = i;
                  return (
                    <div key={s.id} style={{ borderBottom: i < sessions.length - 1 ? `1px solid ${T.border}` : "none" }}>
                      <div onClick={() => handleExpand(idx, s.id)}
                        style={{ padding: "14px 18px", display: "flex", justifyContent: "space-between", alignItems: "center", cursor: "pointer", transition: "background 0.15s" }}
                        onMouseEnter={e => e.currentTarget.style.background = T.surfaceAlt}
                        onMouseLeave={e => e.currentTarget.style.background = "transparent"}>
                        <div style={{ display: "flex", alignItems: "center", gap: 10 }}>
                          <I name="chevron" size={14} color={T.textMuted} style={{ transition: "transform 0.2s", transform: expanded === idx ? "rotate(90deg)" : "" }} />
                          <div>
                            <div style={{ fontSize: 13, color: T.text, fontWeight: 500 }}>{s.summary || s.description || "No summary"}</div>
                            <div className="mono" style={{ fontSize: 11, color: T.textMuted, marginTop: 2 }}>{s.started ? new Date(s.started).toLocaleString() : "—"}</div>
                          </div>
                        </div>
                        <div style={{ display: "flex", gap: 6 }}>
                          {s.duration && <Badge color={T.accent}>{s.duration}</Badge>}
                          <Badge color={T.purple}>{s.decisions} decisions</Badge>
                          <Badge color={T.blue}>{s.files} files</Badge>
                          {s.tool_calls > 0 && <Badge color={T.warn}>{s.tool_calls} tools</Badge>}
                          {s.response_tokens > 0 && <Badge color={T.blue}>{(s.response_tokens / 1000).toFixed(1)}K tok</Badge>}
                        </div>
                      </div>
                      {expanded === idx && detail && (
                        <div style={{ padding: "0 18px 14px 42px", fontSize: 12, color: T.textMuted, lineHeight: 1.8 }}>
                          <div style={{ display: "flex", gap: 16, marginBottom: 8, padding: "8px 12px", background: T.surfaceAlt, borderRadius: 6, fontSize: 11 }} className="mono">
                            <span><strong style={{ color: T.text }}>Start:</strong> {detail.started ? new Date(detail.started).toLocaleString() : "—"}</span>
                            <span><strong style={{ color: T.text }}>End:</strong> {detail.ended ? new Date(detail.ended).toLocaleString() : "—"}</span>
                            {detail.duration && <span><strong style={{ color: T.text }}>Duration:</strong> {detail.duration}</span>}
                          </div>
                          {detail.decisions?.length > 0 && (
                            <div style={{ marginBottom: 6 }}>
                              <strong style={{ color: T.text }}>Decisions:</strong>
                              {detail.decisions.map((d, j) => <div key={j} style={{ paddingLeft: 12 }}>• {d.decision}</div>)}
                            </div>
                          )}
                          {detail.files_touched?.length > 0 && (
                            <div><strong style={{ color: T.text }}>Files:</strong> {detail.files_touched.map(f => f.file).join(", ")}</div>
                          )}
                          {detail.context_notes?.length > 0 && (
                            <div style={{ marginTop: 4 }}><strong style={{ color: T.text }}>Notes:</strong> {detail.context_notes.join("; ")}</div>
                          )}
                          {detail.tool_calls?.length > 0 && (
                            <div style={{ marginTop: 8 }}>
                              <strong style={{ color: T.text }}>Tool Calls ({detail.tool_calls.length}):</strong>
                              <div style={{ display: "flex", flexDirection: "column", gap: 4, marginTop: 6 }}>
                                {detail.tool_calls.map((tc, j) => (
                                  <div key={j} style={{ display: "flex", alignItems: "center", gap: 8, padding: "4px 8px", borderRadius: 4, background: T.surfaceAlt }}>
                                    <Badge color={getToolColor(tc.tool)}>{tc.tool}</Badge>
                                    <span className="mono" style={{ fontSize: 11, color: T.textMuted, flex: 1, overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }}>
                                      {typeof tc.args === 'object' ? JSON.stringify(tc.args).slice(0, 60) : String(tc.args || "").slice(0, 60)}
                                    </span>
                                    {tc.result && <span className="mono" style={{ fontSize: 10, color: T.textDim }}>{String(tc.result).slice(0, 40)}</span>}
                                    {tc.timestamp && <span className="mono" style={{ fontSize: 10, color: T.textDim }}>{localTime(tc.timestamp)}</span>}
                                  </div>
                                ))}
                              </div>
                            </div>
                          )}
                          {(() => {
                            const cb = detail.context_budget || {};
                            const bt = cb.by_tool || {};
                            const respTok = cb.response_tokens || 0;
                            if (respTok === 0) return null;
                            const toolEntries = Object.entries(bt).sort((a, b) => b[1] - a[1]);
                            return (
                              <div style={{ marginTop: 8 }}>
                                <strong style={{ color: T.text }}>C3 Token Usage:</strong>
                                <div style={{ display: "flex", gap: 12, flexWrap: "wrap", marginTop: 6, padding: "10px 12px", background: T.surfaceAlt, borderRadius: 6 }}>
                                  <div style={{ textAlign: "center", minWidth: 80 }}>
                                    <div className="mono" style={{ fontSize: 16, fontWeight: 700, color: T.blue }}>{(respTok / 1000).toFixed(1)}K</div>
                                    <div style={{ fontSize: 9, color: T.textDim }}>response tokens</div>
                                  </div>
                                  <div style={{ textAlign: "center", minWidth: 80 }}>
                                    <div className="mono" style={{ fontSize: 16, fontWeight: 700, color: T.accent }}>{cb.call_count || 0}</div>
                                    <div style={{ fontSize: 9, color: T.textDim }}>C3 calls</div>
                                  </div>
                                  <div style={{ textAlign: "center", minWidth: 80 }}>
                                    <div className="mono" style={{ fontSize: 16, fontWeight: 700, color: T.purple }}>{cb.compression_level || 0}</div>
                                    <div style={{ fontSize: 9, color: T.textDim }}>compression lvl</div>
                                  </div>
                                  <div style={{ textAlign: "center", minWidth: 80 }}>
                                    <div className="mono" style={{ fontSize: 16, fontWeight: 700, color: T.warn }}>{cb.peak_tokens ? (cb.peak_tokens / 1000).toFixed(1) + "K" : "0"}</div>
                                    <div style={{ fontSize: 9, color: T.textDim }}>peak response</div>
                                  </div>
                                </div>
                                {toolEntries.length > 0 && (
                                  <div style={{ display: "flex", gap: 6, flexWrap: "wrap", marginTop: 6 }}>
                                    {toolEntries.map(([tool, tokens]) => (
                                      <Badge key={tool} color={getToolColor(tool)}>{tool}: {tokens >= 1000 ? (tokens / 1000).toFixed(1) + "K" : tokens}</Badge>
                                    ))}
                                  </div>
                                )}
                              </div>
                            );
                          })()}
                        </div>
                      )}
                    </div>
                  );
                })}
              </div>
            </div>
          )}
        </div>
      );
    };

    // ─── Memory ───────────────────────────────
    const Memory = () => {
      const [facts, setFacts] = useState([]);
      const [loading, setLoading] = useState(true);
      const [newFact, setNewFact] = useState("");
      const [category, setCategory] = useState("general");
      const [storing, setStoring] = useState(false);
      const [searchQuery, setSearchQuery] = useState("");
      const [searchResults, setSearchResults] = useState(null);
      const [searching, setSearching] = useState(false);
      const [decisions, setDecisions] = useState([]);
      const [decisionsExpanded, setDecisionsExpanded] = useState(false);

      const categories = ["general", "architecture", "convention", "bug", "preference"];
      const catColors = { general: T.textMuted, architecture: T.blue, convention: T.purple, bug: T.error, preference: T.warn };

      const loadFacts = () => {
        api.get('/api/memory/facts').then(f => { setFacts(f); setLoading(false); }).catch(() => setLoading(false));
      };
      const loadDecisions = () => {
        api.get('/api/activity?type=decision&limit=50').then(d => setDecisions(d)).catch(() => { });
      };
      useEffect(() => {
        loadFacts();
        loadDecisions();
        const iv = setInterval(() => { loadFacts(); loadDecisions(); }, 5000);
        return () => clearInterval(iv);
      }, []);

      const handleRemember = async () => {
        if (!newFact.trim()) return;
        setStoring(true);
        try {
          await api.post('/api/memory/remember', { fact: newFact, category });
          setNewFact("");
          loadFacts();
        } catch (e) { }
        setStoring(false);
      };

      const handleSearch = async () => {
        if (!searchQuery.trim()) return;
        setSearching(true);
        try {
          const r = await api.post('/api/memory/recall', { query: searchQuery, top_k: 10 });
          setSearchResults(r);
        } catch (e) { }
        setSearching(false);
      };

      const handleDelete = async (id) => {
        await api.del(`/api/memory/facts/${id}`);
        loadFacts();
        if (searchResults) {
          setSearchResults(searchResults.filter(f => f.id !== id));
        }
      };

      const [exportMsg, setExportMsg] = useState(null);
      const handleExport = async () => {
        try {
          const r = await api.get('/api/memory/export');
          await navigator.clipboard.writeText(r.markdown);
          setExportMsg(`Copied ${r.count} facts as markdown`);
          setTimeout(() => setExportMsg(null), 3000);
        } catch (e) { setExportMsg("Export failed"); setTimeout(() => setExportMsg(null), 3000); }
      };

      const totalRecalls = facts.reduce((s, f) => s + (f.relevance_count || 0), 0);

      // Group facts by category
      const grouped = {};
      facts.forEach(f => {
        const cat = f.category || "general";
        if (!grouped[cat]) grouped[cat] = [];
        grouped[cat].push(f);
      });

      return (
        <div className="fade-up" style={{ display: "flex", flexDirection: "column", gap: 16 }}>
          <div style={{ display: "flex", gap: 12, flexWrap: "wrap" }}>
            <StatBox label="Stored Facts" value={facts.length} color={T.purple} loading={loading} />
            <StatBox label="Total Recalls" value={totalRecalls} sub="relevance score sum" color={T.accent} loading={loading} />
            <StatBox label="Decisions" value={decisions.length} sub="from sessions" color={T.blue} />
          </div>

          {/* Remember form */}
          <div style={{ background: T.surface, border: `1px solid ${T.border}`, borderRadius: 8, padding: 18 }}>
            <div style={{ fontSize: 12, fontWeight: 600, color: T.textMuted, textTransform: "uppercase", letterSpacing: 1, marginBottom: 12 }}>Remember a Fact</div>
            <div style={{ display: "flex", gap: 10, flexWrap: "wrap", alignItems: "flex-end" }}>
              <div style={{ flex: 1, minWidth: 250 }}>
                <input value={newFact} onChange={e => setNewFact(e.target.value)}
                  onKeyDown={e => e.key === "Enter" && handleRemember()}
                  placeholder="Enter a fact to remember..." className="mono"
                  style={{ width: "100%", padding: "9px 12px", borderRadius: 6, background: T.surfaceAlt, border: `1px solid ${T.border}`, color: T.text, fontSize: 12, outline: "none" }} />
              </div>
              <select value={category} onChange={e => setCategory(e.target.value)} className="mono"
                style={{ padding: "9px 12px", borderRadius: 6, background: T.surfaceAlt, border: `1px solid ${T.border}`, color: T.text, fontSize: 12, outline: "none" }}>
                {categories.map(c => <option key={c} value={c}>{c}</option>)}
              </select>
              <Btn color={T.purple} onClick={handleRemember} disabled={!newFact.trim() || storing}>
                <I name="bookmark" size={14} /> {storing ? "Storing..." : "Remember"}
              </Btn>
            </div>
          </div>

          {/* Search */}
          <div style={{ background: T.surface, border: `1px solid ${T.border}`, borderRadius: 8, padding: 18 }}>
            <div style={{ fontSize: 12, fontWeight: 600, color: T.textMuted, textTransform: "uppercase", letterSpacing: 1, marginBottom: 12 }}>Search Facts</div>
            <div style={{ display: "flex", gap: 10 }}>
              <div style={{ flex: 1, display: "flex", alignItems: "center", gap: 8, padding: "0 14px", borderRadius: 6, background: T.surfaceAlt, border: `1px solid ${T.border}` }}>
                <I name="search" size={14} color={T.textMuted} />
                <input value={searchQuery} onChange={e => setSearchQuery(e.target.value)}
                  onKeyDown={e => e.key === "Enter" && handleSearch()}
                  placeholder="Search stored facts..." className="mono"
                  style={{ flex: 1, padding: "10px 0", background: "transparent", border: "none", color: T.text, fontSize: 13, outline: "none" }} />
              </div>
              <Btn color={T.blue} onClick={handleSearch} disabled={searching || !searchQuery.trim()}>
                <I name="search" size={14} /> {searching ? "Searching..." : "Search"}
              </Btn>
            </div>
            {searchResults && (
              <div style={{ marginTop: 12, display: "flex", flexDirection: "column", gap: 6 }}>
                {searchResults.length === 0 && <div style={{ padding: 16, textAlign: "center", color: T.textMuted, fontSize: 13 }}>No matching facts found.</div>}
                {searchResults.map((f, i) => (
                  <div key={f.id} style={{ display: "flex", alignItems: "center", gap: 10, padding: "10px 12px", borderRadius: 6, background: T.surfaceAlt, border: `1px solid ${T.border}` }}>
                    <div style={{ flex: 1 }}>
                      <div style={{ fontSize: 13, color: T.text, marginBottom: 4 }}>{f.fact}</div>
                      <div style={{ display: "flex", gap: 6, alignItems: "center" }}>
                        <Badge color={catColors[f.category] || T.textMuted}>{f.category}</Badge>
                        <span className="mono" style={{ fontSize: 10, color: T.textDim }}>recalls: {f.relevance_count}</span>
                        {f.score !== undefined && <Badge color={T.accent}>score: {f.score}</Badge>}
                      </div>
                    </div>
                    <button onClick={() => handleDelete(f.id)} style={{ background: "none", border: "none", cursor: "pointer", padding: 4 }}>
                      <I name="trash" size={14} color={T.error} />
                    </button>
                  </div>
                ))}
              </div>
            )}
          </div>

          {/* Decisions */}
          {decisions.length > 0 && (
            <div style={{ background: T.surface, border: `1px solid ${T.border}`, borderRadius: 8, overflow: "hidden" }}>
              <div onClick={() => setDecisionsExpanded(!decisionsExpanded)}
                style={{
                  display: "flex", alignItems: "center", justifyContent: "space-between", padding: "12px 18px",
                  background: T.surfaceAlt, cursor: "pointer", borderBottom: decisionsExpanded ? `1px solid ${T.border}` : "none"
                }}>
                <span style={{ fontSize: 12, fontWeight: 600, color: T.textMuted, textTransform: "uppercase", letterSpacing: 1, display: "flex", alignItems: "center", gap: 6 }}>
                  <I name="brain" size={13} color={T.blue} /> Decisions
                  <Badge color={T.blue}>{decisions.length}</Badge>
                </span>
                <I name="chevron" size={14} color={T.textMuted} style={{ transform: decisionsExpanded ? "rotate(90deg)" : "none", transition: "transform 0.15s" }} />
              </div>
              {decisionsExpanded && (
                <div style={{ padding: 14, display: "flex", flexDirection: "column", gap: 6 }}>
                  {decisions.map((d, i) => (
                    <div key={i} style={{ display: "flex", gap: 10, padding: "10px 12px", borderRadius: 6, background: T.surfaceAlt, border: `1px solid ${T.border}20` }}>
                      <GlowDot color={T.blue} size={6} />
                      <div style={{ flex: 1 }}>
                        <div style={{ fontSize: 12, color: T.text, lineHeight: 1.5 }}>{d.decision}</div>
                        {d.reasoning && <div style={{ fontSize: 11, color: T.textMuted, marginTop: 4, fontStyle: "italic" }}>{d.reasoning}</div>}
                        <div className="mono" style={{ fontSize: 10, color: T.textDim, marginTop: 4 }}>{timeAgo(d.timestamp)}</div>
                      </div>
                    </div>
                  ))}
                </div>
              )}
            </div>
          )}

          {/* All facts grouped */}
          <div style={{ background: T.surface, border: `1px solid ${T.border}`, borderRadius: 8, padding: 18 }}>
            <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", marginBottom: 14 }}>
              <div style={{ fontSize: 12, fontWeight: 600, color: T.textMuted, textTransform: "uppercase", letterSpacing: 1 }}>All Facts</div>
              <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
                {exportMsg && <span style={{ fontSize: 11, color: T.accent }}>{exportMsg}</span>}
                <Btn color={T.purple} onClick={handleExport} disabled={facts.length === 0}>
                  <I name="copy" size={13} /> Export Markdown
                </Btn>
              </div>
            </div>
            {facts.length === 0 && !loading && (
              <div style={{ padding: 20, textAlign: "center", color: T.textMuted, fontSize: 13 }}>No facts stored yet. Use the form above or the MCP remember tool.</div>
            )}
            {Object.entries(grouped).map(([cat, items]) => (
              <div key={cat} style={{ marginBottom: 14 }}>
                <div style={{ display: "flex", alignItems: "center", gap: 8, marginBottom: 8 }}>
                  <Badge color={catColors[cat] || T.textMuted}>{cat}</Badge>
                  <span style={{ fontSize: 11, color: T.textDim }}>({items.length})</span>
                </div>
                <div style={{ display: "flex", flexDirection: "column", gap: 4 }}>
                  {items.map(f => (
                    <div key={f.id} style={{ display: "flex", alignItems: "center", gap: 10, padding: "8px 12px", borderRadius: 6, background: T.surfaceAlt }}>
                      <div style={{ flex: 1 }}>
                        <div style={{ fontSize: 12, color: T.text }}>{f.fact}</div>
                        <div className="mono" style={{ fontSize: 10, color: T.textDim, marginTop: 2 }}>
                          {localDate(f.timestamp)} | recalls: {f.relevance_count}
                          {f.source_session && <> | session: {f.source_session.slice(0, 8)}</>}
                        </div>
                      </div>
                      <button onClick={() => handleDelete(f.id)} style={{ background: "none", border: "none", cursor: "pointer", padding: 4 }}>
                        <I name="trash" size={14} color={T.error} />
                      </button>
                    </div>
                  ))}
                </div>
              </div>
            ))}
          </div>
        </div>
      );
    };

    // ─── Settings ─────────────────────────────
    const ProjectData = () => {
      const [summary, setSummary] = useState(null);
      const [loading, setLoading] = useState(false);
      const [confirm, setConfirm] = useState(null);
      const [working, setWorking] = useState(null);
      const [msg, setMsg] = useState(null);

      const load = async () => {
        setLoading(true);
        try { const s = await api.get('/api/data/summary'); setSummary(s); } catch (e) { }
        setLoading(false);
      };

      useEffect(() => { load(); }, []);

      const flash = (text, ok) => {
        setMsg({ text, ok });
        setTimeout(() => setMsg(null), 3500);
      };

      const doAction = async (key, fn) => {
        setWorking(key);
        try {
          const r = await fn();
          flash(`✓ ${r.cleared !== undefined ? r.cleared + ' items cleared' : 'Done'}`, true);
          await load();
        } catch (e) { flash(`✗ ${e.message || 'Failed'}`, false); }
        setWorking(null);
      };

      const confirmThenRun = (key, fn) => {
        if (confirm === key) {
          setConfirm(null);
          doAction(key, fn);
        } else {
          setConfirm(key);
          setTimeout(() => setConfirm(c => c === key ? null : c), 3000);
        }
      };

      const rows = summary ? [
        {
          key: 'index', label: 'Index', icon: 'search', color: T.blue,
          count: `${summary.index.count} files`, size: summary.index.size_kb,
          action: 'Rebuild',
          onAction: () => doAction('index', () => api.post('/api/index/rebuild')),
        },
        {
          key: 'sessions', label: 'Sessions', icon: 'clock', color: T.warn,
          count: summary.sessions.count, size: summary.sessions.size_kb,
          action: 'Keep last 5',
          onAction: () => confirmThenRun('sessions', () => api.delete('/api/data/sessions?keep=5')),
        },
        {
          key: 'cache', label: 'Compression Cache', icon: 'minimize', color: T.purple,
          count: `${summary.cache.count} files`, size: summary.cache.size_kb,
          action: 'Clear',
          onAction: () => confirmThenRun('cache', () => api.delete('/api/data/cache')),
        },
        {
          key: 'snapshots', label: 'Snapshots', icon: 'bookmark', color: T.accent,
          count: summary.snapshots.count, size: summary.snapshots.size_kb,
          action: 'Clear all',
          onAction: () => confirmThenRun('snapshots', () => api.delete('/api/data/snapshots')),
        },
        {
          key: 'file_memory', label: 'File Maps', icon: 'file', color: T.blue,
          count: `${summary.file_memory.count} maps`, size: summary.file_memory.size_kb,
          action: 'Clear',
          onAction: () => confirmThenRun('file_memory', () => api.delete('/api/data/file-memory')),
        },
        {
          key: 'notifications', label: 'Notifications', icon: 'zap', color: T.warn,
          count: summary.notifications.count, size: summary.notifications.size_kb,
          action: 'Clear',
          onAction: () => confirmThenRun('notifications', () => api.delete('/api/data/notifications')),
        },
        {
          key: 'sltm', label: 'SLTM Memory', icon: 'brain', color: T.purple,
          count: `${summary.sltm.count} records`, size: summary.sltm.size_kb,
        },
      ] : [];

      return (
        <div style={{ background: T.surface, border: `1px solid ${T.border}`, borderRadius: 8, padding: 18 }}>
          <div style={{ display: "flex", alignItems: "center", marginBottom: 14 }}>
            <span style={{ fontSize: 12, fontWeight: 600, color: T.textMuted, textTransform: "uppercase", letterSpacing: 1, flex: 1 }}>Project Data</span>
            {summary && <span className="mono" style={{ fontSize: 11, color: T.textDim, marginRight: 8 }}>{summary.total_kb} KB total</span>}
            <button onClick={load} title="Refresh" disabled={loading}
              style={{ padding: "2px 6px", borderRadius: 4, border: `1px solid ${T.border}`, background: "transparent", cursor: "pointer", display: "flex", alignItems: "center" }}>
              <I name="refresh" size={10} color={T.textDim} style={loading ? { animation: "spin 0.6s linear infinite" } : {}} />
            </button>
          </div>

          {loading && !summary && <div style={{ fontSize: 12, color: T.textDim }}>Loading...</div>}

          {summary && (
            <div>
              <div style={{
                display: "grid", gridTemplateColumns: "1fr auto auto auto", gap: "0 10px",
                fontSize: 10, color: T.textDim, textTransform: "uppercase", letterSpacing: 1,
                padding: "0 0 6px", borderBottom: `1px solid ${T.border}`, marginBottom: 2
              }}>
                <span>Category</span><span style={{ textAlign: "right" }}>Items</span>
                <span style={{ textAlign: "right" }}>Size</span><span></span>
              </div>
              {rows.map(row => (
                <div key={row.key} style={{
                  display: "grid", gridTemplateColumns: "1fr auto auto auto",
                  gap: "0 10px", alignItems: "center", padding: "7px 0",
                  borderBottom: `1px solid ${T.border}22`
                }}>
                  <div style={{ display: "flex", alignItems: "center", gap: 7 }}>
                    <I name={row.icon} size={12} color={row.color || T.textDim} />
                    <span style={{ fontSize: 13, color: T.textMuted }}>{row.label}</span>
                  </div>
                  <span className="mono" style={{ fontSize: 11, color: T.textDim, textAlign: "right" }}>{row.count}</span>
                  <span className="mono" style={{ fontSize: 11, color: T.textDim, textAlign: "right", minWidth: 52 }}>
                    {row.size > 0 ? `${row.size} KB` : '—'}
                  </span>
                  <div style={{ minWidth: 76, textAlign: "right" }}>
                    {row.action && (
                      <button onClick={row.onAction} disabled={working === row.key}
                        style={{
                          padding: "3px 8px", borderRadius: 4, fontSize: 10, cursor: working === row.key ? "default" : "pointer",
                          fontFamily: "'JetBrains Mono', monospace",
                          border: `1px solid ${confirm === row.key ? T.error + '90' : T.border}`,
                          background: confirm === row.key ? `${T.error}18` : "transparent",
                          color: confirm === row.key ? T.error : T.textMuted,
                          transition: "all 0.15s"
                        }}>
                        {working === row.key ? '...' : confirm === row.key ? 'Confirm?' : row.action}
                      </button>
                    )}
                  </div>
                </div>
              ))}
            </div>
          )}

          {msg && (
            <div className="mono fade-up" style={{
              marginTop: 10, padding: "6px 10px", borderRadius: 5,
              background: T.surfaceAlt, fontSize: 11, color: msg.ok ? T.accent : T.error
            }}>
              {msg.text}
            </div>
          )}
        </div>
      );
    };

    const Settings = ({ stats }) => {
      const [generating, setGenerating] = useState(false);
      const [rebuilding, setRebuilding] = useState(false);
      const [msg, setMsg] = useState("");
      const [hybridCfg, setHybridCfg] = useState(null);
      const [savingHybrid, setSavingHybrid] = useState(false);
      const [agentsCfg, setAgentsCfg] = useState(null);
      const [agentsStatus, setAgentsStatus] = useState({});
      const [delegateCfg, setDelegateCfg] = useState(null);
      const [proxyCfg, setProxyCfg] = useState(null);
      const [ollamaModels, setOllamaModels] = useState([]);
      const [settingsBusy, setSettingsBusy] = useState({ agents: false, delegate: false, proxy: false });
      const [runningAgent, setRunningAgent] = useState("");
      const [mcpStatus, setMcpStatus] = useState(null);
      const [installing, setInstalling] = useState(false);
      const [mcpIde, setMcpIde] = useState("auto");
      const [installIde, setInstallIde] = useState("auto");
      const [installMcpMode, setInstallMcpMode] = useState("direct");
      const [showAddMcp, setShowAddMcp] = useState(false);
      const [newMcpName, setNewMcpName] = useState("");
      const [newMcpCmd, setNewMcpCmd] = useState("");
      const [newMcpArgs, setNewMcpArgs] = useState("");

      const loadMcpStatus = async (ide = mcpIde) => {
        const q = ide && ide !== "auto" ? `?ide=${encodeURIComponent(ide)}` : "";
        const status = await api.get(`/api/mcp/status${q}`);
        setMcpStatus(status);
        return status;
      };

      const [budgetCfg, setBudgetCfg] = useState(null);
      const [savingBudget, setSavingBudget] = useState(false);

      const loadHybridConfig = async () => {
        try {
          const cfg = await api.get('/api/hybrid/config');
          setHybridCfg(cfg || {});
        } catch (e) { }
      };

      const loadBudgetConfig = async () => {
        try {
          const cfg = await api.get('/api/budget/config');
          setBudgetCfg(cfg || {});
        } catch (e) { }
      };

      const saveBudgetConfig = async () => {
        if (!budgetCfg) return;
        setSavingBudget(true);
        try {
          const updated = await api.put('/api/budget/config', budgetCfg);
          setBudgetCfg(updated || {});
          setMsg("✓ Saved budget settings");
          setTimeout(() => setMsg(""), 3000);
        } catch (e) {
          setMsg(`✗ Save Budget: ${e.message}`);
        }
        setSavingBudget(false);
      };

      const updateBudgetField = (key, value) => {
        setBudgetCfg(prev => ({ ...(prev || {}), [key]: parseInt(value) || 0 }));
      };

      const toggleHybridFlag = async (flag) => {
        if (!hybridCfg) return;
        const next = !hybridCfg[flag];
        try {
          const updated = await api.put('/api/hybrid/config', { [flag]: next });
          setHybridCfg(updated || {});
        } catch (e) {
          setMsg(`✗ Toggle ${flag}: ${e.message}`);
        }
      };

      const loadConfigPanels = async () => {
        try {
          const [agents, delegate, proxy, models] = await Promise.all([
            api.get('/api/agents/config'),
            api.get('/api/delegate/config'),
            api.get('/api/proxy/config'),
            api.get('/api/ollama/models').catch(() => ({ models: [] })),
          ]);
          setAgentsCfg(agents || {});
          setDelegateCfg(delegate || {});
          setProxyCfg(proxy || {});
          setOllamaModels(Array.isArray(models?.models) ? models.models : []);
        } catch (e) { }
      };

      const loadAgentStatus = async () => {
        try {
          const status = await api.get('/api/agents/status');
          const mapped = {};
          for (const item of (status?.agents || [])) mapped[item.name] = item;
          setAgentsStatus(mapped);
        } catch (e) { }
      };

      useEffect(() => {
        loadMcpStatus("auto").then((s) => {
          if (s?.ide) {
            setMcpIde(s.ide);
            if (installIde === "auto") setInstallIde(s.ide);
          }
        }).catch(() => { });
        loadHybridConfig();
        loadBudgetConfig();
        loadConfigPanels();
        loadAgentStatus();
      }, []);

      useEffect(() => {
        const iv = setInterval(() => loadAgentStatus(), 15000);
        return () => clearInterval(iv);
      }, []);

      useEffect(() => {
        if (!mcpIde || mcpIde === "auto") return;
        loadMcpStatus(mcpIde).catch(() => { });
      }, [mcpIde]);

      const action = async (label, fn) => {
        try {
          const r = await fn();
          setMsg(`✓ ${label}: ${JSON.stringify(r).slice(0, 100)}`);
          setTimeout(() => setMsg(""), 4000);
        } catch (e) { setMsg(`✗ ${label}: ${e.message}`); }
      };

      const setBusy = (key, value) => setSettingsBusy(prev => ({ ...prev, [key]: value }));
      const inputStyle = {
        width: "100%",
        background: T.surfaceAlt,
        border: `1px solid ${T.border}`,
        color: T.text,
        padding: "6px 8px",
        borderRadius: 4,
        fontSize: 12,
        outline: "none",
      };
      const labelStyle = { fontSize: 10, color: T.textDim, textTransform: "uppercase", letterSpacing: 0.8, marginBottom: 4 };
      const updateAgentField = (agentName, key, value) => {
        setAgentsCfg(prev => ({
          ...(prev || {}),
          [agentName]: {
            ...(prev?.[agentName] || {}),
            [key]: value,
          },
        }));
      };
      const saveAgent = async (agentName) => {
        if (!agentsCfg?.[agentName]) return;
        setBusy("agents", true);
        try {
          const updated = await api.put('/api/agents/config', { [agentName]: agentsCfg[agentName] });
          setAgentsCfg(updated || {});
          await loadAgentStatus();
          setMsg(`✓ Saved ${agentName} settings`);
          setTimeout(() => setMsg(""), 3000);
        } catch (e) {
          setMsg(`✗ Save ${agentName}: ${e.message}`);
        }
        setBusy("agents", false);
      };
      const runAgentNow = async (agentName) => {
        setRunningAgent(agentName);
        try {
          await api.post(`/api/agents/run/${encodeURIComponent(agentName)}`, {});
          await loadAgentStatus();
          setMsg(`✓ Ran ${agentName}`);
          setTimeout(() => setMsg(""), 3000);
        } catch (e) {
          setMsg(`✗ Run ${agentName}: ${e.message}`);
        }
        setRunningAgent("");
      };
      const updateDelegateField = (key, value) => setDelegateCfg(prev => ({ ...(prev || {}), [key]: value }));
      const saveDelegate = async () => {
        if (!delegateCfg) return;
        setBusy("delegate", true);
        try {
          const updated = await api.put('/api/delegate/config', delegateCfg);
          setDelegateCfg(updated || {});
          setMsg("✓ Saved delegate settings");
          setTimeout(() => setMsg(""), 3000);
        } catch (e) {
          setMsg(`✗ Save Delegate: ${e.message}`);
        }
        setBusy("delegate", false);
      };
      const updateProxyField = (key, value) => setProxyCfg(prev => ({ ...(prev || {}), [key]: value }));
      const saveProxy = async () => {
        if (!proxyCfg) return;
        setBusy("proxy", true);
        try {
          const payload = {
            ...proxyCfg,
            always_visible: Array.isArray(proxyCfg.always_visible)
              ? proxyCfg.always_visible
              : String(proxyCfg.always_visible || "").split(",").map(v => v.trim()).filter(Boolean),
          };
          const updated = await api.put('/api/proxy/config', payload);
          setProxyCfg(updated || {});
          setMsg("✓ Saved proxy settings");
          setTimeout(() => setMsg(""), 3000);
        } catch (e) {
          setMsg(`✗ Save Proxy: ${e.message}`);
        }
        setBusy("proxy", false);
      };
      const renderBoolToggle = (label, checked, onChange, description) => (
        <label style={{ display: "flex", alignItems: "flex-start", justifyContent: "space-between", gap: 12, padding: "8px 0" }}>
          <div style={{ display: "flex", flexDirection: "column", gap: 3 }}>
            <span style={{ color: T.textMuted, fontSize: 12 }}>{label}</span>
            {description && <span style={{ color: T.textDim, fontSize: 11 }}>{description}</span>}
          </div>
          <button
            type="button"
            onClick={onChange}
            style={{
              padding: "4px 10px",
              borderRadius: 999,
              border: `1px solid ${T.border}`,
              background: checked ? T.accent + "22" : T.surfaceAlt,
              color: checked ? T.accent : T.textMuted,
              cursor: "pointer",
              fontSize: 11,
              fontWeight: 700,
              minWidth: 74,
            }}
          >
            {checked ? "ON" : "OFF"}
          </button>
        </label>
      );
      const renderModelOptions = () => (
        <>
          <option value="">Auto-select</option>
          {ollamaModels.map(model => <option key={model} value={model}>{model}</option>)}
        </>
      );

      return (
        <div className="fade-up" style={{ display: "flex", flexDirection: "column", gap: 16 }}>
          <div style={{ background: T.surface, border: `1px solid ${T.border}`, borderRadius: 8, padding: 18 }}>
            <div style={{ fontSize: 12, fontWeight: 600, color: T.textMuted, textTransform: "uppercase", letterSpacing: 1, marginBottom: 14 }}>Project Info</div>
            <div style={{ display: "flex", flexDirection: "column", gap: 8 }}>
              <div style={{ display: "flex", justifyContent: "space-between", padding: "8px 0", borderBottom: `1px solid ${T.border}` }}>
                <span style={{ color: T.textMuted, fontSize: 13 }}>Project Path</span>
                <span className="mono" style={{ color: T.text, fontSize: 12 }}>{stats?.project_path || "—"}</span>
              </div>
              <div style={{ display: "flex", justifyContent: "space-between", padding: "8px 0", borderBottom: `1px solid ${T.border}` }}>
                <span style={{ color: T.textMuted, fontSize: 13 }}>Files Indexed</span>
                <Badge color={T.blue}>{stats?.index?.files_indexed || 0}</Badge>
              </div>
              <div style={{ display: "flex", justifyContent: "space-between", padding: "8px 0" }}>
                <span style={{ color: T.textMuted, fontSize: 13 }}>Status</span>
                <Badge><GlowDot size={5} /> Active</Badge>
              </div>
            </div>
          </div>

          <div style={{ background: T.surface, border: `1px solid ${T.border}`, borderRadius: 8, padding: 18 }}>
            <div style={{ fontSize: 12, fontWeight: 600, color: T.textMuted, textTransform: "uppercase", letterSpacing: 1, marginBottom: 14 }}>Quick Actions</div>
            <div style={{ display: "flex", gap: 8, flexWrap: "wrap" }}>
              <Btn color={T.blue} onClick={async () => { setRebuilding(true); await action("Rebuild Index", () => api.post('/api/index/rebuild')); setRebuilding(false); }} disabled={rebuilding}>
                <I name="refresh" size={13} style={rebuilding ? { animation: "spin 0.6s linear infinite" } : {}} /> Rebuild Index
              </Btn>
              <Btn color={T.accent} onClick={async () => { setGenerating(true); await action("CLAUDE.md", () => api.post('/api/claudemd/save')); setGenerating(false); }} disabled={generating}>
                <I name="save" size={13} /> Save CLAUDE.md
              </Btn>
            </div>
            {msg && <div className="mono" style={{ marginTop: 12, padding: 10, borderRadius: 6, background: T.surfaceAlt, fontSize: 11, color: msg.startsWith("✓") ? T.accent : T.error }}>{msg}</div>}
          </div>

          <div style={{ background: T.surface, border: `1px solid ${T.border}`, borderRadius: 8, padding: 18 }}>
            <div style={{ fontSize: 12, fontWeight: 600, color: T.textMuted, textTransform: "uppercase", letterSpacing: 1, marginBottom: 14 }}>Budget & Session Guidance</div>
            <div style={{ color: T.textDim, fontSize: 11, marginBottom: 14 }}>
              Controls when C3 nudges the AI to snapshot and restart. Single threshold model.
            </div>

            {/* Nudge & Notification toggles */}
            <div style={{ display: "flex", flexDirection: "column", gap: 6, marginBottom: 16 }}>
              {renderBoolToggle("Budget Nudges", !!hybridCfg?.show_context_nudges,
                () => toggleHybridFlag("show_context_nudges"),
                "Append budget warning when over threshold. Tells the AI when to snapshot and inform you.")}
              {renderBoolToggle("Agent Alerts", !!hybridCfg?.prepend_notifications,
                () => toggleHybridFlag("prepend_notifications"),
                "Prepend critical alerts inline so the AI sees and relays them to you.")}
            </div>

            {/* Budget threshold */}
            <div style={{ fontSize: 11, fontWeight: 600, color: T.textMuted, textTransform: "uppercase", letterSpacing: 0.8, marginBottom: 8 }}>Budget Threshold (tokens)</div>
            <div style={{ display: "grid", gridTemplateColumns: "1fr", gap: 8, marginBottom: 14, maxWidth: 220 }}>
              <div style={{ display: "flex", flexDirection: "column", gap: 3 }}>
                <label style={labelStyle}>Threshold</label>
                <input type="number" value={budgetCfg?.threshold || ""} style={inputStyle} min="1000" step="5000"
                  onChange={e => updateBudgetField("threshold", e.target.value)} disabled={!budgetCfg} />
                <span style={{ fontSize: 9, color: T.textDim }}>Nudge AI to restart when C3 response tokens exceed this</span>
              </div>
            </div>

            <div style={{ display: "flex", justifyContent: "flex-end" }}>
              <button onClick={saveBudgetConfig} disabled={!budgetCfg || savingBudget} style={{
                padding: "6px 14px", borderRadius: 6, border: `1px solid ${T.accent}40`,
                background: T.accent + "15", color: T.accent, cursor: (!budgetCfg || savingBudget) ? "default" : "pointer",
                fontSize: 12, fontWeight: 600, opacity: (!budgetCfg || savingBudget) ? 0.5 : 1
              }}>
                {savingBudget ? "Saving..." : "Save Budget Settings"}
              </button>
            </div>
          </div>

          <div style={{ background: T.surface, border: `1px solid ${T.border}`, borderRadius: 8, padding: 18 }}>
            <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", gap: 12, marginBottom: 14 }}>
              <div>
                <div style={{ fontSize: 12, fontWeight: 600, color: T.textMuted, textTransform: "uppercase", letterSpacing: 1 }}>Agent Settings</div>
                <div style={{ color: T.textDim, fontSize: 11, marginTop: 4 }}>Tune background automation without editing `.c3/config.json` directly.</div>
              </div>
              <Badge color={T.blue}>{agentsCfg ? `${Object.keys(agentsCfg).length} agents` : "Loading..."}</Badge>
            </div>
            {agentsCfg ? (
              <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fit, minmax(280px, 1fr))", gap: 10 }}>
                {Object.entries(agentsCfg).map(([agentName, cfg]) => (
                  <div key={agentName} style={{ background: T.surfaceAlt, border: `1px solid ${T.border}`, borderRadius: 8, padding: 12, display: "flex", flexDirection: "column", gap: 10 }}>
                    {(() => {
                      const live = agentsStatus[agentName] || {};
                      return (
                        <>
                    <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", gap: 8 }}>
                      <div style={{ display: "flex", flexDirection: "column", gap: 4 }}>
                        <span style={{ color: T.text, fontSize: 13, fontWeight: 600 }}>{agentName}</span>
                        <span className="mono" style={{ color: T.textDim, fontSize: 10 }}>interval: {cfg.interval}s</span>
                      </div>
                      <Badge color={!cfg.enabled ? T.textMuted : (live.running ? T.accent : T.warn)}>
                        {!cfg.enabled ? "Disabled" : (live.running ? "Running" : "Idle")}
                      </Badge>
                    </div>
                    <div style={{ display: "grid", gridTemplateColumns: "repeat(3, minmax(0, 1fr))", gap: 8 }}>
                      <div style={{ background: T.surface, border: `1px solid ${T.border}`, borderRadius: 6, padding: "8px 10px" }}>
                        <div style={{ color: T.textDim, fontSize: 10, textTransform: "uppercase", letterSpacing: 0.8 }}>Checks</div>
                        <div className="mono" style={{ color: T.text, fontSize: 14, marginTop: 3 }}>{live.check_count ?? 0}</div>
                      </div>
                      <div style={{ background: T.surface, border: `1px solid ${T.border}`, borderRadius: 6, padding: "8px 10px" }}>
                        <div style={{ color: T.textDim, fontSize: 10, textTransform: "uppercase", letterSpacing: 0.8 }}>Errors</div>
                        <div className="mono" style={{ color: (live.error_count || 0) > 0 ? T.error : T.text, fontSize: 14, marginTop: 3 }}>{live.error_count ?? 0}</div>
                      </div>
                      <div style={{ background: T.surface, border: `1px solid ${T.border}`, borderRadius: 6, padding: "8px 10px" }}>
                        <div style={{ color: T.textDim, fontSize: 10, textTransform: "uppercase", letterSpacing: 0.8 }}>Last Check</div>
                        <div className="mono" style={{ color: T.text, fontSize: 11, marginTop: 4 }}>
                          {live.last_check ? timeAgo(new Date((live.last_check || 0) * 1000).toISOString()) : "Never"}
                        </div>
                      </div>
                    </div>
                    {renderBoolToggle("Enabled", !!cfg.enabled, () => updateAgentField(agentName, "enabled", !cfg.enabled))}
                    {"use_ai" in cfg && renderBoolToggle("AI enhancement", !!cfg.use_ai, () => updateAgentField(agentName, "use_ai", !cfg.use_ai))}
                    <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 8 }}>
                      <div>
                        <div style={labelStyle}>Interval (sec)</div>
                        <input type="number" min="5" value={cfg.interval ?? ""} onChange={e => updateAgentField(agentName, "interval", parseInt(e.target.value || "0", 10) || 0)} style={inputStyle} />
                      </div>
                      {"ai_model" in cfg && (
                        <div>
                          <div style={labelStyle}>AI Model</div>
                          <select value={cfg.ai_model || ""} onChange={e => updateAgentField(agentName, "ai_model", e.target.value)} style={inputStyle}>
                            {renderModelOptions()}
                          </select>
                        </div>
                      )}
                    </div>
                    <div style={{ display: "flex", gap: 8, flexWrap: "wrap" }}>
                      <Btn color={T.blue} onClick={() => saveAgent(agentName)} disabled={settingsBusy.agents}>
                        <I name="save" size={13} /> {settingsBusy.agents ? "Saving..." : "Save Agent"}
                      </Btn>
                      <Btn
                        color={T.accent}
                        variant="outline"
                        onClick={() => runAgentNow(agentName)}
                        disabled={runningAgent === agentName || !cfg.enabled}
                      >
                        <I name="zap" size={13} color={runningAgent === agentName ? T.textMuted : T.accent} />
                        {runningAgent === agentName ? "Running..." : "Run Now"}
                      </Btn>
                    </div>
                        </>
                      );
                    })()}
                  </div>
                ))}
              </div>
            ) : (
              <div style={{ color: T.textDim, fontSize: 12 }}>Loading agent settings...</div>
            )}
          </div>

          <div style={{ background: T.surface, border: `1px solid ${T.border}`, borderRadius: 8, padding: 18 }}>
            <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", gap: 12, marginBottom: 14 }}>
              <div>
                <div style={{ fontSize: 12, fontWeight: 600, color: T.textMuted, textTransform: "uppercase", letterSpacing: 1 }}>Delegate Settings</div>
                <div style={{ color: T.textDim, fontSize: 11, marginTop: 4 }}>Control local model offload policy, context budget, and fallback behavior.</div>
              </div>
              <Badge color={delegateCfg?.enabled ? T.accent : T.textMuted}>{delegateCfg?.enabled ? "Enabled" : "Disabled"}</Badge>
            </div>
            {delegateCfg ? (
              <div style={{ display: "flex", flexDirection: "column", gap: 12 }}>
                <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fit, minmax(220px, 1fr))", gap: 12 }}>
                  <div style={{ background: T.surfaceAlt, border: `1px solid ${T.border}`, borderRadius: 8, padding: 12 }}>
                    {renderBoolToggle("Delegate enabled", !!delegateCfg.enabled, () => updateDelegateField("enabled", !delegateCfg.enabled))}
                    {renderBoolToggle("Threshold policy", !!delegateCfg.threshold_enabled, () => updateDelegateField("threshold_enabled", !delegateCfg.threshold_enabled), "Delegate automatically once token threshold is met.")}
                    {renderBoolToggle("Fallback models", !!delegateCfg.allow_model_fallback, () => updateDelegateField("allow_model_fallback", !delegateCfg.allow_model_fallback))}
                  </div>
                  <div style={{ background: T.surfaceAlt, border: `1px solid ${T.border}`, borderRadius: 8, padding: 12 }}>
                    {renderBoolToggle("Auto-compress", !!delegateCfg.auto_compress, () => updateDelegateField("auto_compress", !delegateCfg.auto_compress))}
                    {renderBoolToggle("Auto-search", !!delegateCfg.auto_search, () => updateDelegateField("auto_search", !delegateCfg.auto_search))}
                    {renderBoolToggle("Auto-vector search", !!delegateCfg.auto_vector_search, () => updateDelegateField("auto_vector_search", !delegateCfg.auto_vector_search))}
                    {renderBoolToggle("Auto-activity log", !!delegateCfg.auto_activity_log, () => updateDelegateField("auto_activity_log", !delegateCfg.auto_activity_log))}
                  </div>
                </div>
                <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fit, minmax(180px, 1fr))", gap: 10 }}>
                  <div>
                    <div style={labelStyle}>Preferred Model</div>
                    <select value={delegateCfg.preferred_model || ""} onChange={e => updateDelegateField("preferred_model", e.target.value)} style={inputStyle}>
                      {renderModelOptions()}
                    </select>
                  </div>
                  <div>
                    <div style={labelStyle}>Max Tokens</div>
                    <input type="number" min="64" value={delegateCfg.max_tokens ?? ""} onChange={e => updateDelegateField("max_tokens", parseInt(e.target.value || "0", 10) || 0)} style={inputStyle} />
                  </div>
                  <div>
                    <div style={labelStyle}>Search Top K</div>
                    <input type="number" min="1" value={delegateCfg.search_top_k ?? ""} onChange={e => updateDelegateField("search_top_k", parseInt(e.target.value || "0", 10) || 0)} style={inputStyle} />
                  </div>
                  <div>
                    <div style={labelStyle}>Max Context Tokens</div>
                    <input type="number" min="100" value={delegateCfg.max_context_tokens ?? ""} onChange={e => updateDelegateField("max_context_tokens", parseInt(e.target.value || "0", 10) || 0)} style={inputStyle} />
                  </div>
                  <div>
                    <div style={labelStyle}>Threshold Min Tokens</div>
                    <input type="number" min="1" value={delegateCfg.threshold_min_total_tokens ?? ""} onChange={e => updateDelegateField("threshold_min_total_tokens", parseInt(e.target.value || "0", 10) || 0)} style={inputStyle} />
                  </div>
                </div>
                <div style={{ display: "flex", justifyContent: "flex-end" }}>
                  <Btn color={T.purple} onClick={saveDelegate} disabled={settingsBusy.delegate}>
                    <I name="save" size={13} /> {settingsBusy.delegate ? "Saving..." : "Save Delegate Settings"}
                  </Btn>
                </div>
              </div>
            ) : (
              <div style={{ color: T.textDim, fontSize: 12 }}>Loading delegate settings...</div>
            )}
          </div>

          <div style={{ background: T.surface, border: `1px solid ${T.border}`, borderRadius: 8, padding: 18 }}>
            <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", gap: 12, marginBottom: 14 }}>
              <div>
                <div style={{ fontSize: 12, fontWeight: 600, color: T.textMuted, textTransform: "uppercase", letterSpacing: 1 }}>Proxy Settings</div>
                <div style={{ color: T.textDim, fontSize: 11, marginTop: 4 }}>Manage proxy filtering behavior for advanced MCP setups.</div>
              </div>
              <Badge color={proxyCfg?.PROXY_DISABLE ? T.textMuted : T.warn}>{proxyCfg?.PROXY_DISABLE ? "Disabled" : "Available"}</Badge>
            </div>
            {proxyCfg ? (
              <div style={{ display: "flex", flexDirection: "column", gap: 12 }}>
                <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fit, minmax(220px, 1fr))", gap: 12 }}>
                  <div style={{ background: T.surfaceAlt, border: `1px solid ${T.border}`, borderRadius: 8, padding: 12 }}>
                    {renderBoolToggle("Proxy enabled", !proxyCfg.PROXY_DISABLE, () => updateProxyField("PROXY_DISABLE", !proxyCfg.PROXY_DISABLE))}
