                    {renderBoolToggle("Filter tools", !!proxyCfg.filter_tools, () => updateProxyField("filter_tools", !proxyCfg.filter_tools))}
                    {renderBoolToggle("Use SLM", !!proxyCfg.use_slm, () => updateProxyField("use_slm", !proxyCfg.use_slm))}
                    {renderBoolToggle("Inject context summary", !!proxyCfg.inject_context_summary, () => updateProxyField("inject_context_summary", !proxyCfg.inject_context_summary))}
                  </div>
                  <div style={{ background: T.surfaceAlt, border: `1px solid ${T.border}`, borderRadius: 8, padding: 12, display: "grid", gridTemplateColumns: "1fr 1fr", gap: 10, alignContent: "start" }}>
                    <div>
                      <div style={labelStyle}>Max Tools</div>
                      <input type="number" min="1" value={proxyCfg.max_tools ?? ""} onChange={e => updateProxyField("max_tools", parseInt(e.target.value || "0", 10) || 0)} style={inputStyle} />
                    </div>
                    <div>
                      <div style={labelStyle}>Context Window</div>
                      <input type="number" min="1" value={proxyCfg.context_window_size ?? ""} onChange={e => updateProxyField("context_window_size", parseInt(e.target.value || "0", 10) || 0)} style={inputStyle} />
                    </div>
                    <div style={{ gridColumn: "1 / -1" }}>
                      <div style={labelStyle}>SLM Model</div>
                      <select value={proxyCfg.slm_model || ""} onChange={e => updateProxyField("slm_model", e.target.value)} style={inputStyle}>
                        {renderModelOptions()}
                      </select>
                    </div>
                    <div style={{ gridColumn: "1 / -1" }}>
                      <div style={labelStyle}>Always Visible Categories</div>
                      <input
                        value={Array.isArray(proxyCfg.always_visible) ? proxyCfg.always_visible.join(", ") : (proxyCfg.always_visible || "")}
                        onChange={e => updateProxyField("always_visible", e.target.value)}
                        style={inputStyle}
                        placeholder="core, search, memory"
                      />
                    </div>
                  </div>
                </div>
                <div style={{ display: "flex", justifyContent: "flex-end" }}>
                  <Btn color={T.warn} onClick={saveProxy} disabled={settingsBusy.proxy}>
                    <I name="save" size={13} /> {settingsBusy.proxy ? "Saving..." : "Save Proxy Settings"}
                  </Btn>
                </div>
              </div>
            ) : (
              <div style={{ color: T.textDim, fontSize: 12 }}>Loading proxy settings...</div>
            )}
          </div>

          <ProjectData />

          <ClaudeMdPanel />

          <div style={{ background: T.surface, border: `1px solid ${T.border}`, borderRadius: 8, padding: 18 }}>
            <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 14 }}>
              <div style={{ fontSize: 12, fontWeight: 600, color: T.textMuted, textTransform: "uppercase", letterSpacing: 1 }}>MCP Servers</div>
              <button onClick={() => setShowAddMcp(!showAddMcp)} style={{ background: "transparent", border: "none", color: T.accent, cursor: "pointer", fontSize: 12 }}>
                {showAddMcp ? "Cancel" : "+ Add Server"}
              </button>
            </div>
            <div style={{ display: "flex", flexDirection: "column", gap: 8 }}>
              <div style={{ display: "flex", justifyContent: "space-between", padding: "8px 0", borderBottom: `1px solid ${T.border}` }}>
                <span style={{ color: T.textMuted, fontSize: 13 }}>Status</span>
                <Badge color={(mcpStatus?.active ?? mcpStatus?.configured) ? T.accent : T.textMuted}>
                  <GlowDot color={(mcpStatus?.active ?? mcpStatus?.configured) ? T.accent : T.textDim} size={5} />
                  {(mcpStatus?.active ?? mcpStatus?.configured) ? "Active" : (mcpStatus?.configured ? "Disabled" : "Not configured")}
                </Badge>
              </div>
              <div style={{ display: "flex", justifyContent: "space-between", padding: "8px 0", borderBottom: `1px solid ${T.border}` }}>
                <span style={{ color: T.textMuted, fontSize: 13 }}>MCP Mode</span>
                <Badge color={mcpStatus?.mode === "proxy" ? T.warn : T.accent}>
                  {mcpStatus?.mode === "proxy" ? "Proxy (Advanced)" : "Direct (Recommended)"}
                </Badge>
              </div>
              <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", padding: "8px 0", borderBottom: `1px solid ${T.border}` }}>
                <span style={{ color: T.textMuted, fontSize: 13 }}>Target IDE</span>
                <select value={mcpIde} onChange={e => setMcpIde(e.target.value)} style={{ background: T.surfaceAlt, border: `1px solid ${T.border}`, color: T.text, padding: "4px 8px", borderRadius: 4, fontSize: 12, minWidth: 170, outline: "none" }}>
                  <option value="claude">Claude Code</option>
                  <option value="gemini">Gemini CLI</option>
                  <option value="vscode">VS Code Copilot</option>
                  <option value="cursor">Cursor</option>
                  <option value="codex">OpenAI Codex</option>
                  <option value="antigravity">Google Antigravity</option>
                </select>
              </div>
              {showAddMcp && (
                <div style={{ display: "flex", flexDirection: "column", gap: 8, padding: 12, background: T.surfaceAlt, borderRadius: 6, marginBottom: 8 }}>
                  <input value={newMcpName} onChange={e => setNewMcpName(e.target.value)} placeholder="Server Name (e.g. sqlite)" style={{ background: T.surface, border: `1px solid ${T.border}`, color: T.text, padding: "6px 8px", borderRadius: 4, fontSize: 12 }} />
                  <input value={newMcpCmd} onChange={e => setNewMcpCmd(e.target.value)} placeholder="Command (e.g. npx)" style={{ background: T.surface, border: `1px solid ${T.border}`, color: T.text, padding: "6px 8px", borderRadius: 4, fontSize: 12 }} />
                  <input value={newMcpArgs} onChange={e => setNewMcpArgs(e.target.value)} placeholder="Args (comma separated, e.g. -y,@modelcontextprotocol/server-sqlite,--db,test.db)" style={{ background: T.surface, border: `1px solid ${T.border}`, color: T.text, padding: "6px 8px", borderRadius: 4, fontSize: 12 }} />
                  <Btn color={T.accent} onClick={async () => {
                    if (!newMcpName || !newMcpCmd) return alert("Name and command required");
                    const args = newMcpArgs ? newMcpArgs.split(',').map(a => a.trim()) : [];
                    try {
                      await api.post('/api/mcp/servers', { ide: mcpIde, name: newMcpName, command: newMcpCmd, args });
                      setNewMcpName(""); setNewMcpCmd(""); setNewMcpArgs(""); setShowAddMcp(false);
                      loadMcpStatus(mcpIde).catch(() => { });
                    } catch (e) { alert("Failed to add: " + e.message); }
                  }}>Save Server</Btn>
                </div>
              )}
              <div style={{ color: T.textMuted, fontSize: 12, marginTop: 6 }}>Installed MCPs</div>
              {mcpStatus?.config?.mcpServers && Object.keys(mcpStatus.config.mcpServers).length > 0 ? (
                <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fill, minmax(220px, 1fr))", gap: 8 }}>
                  {Object.entries(mcpStatus.config.mcpServers).map(([name, srv]) => (
                    <div key={name} style={{ background: T.surfaceAlt, border: `1px solid ${T.border}`, borderRadius: 8, padding: 10, display: "flex", flexDirection: "column", gap: 6 }}>
                      <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", gap: 8 }}>
                        <Badge color={name === "c3" ? T.accent : T.blue}>{name}</Badge>
                        <button
                          onClick={async () => {
                            const msg = name === "c3"
                              ? `Remove MCP server '${name}' from ${mcpIde}? This also removes related C3 files/hooks for this IDE.`
                              : `Remove MCP server '${name}' from ${mcpIde}?`;
                            if (!confirm(msg)) return;
                            try {
                              await api.del(`/api/mcp/servers/${encodeURIComponent(name)}?ide=${encodeURIComponent(mcpIde)}&remove_files=1`);
                              loadMcpStatus(mcpIde).catch(() => { });
                            } catch (e) {
                              alert("Failed to remove: " + e.message);
                            }
                          }}
                          title={`Remove ${name}`}
                          style={{ background: "transparent", border: "none", color: T.error, cursor: "pointer", padding: 2, lineHeight: 0 }}
                        >
                          <I name="trash" size={14} color={T.error} />
                        </button>
                      </div>
                      <div className="mono" style={{ fontSize: 10, color: T.textDim, wordBreak: "break-all", minHeight: 24 }}>
                        {srv.command || "No command"}
                      </div>
                      <div className="mono" style={{ fontSize: 10, color: T.textDim, wordBreak: "break-all" }}>
                        {(srv.args || []).join(" ")}
                      </div>
                    </div>
                  ))}
                </div>
              ) : (
                <div style={{ padding: "10px 0", color: T.textDim, fontSize: 12 }}>No MCP servers configured for {mcpIde}.</div>
              )}
              <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", padding: "8px 0", borderTop: `1px solid ${T.border}` }}>
                <span style={{ color: T.textMuted, fontSize: 13 }}>C3 Server Script</span>
                <Badge color={mcpStatus?.server_found ? T.accent : T.textDim}>
                  {mcpStatus?.server_found ? "Found" : "Not found"}
                </Badge>
              </div>
              <div style={{ display: "flex", alignItems: "center", gap: 8, marginTop: 4 }}>
                <select value={installIde} onChange={e => setInstallIde(e.target.value)} style={{ background: T.surfaceAlt, border: `1px solid ${T.border}`, color: T.text, padding: "6px", borderRadius: 4, fontSize: 12, flex: 1, outline: "none" }}>
                  <option value="auto">Auto-detect IDE</option>
                  <option value="claude">Claude Code</option>
                  <option value="antigravity">Google Antigravity</option>
                  <option value="gemini">Gemini CLI</option>
                  <option value="vscode">VS Code Copilot</option>
                  <option value="cursor">Cursor</option>
                  <option value="codex">OpenAI Codex</option>
                </select>
                <select value={installMcpMode} onChange={e => setInstallMcpMode(e.target.value)} style={{ background: T.surfaceAlt, border: `1px solid ${T.border}`, color: T.text, padding: "6px", borderRadius: 4, fontSize: 12, outline: "none" }}>
                  <option value="direct">Direct</option>
                  <option value="proxy">Proxy (Advanced)</option>
                </select>
                <Btn color={T.purple} onClick={async () => {
                  setInstalling(true);
                  await action("MCP Install", () => api.post('/api/mcp/install', { ide: installIde, mcp_mode: installMcpMode }));
                  const targetIde = installIde === "auto" ? (mcpStatus?.ide || mcpIde) : installIde;
                  setMcpIde(targetIde);
                  loadMcpStatus(targetIde).catch(() => { });
                  setInstalling(false);
                }} disabled={installing}>
                  <I name="terminal" size={13} /> {installing ? "Installing..." : (mcpStatus?.configured ? "Reinstall C3 MCP" : "Install C3 MCP")}
                </Btn>
              </div>
            </div>
          </div>

          <div style={{ background: T.surface, border: `1px solid ${T.border}`, borderRadius: 8, padding: 18 }}>
            <div style={{ fontSize: 12, fontWeight: 600, color: T.textMuted, textTransform: "uppercase", letterSpacing: 1, marginBottom: 14 }}>Optimization Suggestions</div>
            <OptSuggestions />
          </div>
        </div>
      );
    };

    const ClaudeMdPanel = () => {
      const [checkResult, setCheckResult] = useState(null);
      const [compactResult, setCompactResult] = useState(null);
      const [promoteResult, setPromoteResult] = useState(null);
      const [checking, setChecking] = useState(false);
      const [compacting, setCompacting] = useState(false);
      const [promoting, setPromoting] = useState(false);
      const [expanded, setExpanded] = useState(null); // 'check' | 'compact' | 'promote'

      const runCheck = async () => {
        setChecking(true);
        try { const r = await api.get('/api/claudemd/check'); setCheckResult(r); setExpanded('check'); } catch (e) { setCheckResult({ error: e.message }); }
        setChecking(false);
      };
      const runCompact = async () => {
        setCompacting(true);
        try { const r = await api.post('/api/claudemd/compact', { target_lines: 150 }); setCompactResult(r); setExpanded('compact'); } catch (e) { setCompactResult({ error: e.message }); }
        setCompacting(false);
      };
      const runPromote = async () => {
        setPromoting(true);
        try { const r = await api.get('/api/claudemd/promote'); setPromoteResult(r); setExpanded('promote'); } catch (e) { setPromoteResult({ error: e.message }); }
        setPromoting(false);
      };

      const severityColor = s => s === 'error' ? T.error : s === 'warning' ? '#ffb224' : T.textMuted;

      return (
        <div style={{ background: T.surface, border: `1px solid ${T.border}`, borderRadius: 8, padding: 18 }}>
          <div style={{ fontSize: 12, fontWeight: 600, color: T.textMuted, textTransform: "uppercase", letterSpacing: 1, marginBottom: 14 }}>CLAUDE.md Management</div>
          <div style={{ display: "flex", gap: 8, flexWrap: "wrap", marginBottom: 12 }}>
            <Btn color={T.blue} onClick={runCheck} disabled={checking}>
              <I name="search" size={13} style={checking ? { animation: "spin 0.6s linear infinite" } : {}} /> Health Check
            </Btn>
            <Btn color={T.purple} onClick={runCompact} disabled={compacting}>
              <I name="minimize" size={13} /> Compact
            </Btn>
            <Btn color={T.accent} onClick={runPromote} disabled={promoting}>
              <I name="bookmark" size={13} /> Promote Insights
            </Btn>
          </div>

          {expanded === 'check' && checkResult && !checkResult.error && (
            <div className="fade-up" style={{ padding: 12, background: T.surfaceAlt, borderRadius: 6, fontSize: 12, lineHeight: 1.6 }}>
              <div style={{ display: "flex", justifyContent: "space-between", marginBottom: 8 }}>
                <Badge color={checkResult.status === 'ok' ? T.accent : '#ffb224'}>{checkResult.status?.toUpperCase()}</Badge>
                {checkResult.lines && <span className="mono" style={{ color: T.textDim, fontSize: 11 }}>{checkResult.lines} lines / {checkResult.tokens} tokens</span>}
              </div>
              {(checkResult.issues || []).map((issue, i) => (
                <div key={i} style={{ padding: "4px 0", color: severityColor(issue.severity), borderLeft: `3px solid ${severityColor(issue.severity)}`, paddingLeft: 10, marginBottom: 4 }}>
                  {issue.message}
                </div>
              ))}
            </div>
          )}

          {expanded === 'compact' && compactResult && !compactResult.error && (
            <div className="fade-up" style={{ padding: 12, background: T.surfaceAlt, borderRadius: 6, fontSize: 12, lineHeight: 1.6 }}>
              <div style={{ display: "flex", gap: 16, marginBottom: 8 }}>
                <span className="mono" style={{ color: T.textDim }}>Before: {compactResult.original_lines} lines</span>
                <span className="mono" style={{ color: T.accent }}>After: {compactResult.compacted_lines} lines</span>
              </div>
              {(compactResult.actions || []).map((a, i) => (
                <div key={i} style={{ color: T.textMuted, borderLeft: `3px solid ${T.accent}`, paddingLeft: 10, marginBottom: 4 }}>{a}</div>
              ))}
            </div>
          )}

          {expanded === 'promote' && promoteResult && !promoteResult.error && (
            <div className="fade-up" style={{ padding: 12, background: T.surfaceAlt, borderRadius: 6, fontSize: 12, lineHeight: 1.6 }}>
              <div style={{ color: T.textMuted, marginBottom: 8 }}>{promoteResult.message}</div>
              {Object.entries(promoteResult.candidates || {}).map(([section, items]) => (
                <div key={section} style={{ marginBottom: 10 }}>
                  <div style={{ fontWeight: 600, color: T.text, marginBottom: 4 }}>{section}</div>
                  {items.map((c, i) => (
                    <div key={i} className="mono" style={{ color: T.textMuted, paddingLeft: 10, borderLeft: `3px solid ${T.purple}`, marginBottom: 4, fontSize: 11 }}>
                      {c.snippet} <span style={{ color: T.textDim }}>(relevance: {c.relevance_count})</span>
                    </div>
                  ))}
                </div>
              ))}
            </div>
          )}

          {(checkResult?.error || compactResult?.error || promoteResult?.error) && (
            <div style={{ color: T.error, fontSize: 12, marginTop: 6 }}>
              {checkResult?.error || compactResult?.error || promoteResult?.error}
            </div>
          )}
        </div>
      );
    };

    const OptSuggestions = () => {
      const [suggestions, setSuggestions] = useState([]);
      useEffect(() => { api.get('/api/optimize').then(r => setSuggestions(r.suggestions || [])).catch(() => { }); }, []);
      return (
        <div style={{ display: "flex", flexDirection: "column", gap: 6 }}>
          {suggestions.map((s, i) => (
            <div key={i} style={{ padding: 10, background: T.surfaceAlt, borderRadius: 6, fontSize: 12, color: T.textMuted, lineHeight: 1.5, borderLeft: `3px solid ${T.accent}` }}>{s}</div>
          ))}
          {suggestions.length === 0 && <div style={{ color: T.textDim, fontSize: 12 }}>Run some sessions to get optimization tips.</div>}
        </div>
      );
    };

    // ─── Activity Log ─────────────────────────
    const ActivityLog = ({ autoRefresh, setAutoRefresh }) => {
      const [events, setEvents] = useState([]);
      const [actStats, setActStats] = useState(null);
      const [filter, setFilter] = useState("");
      const [loading, setLoading] = useState(true);
      const [expanded, setExpanded] = useState(null);

      const eventTypes = ["tool_call", "decision", "file_change", "fact_stored", "session_start", "session_save"];

      const loadData = useCallback(async () => {
        try {
          const params = new URLSearchParams({ limit: "100" });
          if (filter) params.set("type", filter);
          const [ev, st] = await Promise.all([
            api.get(`/api/activity?${params}`),
            api.get("/api/activity/stats"),
          ]);
          setEvents(ev);
          setActStats(st);
        } catch (e) { }
        setLoading(false);
      }, [filter]);

      useEffect(() => { loadData(); }, [loadData]);

      useEffect(() => {
        if (!autoRefresh) return;
        const iv = setInterval(loadData, 5000);
        return () => clearInterval(iv);
      }, [autoRefresh, loadData]);

      const todayCount = events.filter(e => {
        if (!e.timestamp) return false;
        return new Date(e.timestamp).toDateString() === new Date().toDateString();
      }).length;

      const eventSummary = (e) => {
        switch (e.type) {
          case "tool_call": return `${e.tool || "unknown"} — ${e.result_summary || JSON.stringify(e.args || {}).slice(0, 60)}`;
          case "decision": return e.decision || "";
          case "file_change": return `${e.file || ""} (${e.change_type || "modified"})`;
          case "fact_stored": return `[${e.category || "general"}] ${e.fact || ""}`;
          case "session_start": return `Session ${e.session_id || ""} — ${e.description || ""}`;
          case "session_save": return `Session ${e.session_id || ""} saved${e.summary ? ": " + e.summary : ""}`;
          default: return JSON.stringify(e).slice(0, 80);
        }
      };

      return (
        <div className="fade-up" style={{ display: "flex", flexDirection: "column", gap: 18 }}>
          <div style={{ display: "flex", gap: 12, flexWrap: "wrap" }}>
            <StatBox label="Total Events" value={actStats?.total || 0} sub={`since ${actStats?.first ? new Date(actStats.first).toLocaleDateString() : "—"}`} color={T.accent} loading={loading} />
            <StatBox label="Today" value={todayCount} sub="events today" color={T.blue} loading={loading} />
            {Object.entries(actStats?.by_type || {}).slice(0, 3).map(([type, count]) => (
              <StatBox key={type} label={type.replace("_", " ")} value={count} color={typeColors[type] || T.textMuted} />
            ))}
          </div>

          <div style={{ display: "flex", gap: 10, alignItems: "center", flexWrap: "wrap" }}>
            <select value={filter} onChange={e => setFilter(e.target.value)} className="mono"
              style={{ padding: "7px 12px", borderRadius: 6, background: T.surfaceAlt, border: `1px solid ${T.border}`, color: T.text, fontSize: 12, outline: "none" }}>
              <option value="">All types</option>
              {eventTypes.map(t => <option key={t} value={t}>{t}</option>)}
            </select>
            <button onClick={() => setAutoRefresh(!autoRefresh)} className="mono"
              style={{
                padding: "7px 14px", borderRadius: 6, border: `1px solid ${autoRefresh ? T.accent + "60" : T.border}`,
                background: autoRefresh ? T.accentDim : "transparent", color: autoRefresh ? T.accent : T.textMuted, fontSize: 12, cursor: "pointer"
              }}>
              {autoRefresh ? "Auto-refresh ON" : "Auto-refresh OFF"}
            </button>
            <Btn variant="outline" onClick={loadData}><I name="refresh" size={13} /> Refresh</Btn>
          </div>

          <div style={{ background: T.surface, border: `1px solid ${T.border}`, borderRadius: 8, overflow: "hidden" }}>
            {events.length === 0 && !loading && (
              <div style={{ padding: 30, textAlign: "center", color: T.textMuted, fontSize: 13 }}>No activity logged yet. Use MCP tools to generate events.</div>
            )}
            {events.map((e, i) => (
              <div key={i} onClick={() => setExpanded(expanded === i ? null : i)}
                style={{
                  padding: "10px 16px", borderBottom: `1px solid ${T.border}`, cursor: "pointer",
                  background: expanded === i ? T.surfaceAlt : "transparent", transition: "background 0.15s"
                }}>
                <div style={{ display: "flex", alignItems: "center", gap: 10 }}>
                  <span className="mono" style={{ fontSize: 10, color: T.textDim, minWidth: 55, flexShrink: 0 }}>{timeAgo(e.timestamp)}</span>
                  <Badge color={typeColors[e.type] || T.textMuted}>{e.type}</Badge>
                  {e.type === "tool_call" && e.tool && <Badge color={getToolColor(e.tool)}>{e.tool}</Badge>}
                  <span className="mono" style={{ fontSize: 11, color: T.textMuted, flex: 1, overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }}>
                    {e.type === "tool_call" ? (e.result_summary || JSON.stringify(e.args || {}).slice(0, 60)) : eventSummary(e)}
                  </span>
                  <I name="chevron" size={12} color={T.textDim} style={{ transform: expanded === i ? "rotate(90deg)" : "none", transition: "transform 0.15s", flexShrink: 0 }} />
                </div>
                {expanded === i && (
                  <pre className="mono fade-up" style={{ marginTop: 8, padding: 10, background: T.bg, borderRadius: 6, fontSize: 11, color: T.textMuted, overflow: "auto", maxHeight: 200, whiteSpace: "pre-wrap", wordBreak: "break-all" }}>
                    {JSON.stringify(e, null, 2)}
                  </pre>
                )}
              </div>
            ))}
          </div>
        </div>
      );
    };

    // ─── Right Sidebar ────────────────────────
    const TokenUsageBar = ({ stats }) => {
      const [liveStats, setLiveStats] = useState(null);
      const [prevData, setPrevData] = useState(null);
      const [pulse, setPulse] = useState(false);

      // Fast poll for token updates (every 5s)
      useEffect(() => {
        const load = async () => {
          try {
            const s = await api.get('/api/stats');
            setLiveStats(prev => {
              const ct = s?.claude_tokens;
              if (prev?.claude_tokens && ct && (prev.claude_tokens.total_input_tokens !== ct.total_input_tokens || prev.claude_tokens.total_output_tokens !== ct.total_output_tokens)) {
                setPrevData(prev.claude_tokens);
                setPulse(true);
                setTimeout(() => setPulse(false), 1200);
              }
              return s;
            });
          } catch (e) { }
        };
        load();
        const iv = setInterval(load, 5000);
        return () => clearInterval(iv);
      }, []);

      // Sync from parent stats on mount
      useEffect(() => {
        if (stats && !liveStats) setLiveStats(stats);
      }, [stats]);

      const s = liveStats || stats;
      if (!s) return null;

      const fmt = (n) => Number(n).toLocaleString();

      // Savings data
      const saved = (s.total_original_tokens || 0) - (s.total_compressed_tokens || 0);
      const savingsCost = (saved * 0.003 / 1000).toFixed(2);

      // Token usage data
      const ct = s.claude_tokens;
      const hasTokens = ct && ct.sessions_found > 0;
      const inp = hasTokens ? (ct.total_input_tokens || 0) : 0;
      const out = hasTokens ? (ct.total_output_tokens || 0) : 0;
      const cacheRead = hasTokens ? (ct.cache_read_tokens || 0) : 0;
      const cacheWrite = hasTokens ? (ct.cache_creation_tokens || 0) : 0;
      const baseInput = inp - cacheRead - cacheWrite;
      const total = inp + out;
      const inpPct = total > 0 ? (inp / total) * 100 : 50;
      const outPct = total > 0 ? (out / total) * 100 : 50;
      const cost = (baseInput * 3 + cacheWrite * 3.75 + cacheRead * 0.30 + out * 15) / 1000000;

      const inpDelta = prevData ? inp - (prevData.total_input_tokens || 0) : 0;
      const outDelta = prevData ? out - (prevData.total_output_tokens || 0) : 0;
      const sourceUsage = s?.conversation_token_usage?.sources || {};
      const sourceRows = Object.entries(sourceUsage)
        .sort((a, b) => (b[1]?.total_tokens || 0) - (a[1]?.total_tokens || 0))
        .slice(0, 4);

      return (
        <div style={{ padding: "10px 12px 8px" }}>
          <div style={{
            fontSize: 10, fontWeight: 700, color: T.blue, textTransform: "uppercase", letterSpacing: 1.2,
            display: "flex", alignItems: "center", gap: 6, marginBottom: 10
          }}>
            <I name="gauge" size={12} color={T.blue} /> Tokens & Savings
            {pulse && <span style={{ fontSize: 8, color: T.accent, animation: "fadeIn 0.3s ease" }}>LIVE</span>}
          </div>

          {/* C3 Savings */}
          {saved > 0 && (
            <div style={{
              marginBottom: 10, padding: "8px 10px", borderRadius: 6, background: `${T.accent}0a`,
              border: `1px solid ${T.accent}20`
            }}>
              <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 4 }}>
                <div style={{ display: "flex", alignItems: "center", gap: 5 }}>
                  <I name="minimize" size={11} color={T.accent} />
                  <span className="mono" style={{ fontSize: 10, color: T.accent, fontWeight: 600 }}>C3 Savings</span>
                </div>
                <span className="mono" style={{ fontSize: 12, fontWeight: 700, color: T.accent }}>
                  ~{fmt(saved)}
                </span>
              </div>
              <div className="mono" style={{ fontSize: 9, color: T.textDim, textAlign: "right" }}>
                ~${savingsCost} saved
              </div>
            </div>
          )}

          {/* Token Usage */}
          {hasTokens && (<>
            {/* Stacked bar */}
            <div style={{ height: 8, borderRadius: 4, overflow: "hidden", display: "flex", background: T.surfaceAlt, marginBottom: 8 }}>
              <div style={{
                width: `${inpPct}%`, background: `linear-gradient(90deg, ${T.blue}, ${T.blue}cc)`,
                transition: "width 0.6s ease", borderRadius: "4px 0 0 4px", minWidth: 2
              }} />
              <div style={{
                width: `${outPct}%`, background: `linear-gradient(90deg, ${T.purple}, ${T.purple}cc)`,
                transition: "width 0.6s ease", borderRadius: "0 4px 4px 0", minWidth: 2
              }} />
            </div>

            {/* Input row */}
            <div style={{ display: "flex", justifyContent: "space-between", marginBottom: 5 }}>
              <div style={{ display: "flex", alignItems: "center", gap: 5 }}>
                <div style={{ width: 8, height: 8, borderRadius: 2, background: T.blue }} />
                <span className="mono" style={{ fontSize: 10, color: T.textMuted }}>Input</span>
              </div>
              <span className="mono" style={{
                fontSize: 12, fontWeight: 700, color: T.blue,
                animation: pulse && inpDelta > 0 ? "fadeIn 0.3s ease" : "none"
              }}>
                {fmt(inp)}
                {pulse && inpDelta > 0 && <span style={{ fontSize: 9, color: T.accent, marginLeft: 4 }}>+{fmt(inpDelta)}</span>}
              </span>
            </div>

            {/* Output row */}
            <div style={{ display: "flex", justifyContent: "space-between", marginBottom: 5 }}>
              <div style={{ display: "flex", alignItems: "center", gap: 5 }}>
                <div style={{ width: 8, height: 8, borderRadius: 2, background: T.purple }} />
                <span className="mono" style={{ fontSize: 10, color: T.textMuted }}>Output</span>
              </div>
              <span className="mono" style={{
                fontSize: 12, fontWeight: 700, color: T.purple,
                animation: pulse && outDelta > 0 ? "fadeIn 0.3s ease" : "none"
              }}>
                {fmt(out)}
                {pulse && outDelta > 0 && <span style={{ fontSize: 9, color: T.accent, marginLeft: 4 }}>+{fmt(outDelta)}</span>}
              </span>
            </div>

            {/* Total + cost */}
            <div style={{ marginTop: 4, paddingTop: 6, borderTop: `1px solid ${T.border}` }}>
              <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 3 }}>
                <span className="mono" style={{ fontSize: 10, color: T.textDim }}>Total</span>
                <span className="mono" style={{ fontSize: 12, fontWeight: 700, color: T.text }}>{fmt(total)}</span>
              </div>
              <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center" }}>
                <span className="mono" style={{ fontSize: 10, color: T.textDim }}>Est. cost</span>
                <span className="mono" style={{ fontSize: 11, fontWeight: 600, color: T.warn }}>${cost.toFixed(2)}</span>
              </div>
              <div style={{ marginTop: 4, display: "flex", gap: 8, justifyContent: "center" }}>
                <span className="mono" style={{ fontSize: 9, color: T.textDim }}>{inpPct.toFixed(0)}% in</span>
                <span className="mono" style={{ fontSize: 9, color: T.textDim }}>{outPct.toFixed(0)}% out</span>
              </div>
            </div>
          </>)}

          {sourceRows.length > 0 && (
            <div style={{ marginTop: hasTokens ? 8 : 0, paddingTop: 6, borderTop: `1px solid ${T.border}` }}>
              <div className="mono" style={{ fontSize: 10, color: T.textDim, marginBottom: 4 }}>Conversation Sources</div>
              {sourceRows.map(([name, data]) => (
                <div key={name} style={{ display: "flex", justifyContent: "space-between", marginBottom: 3 }}>
                  <span className="mono" style={{ fontSize: 10, color: T.textMuted }}>{name}</span>
                  <span className="mono" style={{ fontSize: 10, color: T.text }}>
                    {fmt(data?.total_tokens || 0)} tok · {data?.sessions || 0} sessions
                  </span>
                </div>
              ))}
            </div>
          )}

          {/* Fallback when no token data yet */}
          {!hasTokens && sourceRows.length === 0 && saved <= 0 && (
            <div className="mono" style={{ fontSize: 10, color: T.textDim, textAlign: "center", padding: "8px 0" }}>
              No usage data yet
            </div>
          )}
        </div>
      );
    };

    const RightBar = ({ open, pinned, onTogglePin, onMouseEnter, onMouseLeave, setTab, stats }) => {
      const [autoRefresh, setAutoRefresh] = useState(false);
      const [activity, setActivity] = useState([]);
      const [session, setSession] = useState(null);
      const [loading, setLoading] = useState({});
      const [hybridCfg, setHybridCfg] = useState(null);
      const [proxyCfg, setProxyCfg] = useState(null);
      const [health, setHealth] = useState(null);
      const [healthChecking, setHealthChecking] = useState(false);
      const [actionMsg, setActionMsg] = useState(null);
      const sidebarLiveDuration = useLiveDuration(session?.started, session?.live);

      const setBtn = (key, val) => setLoading(p => ({ ...p, [key]: val }));

      const checkHealth = useCallback(async () => {
        setHealthChecking(true);
        try { const h = await api.get('/api/health'); setHealth(h); } catch (e) { }
        setHealthChecking(false);
      }, []);

      const loadActivity = useCallback(async () => {
        try { const ev = await api.get('/api/activity?limit=15'); setActivity(ev); } catch (e) { }
      }, []);

      const loadSession = useCallback(async () => {
        try {
          const current = await api.get('/api/sessions/current');
          if (current) setSession(current);
        } catch (e) { }
      }, []);

      const loadConfigs = useCallback(async () => {
        try { const h = await api.get('/api/hybrid/config'); setHybridCfg(h); } catch (e) { }
        try { const p = await api.get('/api/proxy/config'); setProxyCfg(p); } catch (e) { }
        await checkHealth();
      }, [checkHealth]);

      useEffect(() => { loadActivity(); loadSession(); loadConfigs(); }, []);

      useEffect(() => {
        if (!autoRefresh) return;
        const iv = setInterval(() => { loadActivity(); loadSession(); }, 5000);
        return () => clearInterval(iv);
      }, [autoRefresh, loadActivity, loadSession]);

      const quickAction = async (key, fn) => {
        setBtn(key, true);
        try {
          await fn();
          setActionMsg({ text: `${key} done`, ok: true });
        } catch (e) {
          setActionMsg({ text: `${key} failed`, ok: false });
        }
        setBtn(key, false);
        setTimeout(() => setActionMsg(null), 3000);
      };

      const toggleHybrid = async (flag) => {
        if (!hybridCfg) return;
        const val = !hybridCfg[flag];
        try {
          const updated = await api.put('/api/hybrid/config', { [flag]: val });
          setHybridCfg(updated);
        } catch (e) { }
      };

      const toggleProxy = async (key, val) => {
        try {
          const updated = await api.put('/api/proxy/config', { [key]: val });
          setProxyCfg(updated);
        } catch (e) { }
      };

      const eventSummary = (e) => {
        switch (e.type) {
          case "tool_call": return `${e.tool || "unknown"}`;
          case "decision": return e.decision || "";
          case "file_change": return `${e.file || ""}`;
          case "fact_stored": return `${e.fact || ""}`;
          case "session_start": return `Started`;
          case "session_save": return `Saved`;
          default: return e.type;
        }
      };

      const SectionHeader = ({ children, icon, color = T.textMuted }) => (
        <div style={{
          fontSize: 10, fontWeight: 700, color, textTransform: "uppercase", letterSpacing: 1.2,
          padding: "10px 12px 6px", display: "flex", alignItems: "center", gap: 6
        }}>
          <I name={icon} size={12} color={color} /> {children}
        </div>
      );

      // Collapsed state — icon strip (hover to expand, click pin to lock open)
      if (!open) return (
        <div onMouseEnter={onMouseEnter} onMouseLeave={onMouseLeave}
          style={{
            width: 40, flexShrink: 0, background: T.surface, borderLeft: `1px solid ${T.border}`,
            display: "flex", flexDirection: "column", alignItems: "center", paddingTop: 8, gap: 4
          }}>
          <button onClick={onTogglePin} title="Pin panel open"
            style={{
              width: 32, height: 32, borderRadius: 6, border: "none", background: "transparent",
              cursor: "pointer", display: "flex", alignItems: "center", justifyContent: "center"
            }}>
            <I name="gauge" size={15} color={T.blue} />
          </button>
          <button onClick={onTogglePin} title="Pin panel open"
            style={{
              width: 32, height: 32, borderRadius: 6, border: "none", background: "transparent",
              cursor: "pointer", display: "flex", alignItems: "center", justifyContent: "center"
            }}>
            <I name="settings" size={15} color={T.textMuted} />
          </button>
          <button onClick={onTogglePin} title="Pin panel open"
            style={{
              width: 32, height: 32, borderRadius: 6, border: "none", background: "transparent",
              cursor: "pointer", display: "flex", alignItems: "center", justifyContent: "center"
            }}>
            <I name="layers" size={15} color={T.textMuted} />
          </button>
          <button onClick={onTogglePin} title="Pin panel open"
            style={{
              width: 32, height: 32, borderRadius: 6, border: "none", background: "transparent",
              cursor: "pointer", display: "flex", alignItems: "center", justifyContent: "center"
            }}>
            <I name="clock" size={15} color={T.textMuted} />
          </button>
        </div>
      );

      return (
        <div onMouseEnter={onMouseEnter} onMouseLeave={onMouseLeave}
          style={{
            width: 320, flexShrink: 0, background: T.surface, borderLeft: `1px solid ${T.border}`,
            display: "flex", flexDirection: "column", overflow: "hidden", transition: "width 0.25s ease"
          }}>
          {/* Header */}
          <div style={{
            padding: "10px 12px", borderBottom: `1px solid ${T.border}`, display: "flex",
            justifyContent: "space-between", alignItems: "center"
          }}>
            <span style={{ fontSize: 11, fontWeight: 700, color: T.textMuted, textTransform: "uppercase", letterSpacing: 1 }}>Control Bar</span>
            <button onClick={onTogglePin} title={pinned ? "Unpin panel" : "Pin panel open"}
              style={{
                width: 24, height: 24, borderRadius: 4, border: "none", background: "transparent",
                cursor: "pointer", display: "flex", alignItems: "center", justifyContent: "center"
              }}>
              <I name="pin" size={13} color={pinned ? T.accent : T.textDim} />
            </button>
          </div>

          <div style={{ flex: 1, overflow: "auto" }}>
            {/* Token Usage & Savings */}
            <TokenUsageBar stats={stats} />
            <div style={{ borderTop: `1px solid ${T.border}` }} />

            {/* Section A: Quick Settings */}
            <SectionHeader icon="settings" color={T.accent}>Quick Settings</SectionHeader>
            <div style={{ padding: "4px 12px 12px", display: "flex", flexDirection: "column", gap: 8 }}>

              {/* Actions */}
              <div style={{ display: "flex", gap: 4, flexWrap: "wrap" }}>
                {[
                  { key: "rebuild", label: "Rebuild Index", icon: "refresh", color: T.blue, fn: () => api.post('/api/index/rebuild') },
                  { key: "claudemd", label: "Save CLAUDE.md", icon: "save", color: T.accent, fn: () => api.post('/api/claudemd/save') },
                ].map(a => (
                  <button key={a.key} onClick={() => quickAction(a.key, a.fn)} disabled={loading[a.key]}
                    style={{
                      padding: "4px 8px", borderRadius: 5, fontSize: 10, fontWeight: 600,
                      fontFamily: "'JetBrains Mono', monospace", cursor: loading[a.key] ? "default" : "pointer",
                      border: `1px solid ${a.color}30`, background: `${a.color}10`, color: a.color,
                      display: "flex", alignItems: "center", gap: 4, opacity: loading[a.key] ? 0.5 : 1,
                      transition: "all 0.15s"
                    }}>
                    <I name={a.icon} size={11} style={loading[a.key] ? { animation: "spin 0.6s linear infinite" } : {}} />
                    {loading[a.key] ? "..." : a.label}
                  </button>
                ))}
              </div>
              {actionMsg && (
                <div className="mono" style={{
                  padding: "4px 8px", borderRadius: 4, fontSize: 9,
                  background: actionMsg.ok ? T.accentDim : T.errorDim,
                  color: actionMsg.ok ? T.accent : T.error
                }}>
                  {actionMsg.ok ? "\u2713" : "\u2717"} {actionMsg.text}
                </div>
              )}

              {/* Feature Toggles */}
              <div style={{ display: "flex", flexDirection: "column", gap: 3 }}>
                <div style={{ fontSize: 9, fontWeight: 700, color: T.textDim, textTransform: "uppercase", letterSpacing: 1, marginBottom: 1 }}>Features</div>
                {[
                  { label: "Output Filter", flag: "HYBRID_DISABLE_TIER1", type: "hybrid", icon: "filter", invert: true },
                  { label: "Smart Router", flag: "HYBRID_DISABLE_TIER2", type: "hybrid", icon: "gitBranch", invert: true },
                  { label: "SLTM Memory", flag: "HYBRID_DISABLE_SLTM", type: "hybrid", icon: "brain", invert: true },
                  { label: "Budget Nudges", flag: "show_context_nudges", type: "hybrid", icon: "alertTriangle", invert: false },
                  { label: "Agent Alerts", flag: "prepend_notifications", type: "hybrid", icon: "bell", invert: false },
                  { label: "Auto-Memory", flag: "auto_memory", type: "hybrid", icon: "brain", invert: false, nested: "enabled" },
                  { label: "Tool Filtering", flag: "filter_tools", type: "proxy", icon: "layers", invert: false },
                ].map(t => {
                  const isHybrid = t.type === "hybrid";
                  const cfg = isHybrid ? hybridCfg : proxyCfg;
                  const on = t.nested ? cfg?.[t.flag]?.[t.nested] !== false : (t.invert ? !cfg?.[t.flag] : !!cfg?.[t.flag]);
                  return (
                    <button key={t.flag} onClick={() => {
                      if (t.nested) {
                        const cur = cfg?.[t.flag]?.[t.nested] !== false;
                        (async () => { try { const u = await api.put('/api/hybrid/config', { [t.flag]: { [t.nested]: !cur } }); setHybridCfg(u); } catch(e){} })();
                      } else if (isHybrid) { toggleHybrid(t.flag); } else { toggleProxy(t.flag, !cfg?.[t.flag]); }
                    }}
                      disabled={!cfg}
                      style={{
                        display: "flex", alignItems: "center", gap: 6, padding: "4px 8px", borderRadius: 4,
                        border: `1px solid ${on ? T.accent + "40" : T.border}`, background: on ? `${T.accent}08` : "transparent",
                        cursor: cfg ? "pointer" : "default", width: "100%", textAlign: "left",
                        transition: "all 0.15s"
                      }}>
                      <I name={t.icon} size={11} color={on ? T.accent : T.textDim} />
                      <span style={{ fontSize: 10, color: on ? T.text : T.textMuted, flex: 1 }}>{t.label}</span>
                      <div style={{
                        width: 24, height: 13, borderRadius: 7, background: on ? T.accent : T.border,
                        position: "relative", transition: "background 0.2s", flexShrink: 0
                      }}>
                        <div style={{
                          width: 9, height: 9, borderRadius: "50%", background: on ? T.bg : T.textDim,
                          position: "absolute", top: 2, left: on ? 13 : 2, transition: "left 0.2s"
                        }} />
                      </div>
                    </button>
                  );
                })}
              </div>

              {/* Connection Health */}
              <div style={{ display: "flex", flexDirection: "column", gap: 3 }}>
                <div style={{ display: "flex", alignItems: "center", gap: 4, marginBottom: 1 }}>
                  <span style={{ fontSize: 9, fontWeight: 700, color: T.textDim, textTransform: "uppercase", letterSpacing: 1, flex: 1 }}>Services</span>
                  <button onClick={checkHealth} disabled={healthChecking} title="Check connections"
                    style={{
                      padding: "1px 4px", borderRadius: 3, border: `1px solid ${T.border}`,
                      background: "transparent", cursor: healthChecking ? "default" : "pointer",
                      display: "flex", alignItems: "center", opacity: healthChecking ? 0.5 : 1
                    }}>
                    <I name="refresh" size={8} color={T.textDim}
                      style={healthChecking ? { animation: "spin 0.6s linear infinite" } : {}} />
                  </button>
                </div>
                {health?.sources ? (
                  <div style={{ display: "flex", gap: 4, flexWrap: "wrap" }}>
                    {Object.entries(health.sources).map(([name, ok]) => (
                      <div key={name} style={{
                        display: "flex", alignItems: "center", gap: 4, padding: "3px 7px",
                        borderRadius: 4, background: ok ? `${T.accent}10` : `${T.error}10`,
                        border: `1px solid ${ok ? T.accent : T.error}25`
                      }}>
                        <GlowDot color={ok ? T.accent : T.error} size={4} />
                        <span className="mono" style={{ fontSize: 9, color: ok ? T.accent : T.error }}>{name}</span>
                      </div>
                    ))}
                  </div>
                ) : (
                  <div style={{ fontSize: 9, color: T.textMuted, fontStyle: "italic" }}>not checked yet</div>
                )}
              </div>

              {/* Utility toggles */}
              <div style={{ display: "flex", gap: 6, flexWrap: "wrap" }}>
                <button onClick={() => setAutoRefresh(!autoRefresh)}
                  style={{
                    display: "flex", alignItems: "center", gap: 5, padding: "3px 7px", borderRadius: 4,
                    border: `1px solid ${autoRefresh ? T.accent + "60" : T.border}`,
                    background: autoRefresh ? T.accentDim : "transparent",
                    color: autoRefresh ? T.accent : T.textMuted, fontSize: 9, cursor: "pointer", fontFamily: "'JetBrains Mono', monospace"
                  }}>
                  <GlowDot color={autoRefresh ? T.accent : T.textDim} size={4} />
                  Auto-refresh
                </button>
                <button onClick={loadConfigs}
                  style={{
                    display: "flex", alignItems: "center", gap: 5, padding: "3px 7px", borderRadius: 4,
                    border: `1px solid ${T.border}`, background: "transparent",
                    color: T.textMuted, fontSize: 9, cursor: "pointer", fontFamily: "'JetBrains Mono', monospace"
                  }}>
                  <I name="refresh" size={10} /> Refresh
                </button>
              </div>
            </div>

            <div style={{ borderTop: `1px solid ${T.border}` }} />

            {/* Section B: Activity Feed */}
            <SectionHeader icon="layers" color={T.blue}>Activity Feed</SectionHeader>
            <div style={{ padding: "0 12px 12px", display: "flex", flexDirection: "column", gap: 3 }}>
              {activity.length === 0 && (
                <div style={{ padding: 10, textAlign: "center", color: T.textDim, fontSize: 11 }}>No activity yet</div>
              )}
              {activity.map((e, i) => (
                <div key={i} style={{
                  display: "flex", alignItems: "center", gap: 6, padding: "4px 6px", borderRadius: 4,
                  background: T.surfaceAlt
                }}>
                  <span className="mono" style={{ fontSize: 9, color: T.textDim, minWidth: 40, flexShrink: 0 }}>{timeAgo(e.timestamp)}</span>
                  <span style={{
                    display: "inline-block", padding: "1px 5px", borderRadius: 3, fontSize: 9, fontWeight: 600,
                    background: `${(e.type === "tool_call" && e.tool ? getToolColor(e.tool) : (typeColors[e.type] || T.textMuted))}15`,
                    color: e.type === "tool_call" && e.tool ? getToolColor(e.tool) : (typeColors[e.type] || T.textMuted),
                    fontFamily: "'JetBrains Mono', monospace", whiteSpace: "nowrap"
                  }}>{e.type === "tool_call" && e.tool ? e.tool.replace("c3_", "") : (e.type?.replace("_", " "))}</span>
                  <span className="mono" style={{
                    fontSize: 10, color: T.textMuted, flex: 1, overflow: "hidden",
                    textOverflow: "ellipsis", whiteSpace: "nowrap"
                  }}>{e.type === "tool_call" ? (e.result_summary || "") : eventSummary(e)}</span>
                </div>
              ))}
              <button onClick={() => setTab("activity")}
                style={{
                  padding: "6px 0", background: "none", border: "none", color: T.accent, fontSize: 11,
                  cursor: "pointer", textAlign: "center", fontFamily: "'JetBrains Mono', monospace"
                }}>
                View all activity →
              </button>
            </div>

            <div style={{ borderTop: `1px solid ${T.border}` }} />

            {/* Section C: Current Session */}
            <SectionHeader icon="clock" color={T.purple}>Current Session</SectionHeader>
            <div style={{ padding: "0 12px 12px" }}>
              {!session ? (
                <div style={{ padding: 10, textAlign: "center", color: T.textDim, fontSize: 11 }}>No sessions yet</div>
              ) : (
                <div style={{ display: "flex", flexDirection: "column", gap: 6 }}>
                  <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center" }}>

    // ─── Bottom Drawer ────────────────────────
    const BottomDrawer = ({ setTab: switchTab, notifications = [], ackNotification, ackAllNotifications }) => {
      const [open, setOpen] = useState(false);
      const [drawerTab, setDrawerTab] = useState("agents");
      const [activity, setActivity] = useState([]);
      const [expanded, setExpanded] = useState(null);
      const consoleRef = useRef(null);
      const prevCountRef = useRef(0);
      const [actionFeedback, setActionFeedback] = useState({});

      const agentActions = {
        IndexStaleness: [{ label: "Rebuild Index", type: "api", method: "POST", endpoint: "/api/index/rebuild" }],
        MemoryPruner: [{ label: "View Facts", type: "tab", tab: "memory" }],
        ClaudeMdDrift: [
          { label: "Check Staleness", type: "api", method: "GET", endpoint: "/api/claudemd/check" },
          { label: "Compact", type: "api", method: "POST", endpoint: "/api/claudemd/compact" },
        ],
        ContextBudget: [{ label: "View Budget", type: "tab", tab: "sessions" }],
        SessionInsight: [{ label: "View Session", type: "tab", tab: "sessions" }],
        AutonomyPlanner: [{ label: "View Activity", type: "tab", tab: "activity" }],
        FileMemory: [{ label: "View Index", type: "tab", tab: "index" }],
      };

      const handleAction = async (action, notifId) => {
        if (action.type === "tab") {
          if (switchTab) switchTab(action.tab);
          return;
        }
        setActionFeedback(prev => ({ ...prev, [notifId]: "..." }));
        try {
          const res = action.method === "POST"
            ? await api.post(action.endpoint)
            : await api.get(action.endpoint);
          const msg = typeof res === "object" && res.status ? res.status : "Done";
          setActionFeedback(prev => ({ ...prev, [notifId]: msg }));
          // Auto-ack after API action
          if (ackNotification) ackNotification(notifId);
          setTimeout(() => {
            setActionFeedback(prev => { const copy = { ...prev }; delete copy[notifId]; return copy; });
          }, 1500);
        } catch (e) {
          setActionFeedback(prev => ({ ...prev, [notifId]: "Error" }));
        }
      };

      // Fetch activity (tool calls)
      useEffect(() => {
        const load = () => api.get('/api/activity?type=tool_call&limit=50').then(d => {
          setActivity(prev => {
            if (d.length > prevCountRef.current && consoleRef.current) {
              setTimeout(() => { if (consoleRef.current) consoleRef.current.scrollTop = consoleRef.current.scrollHeight; }, 50);
            }
            prevCountRef.current = d.length;
            return d;
          });
        }).catch(() => { });
        load();
        const iv = setInterval(load, 5000);
        return () => clearInterval(iv);
      }, []);

      const ack = (id) => { if (ackNotification) ackNotification(id); };
      const ackAll = () => { if (ackAllNotifications) ackAllNotifications(); };

          }, onClick: () => setOpen(!open)
        },
          React.createElement(I, { name: open ? "chevronDown" : "chevronUp", size: 14, color: T.textMuted }),
          React.createElement('button', {
            onClick: e => { e.stopPropagation(); setDrawerTab("agents"); if (!open) setOpen(true); },
            style: {
              background: "none", border: "none", cursor: "pointer", padding: "4px 10px", borderRadius: 4, fontSize: 11,
              fontFamily: "'JetBrains Mono', monospace", fontWeight: drawerTab === "agents" ? 600 : 400,
              color: drawerTab === "agents" ? T.accent : T.textMuted,
              background: drawerTab === "agents" && open ? T.accentDim : "transparent"
            }
          }, "Agent Activity"),
          React.createElement('button', {
            onClick: e => { e.stopPropagation(); setDrawerTab("api"); if (!open) setOpen(true); },
            style: {
              background: "none", border: "none", cursor: "pointer", padding: "4px 10px", borderRadius: 4, fontSize: 11,
              fontFamily: "'JetBrains Mono', monospace", fontWeight: drawerTab === "api" ? 600 : 400,
              color: drawerTab === "api" ? T.accent : T.textMuted,
              background: drawerTab === "api" && open ? T.accentDim : "transparent"
            }
          }, "API"),
          React.createElement('div', { style: { flex: 1 } }),
          notifications.length > 0 && React.createElement('button', {
            onClick: e => { e.stopPropagation(); if (switchTab) switchTab('notifications'); },
            style: {
              background: "none", border: "none", cursor: "pointer", padding: "2px 6px",
              display: "flex", alignItems: "center", gap: 4, borderRadius: 4
            },
            title: "Open Notifications tab"
          },
            React.createElement(I, { name: "zap", size: 12, color: T.warn }),
            React.createElement(Badge, { color: T.warn }, notifications.length)
          )
        ),
        // Content
        open && React.createElement('div', {
          style: { flex: 1, overflow: "auto", padding: 10 },
          ...(drawerTab === "api" ? { ref: consoleRef } : {})
        },
          drawerTab === "agents" ? (
            // Agent Activity tab
            React.createElement('div', { style: { display: "flex", flexDirection: "column", gap: 6 } },
              notifications.length > 0 && React.createElement('div', { style: { display: "flex", justifyContent: "flex-end", marginBottom: 4 } },
                React.createElement('button', {
                  onClick: ackAll,
                  style: {
                    background: "none", border: `1px solid ${T.border}`, borderRadius: 4, padding: "3px 10px",
                    fontSize: 10, color: T.textMuted, cursor: "pointer", fontFamily: "'JetBrains Mono', monospace"
                  }
                }, "Acknowledge All")
              ),
              notifications.length === 0 && React.createElement('div', {
                style: { color: T.textDim, fontSize: 12, textAlign: "center", padding: 24, fontFamily: "'JetBrains Mono', monospace" }
              }, "No pending notifications"),
              ...notifications.map(n => React.createElement('div', {
                key: n.id,
                style: {
                  display: "flex", gap: 8, alignItems: "flex-start", padding: "8px 10px",
                  background: T.bg, borderRadius: 6, border: `1px solid ${T.border}`
                }
              },
                React.createElement(Badge, { color: sevColor(n.severity) }, n.severity || "info"),
                n.ai_enhanced && React.createElement(Badge, { color: "#b38aff" }, "AI"),
                React.createElement('div', { style: { flex: 1, minWidth: 0 } },
                  React.createElement('div', { style: { fontSize: 12, fontWeight: 600, color: T.text } },
                    n.agent && React.createElement('span', { style: { color: T.accent, marginRight: 6 } }, n.agent),
                    n.title
                  ),
                  n.message && React.createElement('div', {
                    style: { fontSize: 11, color: T.textMuted, marginTop: 2, lineHeight: 1.4 }
                  }, n.message),
                  React.createElement('div', {
                    style: { fontSize: 10, color: T.textDim, marginTop: 3 }
                  }, timeAgo(n.timestamp)),
                  // Quick action buttons
                  agentActions[n.agent] && React.createElement('div', {
                    style: { display: "flex", gap: 4, marginTop: 4, alignItems: "center", flexWrap: "wrap" }
                  },
                    ...agentActions[n.agent].map(action =>
                      React.createElement('button', {
                        key: action.label,
                        onClick: () => handleAction(action, n.id),
                        style: {
                          padding: "2px 8px", fontSize: 10, borderRadius: 4, border: `1px solid ${T.border}`,
                          background: "transparent", color: T.accent, cursor: "pointer",
                          fontFamily: "'JetBrains Mono', monospace"
                        }
                      }, action.label)
                    ),
                    actionFeedback[n.id] && React.createElement('span', {
                      style: { fontSize: 10, color: T.textMuted, marginLeft: 4 }
                    }, actionFeedback[n.id])
                  )
                ),
                React.createElement('button', {
                  onClick: () => ack(n.id),
                  style: { background: "none", border: "none", cursor: "pointer", padding: 2, flexShrink: 0 }
                }, React.createElement(I, { name: "check", size: 14, color: T.textDim }))
              ))
            )
          ) : (
            // API Console tab
            React.createElement('div', { style: { display: "flex", flexDirection: "column", gap: 2, fontFamily: "'JetBrains Mono', monospace", fontSize: 11 } },
              activity.length === 0 && React.createElement('div', {
                style: { color: T.textDim, fontSize: 12, textAlign: "center", padding: 24 }
              }, "No tool calls recorded"),
              ...activity.map((ev, i) => React.createElement('div', { key: ev.id || i },
                React.createElement('div', {
                  onClick: () => setExpanded(expanded === i ? null : i),
                  style: {
                    display: "flex", gap: 8, alignItems: "center", padding: "4px 6px", cursor: "pointer",
                    borderRadius: 4, background: expanded === i ? T.surfaceAlt : "transparent"
                  }
                },
                  React.createElement('span', { style: { color: T.textDim, fontSize: 10, flexShrink: 0, width: 60 } },
                    new Date(ev.timestamp).toLocaleTimeString()
                  ),
                  React.createElement(Badge, null, ev.tool || ev.event_type || "call"),
                  React.createElement('span', { style: { color: T.textMuted, overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap", flex: 1 } },
                    typeof ev.args === "object" ? JSON.stringify(ev.args).slice(0, 80) : String(ev.args || "").slice(0, 80)
                  ),
                  ev.result_summary && React.createElement('span', { style: { color: T.textDim, fontSize: 10, flexShrink: 0 } },
                    String(ev.result_summary).slice(0, 40)
                  )
                ),
                expanded === i && React.createElement('pre', {
                  style: {
                    margin: "2px 0 6px 68px", padding: 8, background: T.bg, borderRadius: 4,
                    border: `1px solid ${T.border}`, fontSize: 10, color: T.textMuted, overflow: "auto",
                    maxHeight: 120, whiteSpace: "pre-wrap", wordBreak: "break-all"
                  }
                }, JSON.stringify(ev, null, 2))
              ))
            )
          )
        )
      );
    };

    // ─── Hybrid Tab ─────────────────────────────
    const HybridTab = () => {
      const [metrics, setMetrics] = useState(null);
      const [config, setConfig] = useState(null);
      const [validateTimeoutInput, setValidateTimeoutInput] = useState("12");
      const [delegateConfig, setDelegateConfig] = useState(null);
      const [delegateMinInput, setDelegateMinInput] = useState("120");
      const [hybridMsg, setHybridMsg] = useState("");
      const [delegateSaving, setDelegateSaving] = useState(false);
      const [delegateMsg, setDelegateMsg] = useState("");
      const [loading, setLoading] = useState(true);

      const load = async () => {
        try {
          const [mRes, cRes, dRes] = await Promise.all([
            fetch(`${API}/api/hybrid/metrics`).then(r => r.json()).catch(() => null),
            fetch(`${API}/api/hybrid/config`).then(r => r.json()).catch(() => null),
            fetch(`${API}/api/delegate/config`).then(r => r.json()).catch(() => null),
          ]);
          setMetrics(mRes || {});
          setConfig(cRes || {});
          setValidateTimeoutInput(String((cRes && cRes.validate_timeout_seconds) || 12));
          setDelegateConfig(dRes || {});
          setDelegateMinInput(String((dRes && dRes.threshold_min_total_tokens) || 120));
        } catch (e) { console.error(e); }
        setLoading(false);
      };

      useEffect(() => { load(); }, []);

      const toggleFlag = async (key) => {
        const newVal = !config[key];
        try {
          setHybridMsg("");
          const res = await fetch(`${API}/api/hybrid/config`, {
            method: "PUT",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ [key]: newVal }),
          });
          const next = await res.json();
          setConfig(next);
          setValidateTimeoutInput(String((next && next.validate_timeout_seconds) || 12));
        } catch (e) { console.error(e); }
      };

      const saveHybridPatch = async (patch) => {
        setHybridMsg("");
        try {
          const res = await fetch(`${API}/api/hybrid/config`, {
            method: "PUT",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(patch),
          });
          const next = await res.json();
          setConfig(next);
          setValidateTimeoutInput(String((next && next.validate_timeout_seconds) || 12));
          setHybridMsg("Saved");
        } catch (e) {
          console.error(e);
          setHybridMsg("Save failed");
        }
      };

      const saveDelegatePatch = async (patch) => {
        setDelegateSaving(true);
        setDelegateMsg("");
        try {
          const res = await fetch(`${API}/api/delegate/config`, {
            method: "PUT",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(patch),
          });
          const next = await res.json();
          setDelegateConfig(next);
          setDelegateMinInput(String((next && next.threshold_min_total_tokens) || 0));
          setDelegateMsg("Saved");
        } catch (e) {
          console.error(e);
          setDelegateMsg("Save failed");
        }
        setDelegateSaving(false);
      };

      const toggleDelegateTask = (field, task) => {
        const cur = new Set((delegateConfig && delegateConfig[field]) || []);
        if (cur.has(task)) cur.delete(task); else cur.add(task);
        saveDelegatePatch({ [field]: Array.from(cur) });
      };

      if (loading) return (<div style={{ padding: 24, color: T.text }}>Loading hybrid metrics...</div>);

      const t1 = metrics?.tier1_filter;
      const t2 = metrics?.tier2_router;
      const t3 = metrics?.tier3_sltm;

      const cardStyle = {
        background: T.surface, border: `1px solid ${T.border}`, borderRadius: 10,
        padding: 20, marginBottom: 16, flex: 1, minWidth: 280
      };
      const statRow = {
        display: "flex", justifyContent: "space-between", padding: "6px 0",
        borderBottom: `1px solid ${T.border}22`, fontSize: 13
      };
      const toggleRow = {
        display: "flex", justifyContent: "space-between", alignItems: "center",
        padding: "8px 0", borderBottom: `1px solid ${T.border}22`
      };

      const Stat = ({ label, value }) => (
        <div style={statRow}>
          <span style={{ color: T.textMuted }}>{label}</span>
          <span style={{ color: T.text, fontFamily: "monospace" }}>{String(value ?? "\u2014")}</span>
        </div>
      );

      const Toggle = ({ label, flag, invert = true }) => {
        const enabled = invert ? !config?.[flag] : !!config?.[flag];
        return (
        <div style={toggleRow}>
          <span style={{ fontSize: 13, color: T.text }}>{label}</span>
          <button onClick={() => toggleFlag(flag)} style={{
            padding: "4px 12px", borderRadius: 6, border: `1px solid ${T.border}`,
            background: enabled ? T.accent + "22" : T.error + "22",
            color: enabled ? T.accent : T.error,
            cursor: "pointer", fontSize: 12, fontWeight: 600
          }}>{enabled ? "ENABLED" : "DISABLED"}</button>
        </div>
        );
      };

      const TaskChip = ({ active, label, onClick }) => (
        <button onClick={onClick} style={{
          padding: "3px 10px",
          borderRadius: 999,
          border: `1px solid ${active ? T.accent : T.border}`,
          background: active ? T.accent + "22" : "transparent",
          color: active ? T.accent : T.textMuted,
          cursor: "pointer",
          fontSize: 11,
          fontFamily: "'JetBrains Mono', monospace"
        }}>{label}</button>
      );

      const delegateTasks = ["ask", "explain", "summarize", "improve", "docstring", "diagnose", "review", "test"];
      const thresholdTypes = new Set((delegateConfig && delegateConfig.threshold_task_types) || []);
      const forceTypes = new Set((delegateConfig && delegateConfig.threshold_force_task_types) || []);

      const DelegatePlayground = () => {
        const [task, setTask] = useState("");
        const [taskType, setTaskType] = useState("ask");
        const [streaming, setStreaming] = useState(false);
        const [result, setResult] = useState("");
        const [meta, setMeta] = useState(null);

        const runDelegate = async () => {
          setResult("");
          setMeta(null);
          setStreaming(true);

          try {
            const response = await fetch(`${API}/api/delegate`, {
              method: "POST",
              headers: { "Content-Type": "application/json" },
              body: JSON.stringify({ task, task_type: taskType, stream: true }),
            });

            const reader = response.body.getReader();
            const decoder = new TextDecoder();
            let buffer = "";

            while (true) {
              const { done, value } = await reader.read();
              if (done) break;

              buffer += decoder.decode(value, { stream: true });
              const lines = buffer.split("\n");
              buffer = lines.pop();

              for (const line of lines) {
                if (line.startsWith("data: ")) {
                  const data = line.slice(6);
                  if (data === "[DONE]") break;
                  try {
                    const json = JSON.parse(data);
                    if (json.is_meta) {
                      setMeta(json);
                    } else if (json.text) {
                      setResult(prev => prev + json.text);
                    }
                  } catch (e) {}
                }
              }
            }
          } catch (e) {
            setResult("Error: " + e.message);
          } finally {
            setStreaming(false);
          }
        };

        return (
          <div style={cardStyle}>
            <h3 style={{ margin: "0 0 10px", color: T.accent, fontSize: 15 }}>Delegate Playground (Streaming)</h3>
            <p style={{ margin: "0 0 12px", color: T.textMuted, fontSize: 12 }}>
              Test the new Nano Tier classifier and response streaming.
            </p>
            <div style={{ display: "flex", gap: 8, marginBottom: 12 }}>
              {delegateTasks.map(t => (
                <TaskChip key={t} label={t} active={taskType === t} onClick={() => setTaskType(t)} />
              ))}
            </div>
            <div style={{ display: "flex", gap: 8 }}>
              <input
                value={task}
                onChange={e => setTask(e.target.value)}
                placeholder="Enter a technical question or task..."
                style={{
                  flex: 1, padding: "8px 12px", borderRadius: 8, border: `1px solid ${T.border}`,
                  background: T.surfaceAlt, color: T.text, outline: "none", fontSize: 13
                }}
                onKeyDown={e => e.key === "Enter" && runDelegate()}
              />
              <button
                onClick={runDelegate}
                disabled={streaming || !task}
                style={{
                  padding: "0 16px", borderRadius: 8, border: "none",
                  background: T.accent, color: "white", cursor: "pointer",
                  fontWeight: 600, opacity: (streaming || !task) ? 0.5 : 1
                }}
              >
                {streaming ? "Running..." : "Run"}
              </button>
            </div>
            {meta && (
              <div style={{ marginTop: 12, display: "flex", gap: 8 }}>
                <Badge color={T.blue}>{meta.model}</Badge>
                <Badge color={T.purple}>{meta.route_class}</Badge>
                {meta.latency_ms && <span style={{ fontSize: 11, color: T.textMuted }}>{meta.latency_ms}ms</span>}
              </div>
            )}
            {(result || streaming) && (
              <div style={{
                marginTop: 12, padding: 12, borderRadius: 8, background: T.surfaceAlt,
                border: `1px solid ${T.border}`, fontSize: 13, lineHeight: 1.5,
                whiteSpace: "pre-wrap", fontFamily: "'JetBrains Mono', monospace",
                minHeight: 60, position: "relative"
              }}>
                {result}
                {streaming && <span style={{ display: "inline-block", width: 2, height: 14, background: T.accent, marginLeft: 2, verticalAlign: "middle", animation: "pulse 1s infinite" }}></span>}
              </div>
            )}
          </div>
        );
      };

      return (
        <div>
          <h2 style={{ margin: "0 0 20px", color: T.text }}>Hybrid Intelligence</h2>
          <p style={{ color: T.textMuted, marginBottom: 20, fontSize: 13 }}>
            Three-tier local AI: Output Filter (Tier 1) | Adaptive Router (Tier 2) | SLTM Vector Memory (Tier 3)
          </p>

          <DelegatePlayground />
          <div style={cardStyle}>
            <h3 style={{ margin: "0 0 12px", color: T.accent, fontSize: 15 }}>Feature Flags</h3>
            <Toggle label="Tier 1 — Output Filter" flag="HYBRID_DISABLE_TIER1" />
            <Toggle label="Tier 2 — Adaptive Router" flag="HYBRID_DISABLE_TIER2" />
            <Toggle label="Tier 3 — SLTM Vector Memory" flag="HYBRID_DISABLE_SLTM" />
            <div style={toggleRow}>
              <span style={{ fontSize: 13, color: T.text }}>Auto-Memory (background learning)</span>
              <button onClick={async () => {
                const cur = config?.auto_memory?.enabled !== false;
                try {
                  setHybridMsg("");
                  const res = await fetch(`${API}/api/hybrid/config`, {
                    method: "PUT", headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ auto_memory: { enabled: !cur } }),
                  });
                  setConfig(await res.json());
                } catch (e) { setHybridMsg("Error"); }
              }} style={{
                padding: "4px 12px", borderRadius: 6, border: `1px solid ${T.border}`,
                background: (config?.auto_memory?.enabled !== false) ? T.accent + "22" : T.error + "22",
                color: (config?.auto_memory?.enabled !== false) ? T.accent : T.error,
                cursor: "pointer", fontSize: 12, fontWeight: 600
              }}>{(config?.auto_memory?.enabled !== false) ? "ENABLED" : "DISABLED"}</button>
            </div>
            <div style={{ ...toggleRow, gap: 8, flexWrap: "wrap" }}>
              <span style={{ fontSize: 13, color: T.text }}>`c3_validate` Timeout (seconds)</span>
              <div style={{ display: "flex", gap: 6, alignItems: "center" }}>
                <input
                  type="number"

                <button onClick={() => saveDelegatePatch({ threshold_min_total_tokens: Math.max(0, Number(delegateMinInput || 0)) })} style={{
                  padding: "4px 10px", borderRadius: 6, border: `1px solid ${T.border}`,
                  background: T.surfaceAlt, color: T.accent, cursor: "pointer", fontSize: 12
                }}>Save</button>
              </div>
            </div>
            <div style={{ marginTop: 10 }}>
              <div style={{ fontSize: 12, color: T.textMuted, marginBottom: 6 }}>Apply threshold to task types</div>
              <div style={{ display: "flex", gap: 6, flexWrap: "wrap" }}>
                {delegateTasks.map(task => (
                  <TaskChip
                    key={`t-${task}`}
                    label={task}
                    active={thresholdTypes.has(task)}
                    onClick={() => toggleDelegateTask("threshold_task_types", task)}

                ))}
              </div>
            </div>
            <div style={{ marginTop: 10 }}>
              <div style={{ fontSize: 12, color: T.textMuted, marginBottom: 6 }}>Always delegate (bypass threshold)</div>
              <div style={{ display: "flex", gap: 6, flexWrap: "wrap" }}>
                {delegateTasks.map(task => (
                  <TaskChip
                    key={`f-${task}`}
                    label={task}
                    active={forceTypes.has(task)}
                    onClick={() => toggleDelegateTask("threshold_force_task_types", task)}
                  />
                ))}
              </div>
            </div>
            <div className="mono" style={{ marginTop: 10, fontSize: 11, color: delegateMsg === "Save failed" ? T.error : T.textDim }}>
              {delegateSaving ? "Saving..." : (delegateMsg || " ")}
            </div>
          </div>

          <div style={{ display: "flex", gap: 16, flexWrap: "wrap" }}>
            <div style={cardStyle}>
              <h3 style={{ margin: "0 0 12px", color: T.accent, fontSize: 15 }}>Output Filter</h3>
              {t1 ? (<>
                <Stat label="Total calls" value={t1.calls} />
                <Stat label="Raw tokens" value={t1.raw_tokens?.toLocaleString()} />
                <Stat label="Filtered tokens" value={t1.filtered_tokens?.toLocaleString()} />
                <Stat label="Savings" value={`${t1.total_savings_pct}%`} />
                <Stat label="LLM calls" value={t1.llm_calls} />

            </div>

            <div style={cardStyle}>
              <h3 style={{ margin: "0 0 12px", color: T.accent, fontSize: 15 }}>Adaptive Router</h3>
              {t2 ? (<>
                <Stat label="Total routes" value={t2.total_routes} />
                <Stat label="Avg latency" value={`${t2.avg_latency_ms}ms`} />

            <div style={cardStyle}>
