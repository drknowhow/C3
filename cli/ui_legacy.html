<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>C3 — Code Context Control</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.3.1/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.3.1/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.26.9/babel.min.js"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&family=DM+Sans:wght@400;500;600;700&display=swap');

    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html,
    body,
    #root {
      height: 100%;
      width: 100%;
      overflow: hidden;
    }

    body {
      background: #0a0e14;
      color: #c5cdd8;
      font-family: 'DM Sans', -apple-system, sans-serif;
    }

    ::-webkit-scrollbar {
      width: 5px;
    }

    ::-webkit-scrollbar-track {
      background: transparent;
    }

    ::-webkit-scrollbar-thumb {
      background: #1e2733;
      border-radius: 3px;
    }

    ::-webkit-scrollbar-thumb:hover {
      background: #2a3544;
    }

    @keyframes spin {
      from {
        transform: rotate(0deg);
      }

      to {
        transform: rotate(360deg);
      }
    }

    @keyframes fadeUp {
      from {
        opacity: 0;
        transform: translateY(8px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes pulse {

      0%,
      100% {
        opacity: 1;
      }

      50% {
        opacity: 0.5;
      }
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
      }

      to {
        opacity: 1;
      }
    }

    .fade-up {
      animation: fadeUp 0.3s ease forwards;
    }

    input,
    textarea,
    select,
    button {
      font-family: inherit;
    }

    pre {
      font-family: 'JetBrains Mono', monospace;
    }

    .mono {
      font-family: 'JetBrains Mono', monospace;
    }
  </style>
</head>

<body>
  <div id="root"></div>
  <script type="text/babel">
    const BUILD_TIME = "2026-03-10 07:12";
    const { useState, useEffect, useCallback, useRef } = React;

    // ─── Theme ────────────────────────────────
    const DARK = {
      bg: "#0a0e14", surface: "#0f1319", surfaceAlt: "#141a22",
      border: "#1e2733", borderHover: "#2a3544",
      text: "#c5cdd8", textMuted: "#5c6a7a", textDim: "#3a4555",
      accent: "#00e5a0", accentDim: "#00e5a018",
      warn: "#ffb224", warnDim: "#ffb22418",
      error: "#ff6b6b", errorDim: "#ff6b6b18",
      blue: "#4da6ff", blueDim: "#4da6ff18",
      purple: "#b38aff", purpleDim: "#b38aff18",
    };
    const LIGHT = {
      bg: "#f0f2f5", surface: "#ffffff", surfaceAlt: "#e8ebef",
      border: "#dde2e8", borderHover: "#b8c0cb",
      text: "#1a2332", textMuted: "#5a6a7a", textDim: "#9daab8",
      accent: "#009e72", accentDim: "#009e7214",
      warn: "#b87000", warnDim: "#b8700014",
      error: "#c43030", errorDim: "#c4303014",
      blue: "#1a6fc4", blueDim: "#1a6fc414",
      purple: "#6b40c4", purpleDim: "#6b40c414",
    };
    let T = DARK;

    // ─── API Client ───────────────────────────
    const API = window.location.origin;
    const parseApiResponse = async (r) => {
      const ct = (r.headers.get('content-type') || '').toLowerCase();
      let json = null;
      let text = '';
      if (ct.includes('application/json')) {
        try { json = await r.json(); } catch { json = null; }
      } else {
        try { text = await r.text(); } catch { text = ''; }
        if (text) {
          try { json = JSON.parse(text); } catch { json = null; }
        }
      }
      if (!r.ok) {
        const msg = (json && (json.error || json.message)) || text || `HTTP ${r.status}`;
        const err = new Error(msg);
        err.status = r.status;
        err.payload = json;
        throw err;
      }
      if (json !== null) return json;
      return {};
    };
    const api = {
      get: async (path) => parseApiResponse(await fetch(`${API}${path}`)),
      post: async (path, body) => parseApiResponse(await fetch(`${API}${path}`, {
        method: 'POST', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(body),
      })),
      put: async (path, body) => parseApiResponse(await fetch(`${API}${path}`, {
        method: 'PUT', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(body),
      })),
      del: async (path) => parseApiResponse(await fetch(`${API}${path}`, { method: 'DELETE' })),
    };

    // ─── Icons (inline SVG) ──────────────────
    const Icon = ({ d, size = 16, color = "currentColor", style = {} }) => (
      <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke={color}
        strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" style={style}>
        <path d={d} />
      </svg>
    );
    const icons = {
      gauge: "M12 2a10 10 0 1 0 0 20 10 10 0 0 0 0-20zM12 6v6l4 2",
      minimize: "M4 14h6v6M20 10h-6V4M14 10l7-7M3 21l7-7",
      search: "M11 3a8 8 0 1 0 0 16 8 8 0 0 0 0-16zM21 21l-4.35-4.35",
      clock: "M12 2a10 10 0 1 0 0 20 10 10 0 0 0 0-20zM12 6v6l4 2",
      braces: "M7 4a2 2 0 0 0-2 2v3a2 2 0 0 1-2 2 2 2 0 0 1 2 2v3a2 2 0 0 0 2 2M17 4a2 2 0 0 1 2 2v3a2 2 0 0 0 2 2 2 2 0 0 0-2 2v3a2 2 0 0 1-2 2",
      settings: "M12 2a3 3 0 0 0-3 3v1a2 2 0 0 1-1 1.73l-.43.25a2 2 0 0 1-2 0l-.86-.5a3 3 0 0 0-3 5.2l.87.5a2 2 0 0 1 1 1.73v.5a2 2 0 0 1-1 1.73l-.87.5a3 3 0 0 0 3 5.2l.86-.5a2 2 0 0 1 2 0l.43.25A2 2 0 0 1 9 19v1a3 3 0 0 0 6 0v-1a2 2 0 0 1 1-1.73l.43-.25a2 2 0 0 1 2 0l.86.5a3 3 0 0 0 3-5.2l-.87-.5A2 2 0 0 1 20 10.27v-.5a2 2 0 0 1 1-1.73l.87-.5a3 3 0 0 0-3-5.2l-.86.5a2 2 0 0 1-2 0L15.57 2.5A2 2 0 0 1 15 1V1a3 3 0 0 0-6 0z",
      terminal: "M4 17l6-6-6-6M12 19h8",
      zap: "M13 2L3 14h9l-1 8 10-12h-9l1-8",
      file: "M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8zM14 2v6h6",
      refresh: "M1 4v6h6M23 20v-6h-6M20.49 9A9 9 0 0 0 5.64 5.64L1 10m22 4l-4.64 4.36A9 9 0 0 1 3.51 15",
      copy: "M20 9h-9a2 2 0 0 0-2 2v9a2 2 0 0 0 2 2h9a2 2 0 0 0 2-2v-9a2 2 0 0 0-2-2zM5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1",
      check: "M20 6L9 17l-5-5",
      layers: "M12 2l10 6.5v7L12 22 2 15.5v-7zM12 22v-7M22 8.5l-10 7-10-7",
      brain: "M12 2a7 7 0 0 0-7 7c0 3 2 5.5 5 7v4h4v-4c3-1.5 5-4 5-7a7 7 0 0 0-7-7z",
      chevron: "M9 18l6-6-6-6",
      arrowDown: "M12 5v14M19 12l-7 7-7-7",
      database: "M12 2C6.48 2 2 4.02 2 6.5v11C2 19.98 6.48 22 12 22s10-2.02 10-4.5v-11C22 4.02 17.52 2 12 2z",
      save: "M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2zM17 21v-8H7v8M7 3v5h8",
      trash: "M3 6h18M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2",
      bookmark: "M19 21l-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z",
      panelRight: "M3 3h18v18H3zM15 3v18",
      cpu: "M9 2v3M15 2v3M9 19v3M15 19v3M2 9h3M2 15h3M19 9h3M19 15h3M6 5h12a1 1 0 0 1 1 1v12a1 1 0 0 1-1 1H6a1 1 0 0 1-1-1V6a1 1 0 0 1 1-1zM9 9h6v6H9z",
      shuffle: "M16 3h5v5M4 20L21 3M21 16v5h-5M15 15l6 6M4 4l5 5",
      gitBranch: "M6 3v12M18 9a3 3 0 1 0 0-6 3 3 0 0 0 0 6zM6 21a3 3 0 1 0 0-6 3 3 0 0 0 0 6zM18 9a9 9 0 0 1-9 9",
      filter: "M22 3H2l8 9.46V19l4 2v-8.54L22 3",
      edit: "M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z",
      xCircle: "M12 2a10 10 0 1 0 0 20 10 10 0 0 0 0-20zM15 9l-6 6M9 9l6 6",
      external: "M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6M15 3h6v6M10 14L21 3",
      sun: "M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42M12 5a7 7 0 1 0 0 14A7 7 0 0 0 12 5z",
      moon: "M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z",
      "book-open": "M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2zM22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z",
      folderOpen: "M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z",
      pin: "M12 17v5 M9 10.76a2 2 0 0 1-1.11 1.79l-1.78.9A2 2 0 0 0 5 15.34V17a1 1 0 0 0 1 1h12a1 1 0 0 0 1-1v-1.66a2 2 0 0 0-1.11-1.79l-1.78-.9A2 2 0 0 1 15 10.76V7a1 1 0 0 0-1-1H9a1 1 0 0 0-1 1v3.76z",
      messageSquare: "M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z",
      xSmall: "M18 6L6 18M6 6l12 12",
    };

    const I = ({ name, size = 16, color = "currentColor", style = {} }) => (
      <Icon d={icons[name] || ""} size={size} color={color} style={style} />
    );

    // ─── Shared Components ────────────────────
    const GlowDot = ({ color = T.accent, size = 6 }) => (
      <span style={{
        display: "inline-block", width: size, height: size, borderRadius: "50%",
        background: color, boxShadow: `0 0 ${size}px ${color}60`, flexShrink: 0
      }} />
    );

    const Badge = ({ children, color = T.accent }) => (
      <span className="mono" style={{
        display: "inline-flex", alignItems: "center", gap: 4,
        padding: "2px 8px", borderRadius: 4, fontSize: 11, fontWeight: 600,
        background: `${color}15`, color, border: `1px solid ${color}30`, whiteSpace: "nowrap"
      }}>
        {children}
      </span>
    );

    const StatBox = ({ label, value, sub, color = T.accent, loading }) => (
      <div style={{
        background: T.surface, border: `1px solid ${T.border}`, borderRadius: 8,
        padding: "16px 18px", flex: 1, minWidth: 140
      }}>
        <div style={{
          color: T.textMuted, fontSize: 11, fontWeight: 600, textTransform: "uppercase",
          letterSpacing: 1, marginBottom: 8
        }}>{label}</div>
        <div className="mono" style={{ fontSize: 26, fontWeight: 700, color, lineHeight: 1.1 }}>
          {loading ? <span style={{ animation: "pulse 1s infinite" }}>—</span> : value}
        </div>
        {sub && <div style={{ color: T.textMuted, fontSize: 11, marginTop: 4 }}>{sub}</div>}
      </div>
    );

    const ProgressBar = ({ value, max, color = T.accent, height = 6 }) => {
      const pct = Math.min(100, (value / max) * 100);
      return (
        <div style={{ flex: 1, height, borderRadius: height, background: T.surfaceAlt, overflow: "hidden" }}>
          <div style={{
            height: "100%", borderRadius: height, width: `${pct}%`,
            background: `linear-gradient(90deg, ${color}90, ${color})`,
            boxShadow: `0 0 8px ${color}40`, transition: "width 0.5s ease"
          }} />
        </div>
      );
    };

    const Btn = ({ children, color = T.accent, variant = "solid", onClick, disabled, style: s = {} }) => {
      const isSolid = variant === "solid";
      return (
        <button onClick={onClick} disabled={disabled} style={{
          padding: "8px 18px", borderRadius: 6, border: isSolid ? "none" : `1px solid ${T.border}`,
          background: isSolid ? `linear-gradient(135deg, ${color}, ${color}cc)` : "transparent",
          color: isSolid ? T.bg : T.textMuted, fontSize: 12, fontWeight: 700, cursor: disabled ? "default" : "pointer",
          fontFamily: "'JetBrains Mono', monospace", display: "flex", alignItems: "center", gap: 6,
          opacity: disabled ? 0.5 : 1, transition: "all 0.15s", ...s,
        }}>{children}</button>
      );
    };

    // ─── Shared Constants ─────────────────────
    const typeColors = { tool_call: T.blue, decision: T.purple, file_change: T.accent, fact_stored: T.warn, session_start: "#4ade80", session_save: "#4ade80" };
    const toolColors = { search: T.blue, compress: T.purple, read: T.blue, filter: T.purple, validate: T.accent, session: "#4ade80", memory: T.purple, status: T.warn, delegate: "#e879f9", snapshot: "#4ade80", restore: "#4ade80", transcript: T.blue };
    const getToolColor = (name) => { const n = (name || "").toLowerCase(); const k = Object.keys(toolColors).find(k => n.includes(k)); return k ? toolColors[k] : T.textMuted; };

    const timeAgo = (iso) => {
      if (!iso) return "";
      const diff = (Date.now() - new Date(iso).getTime()) / 1000;
      if (diff < 60) return `${Math.floor(diff)}s ago`;
      if (diff < 3600) return `${Math.floor(diff / 60)}m ago`;
      if (diff < 86400) return `${Math.floor(diff / 3600)}h ago`;
      return `${Math.floor(diff / 86400)}d ago`;
    };
    const localTime = (iso) => { if (!iso) return ""; const d = new Date(iso); return d.toLocaleTimeString([], { hour: "2-digit", minute: "2-digit", second: "2-digit" }); };
    const localDate = (iso) => { if (!iso) return ""; return new Date(iso).toLocaleDateString(); };
    const formatDuration = (seconds) => {
      if (seconds < 0) seconds = 0;
      const h = Math.floor(seconds / 3600);
      const m = Math.floor((seconds % 3600) / 60);
      const s = seconds % 60;
      return h ? `${h}h ${m}m` : `${m}m ${s}s`;
    };
    const useLiveDuration = (startedIso, isLive) => {
      const [dur, setDur] = useState("");
      useEffect(() => {
        if (!startedIso || !isLive) { setDur(""); return; }
        const tick = () => setDur(formatDuration(Math.floor((Date.now() - new Date(startedIso).getTime()) / 1000)));
        tick();
        const iv = setInterval(tick, 1000);
        return () => clearInterval(iv);
      }, [startedIso, isLive]);
      return dur;
    };

    // ─── Dashboard ────────────────────────────
    const Dashboard = ({ stats, loading, notifications = [], ackNotification, ackAllNotifications }) => {
      const files = stats?.files || [];
      const colorMap = { tsx: T.blue, ts: T.purple, py: T.accent, jsx: T.blue, js: T.warn, yaml: T.warn, json: T.textMuted, md: T.textMuted, css: T.purple, html: T.error, r: T.accent, R: T.accent, sh: T.warn };
      const [memFacts, setMemFacts] = useState([]);
      const [mcpStatus, setMcpStatus] = useState(null);
      const [recentToolCalls, setRecentToolCalls] = useState([]);
      const [meta, setMeta] = useState({});
      const [editing, setEditing] = useState(false);
      const [editForm, setEditForm] = useState({});
      const [saving, setSaving] = useState(false);
      const [showFiles, setShowFiles] = useState(false);
      const [showAllFiles, setShowAllFiles] = useState(false);
      const [showTools, setShowTools] = useState(false);
      const [showClaudeUsage, setShowClaudeUsage] = useState(false);
      const [showClaudeExtra, setShowClaudeExtra] = useState(false);
      const [claudeUsage, setClaudeUsage] = useState(null);
      const [monthlyBudget, setMonthlyBudget] = useState(() => parseFloat(localStorage.getItem("c3-claude-budget") || "20"));
      const [editingBudget, setEditingBudget] = useState(false);
      const [budgetInput, setBudgetInput] = useState("");
      // Weekly reset schedule: weekday (0=Mon…6=Sun) + UTC hour. Default: Friday 22 UTC (≈ Fri 6PM ET)
      const [weeklyResetWd, setWeeklyResetWd] = useState(() => parseInt(localStorage.getItem("c3-weekly-wd") || "4"));
      const [weeklyResetHr, setWeeklyResetHr] = useState(() => parseInt(localStorage.getItem("c3-weekly-hr") || "22"));

      useEffect(() => {
        api.get('/api/memory/facts').then(setMemFacts).catch(() => { });
        api.get('/api/mcp/status').then(setMcpStatus).catch(() => { });
        api.get('/api/project/meta').then(setMeta).catch(() => { });
        api.get('/api/activity?type=tool_call&limit=10').then(setRecentToolCalls).catch(() => { });
        api.get(`/api/claude_usage?weekly_reset_weekday=${weeklyResetWd}&weekly_reset_hour_utc=${weeklyResetHr}`).then(setClaudeUsage).catch(() => { });
      }, []);

      const saveMeta = async () => {
        setSaving(true);
        try {
          const updated = await api.put('/api/project/meta', editForm);
          setMeta(updated);
          setEditing(false);
        } catch (e) { }
        setSaving(false);
      };

      const openEdit = () => {
        setEditForm({
          name: meta.name || projectName,
          tech_stack: meta.tech_stack || stats?.tech_stack || '',
          description: meta.description || '',
        });
        setEditing(true);
      };

      const projectName = stats?.project_path ? stats.project_path.split(/[/\\]/).pop() : "\u2014";
      const orig = stats?.total_original_tokens || 0;
      const comp = stats?.total_compressed_tokens || 0;
      const saved = orig - comp;
      const pct = stats?.savings_pct || 0;
      const cost = (saved * 0.003 / 1000).toFixed(2);
      const ct = stats?.claude_tokens;
      const hasClaudeTokens = ct && ct.sessions_found > 0;
      const apiCost = hasClaudeTokens ? (() => { const cr = ct.cache_read_tokens || 0; const cw = ct.cache_creation_tokens || 0; const bi = (ct.total_input_tokens || 0) - cr - cw; return ((bi * 3 + cw * 3.75 + cr * 0.30 + (ct.total_output_tokens || 0) * 15) / 1000000).toFixed(2); })() : null;
      const convUsage = stats?.conversation_token_usage;
      const sourceUsage = convUsage?.sources || {};
      const sourceEntries = Object.entries(sourceUsage).sort((a, b) => (b[1]?.total_tokens || 0) - (a[1]?.total_tokens || 0));
      const topSourceSummary = sourceEntries.slice(0, 3).map(([name, d]) => `${name}:${(((d?.total_tokens || 0) / 1000) || 0).toFixed(1)}K`).join(" · ");
      const b = stats?.context_budget;
      const hasBudget = b && b.call_count > 0;
      const overBudget = b && b.response_tokens >= (b.threshold || 35000);
      const budgetPct = hasBudget ? Math.min(100, Math.round((b.response_tokens / (b.threshold || 35000)) * 100)) : 0;
      const budgetColor = overBudget ? T.error : budgetPct >= 70 ? T.warn : T.accent;

      // Collapsible section header
      const Section = ({ label, icon, color, open, onToggle, badge, children }) => (
        <div style={{ background: T.surface, border: `1px solid ${T.border}`, borderRadius: 8, overflow: "hidden" }}>
          <div onClick={onToggle} style={{ display: "flex", alignItems: "center", gap: 8, padding: "12px 16px", cursor: "pointer", userSelect: "none" }}>
            <I name={icon} size={13} color={color || T.textMuted} />
            <span style={{ fontSize: 12, fontWeight: 600, color: T.textMuted, textTransform: "uppercase", letterSpacing: 1, flex: 1 }}>{label}</span>
            {badge}
            <I name="chevron" size={12} color={T.textMuted} style={{ transform: open ? "rotate(90deg)" : "rotate(0deg)", transition: "transform 0.15s" }} />
          </div>
          {open && <div style={{ padding: "0 16px 16px" }}>{children}</div>}
        </div>
      );

      return (
        <div className="fade-up" style={{ display: "flex", flexDirection: "column", gap: 14 }}>

          {/* ── Row 1: Project header ── */}
          {editing ? (
            <div style={{ background: T.surface, border: `1px solid ${T.border}`, borderRadius: 8, padding: "14px 16px", display: "flex", flexDirection: "column", gap: 10 }}>
              <div style={{ fontSize: 10, fontWeight: 700, color: T.textDim, textTransform: "uppercase", letterSpacing: 1 }}>Edit Project Info</div>
              <div style={{ display: "flex", gap: 10 }}>
                <div style={{ flex: 2 }}>
                  <div style={{ fontSize: 10, color: T.textDim, marginBottom: 3 }}>Name</div>
                  <input value={editForm.name || ''} onChange={e => setEditForm(p => ({ ...p, name: e.target.value }))}
                    onKeyDown={e => { if (e.key === 'Enter') saveMeta(); if (e.key === 'Escape') setEditing(false); }}
                    style={{
                      width: "100%", background: T.bg, border: `1px solid ${T.border}`, borderRadius: 4,
                      padding: "5px 8px", fontSize: 13, color: T.text, fontFamily: "'JetBrains Mono', monospace", outline: "none"
                    }}
                    placeholder={projectName} autoFocus />
                </div>
                <div style={{ flex: 1 }}>
                  <div style={{ fontSize: 10, color: T.textDim, marginBottom: 3 }}>Tech Stack</div>
                  <input value={editForm.tech_stack || ''} onChange={e => setEditForm(p => ({ ...p, tech_stack: e.target.value }))}
                    onKeyDown={e => { if (e.key === 'Enter') saveMeta(); if (e.key === 'Escape') setEditing(false); }}
                    style={{
                      width: "100%", background: T.bg, border: `1px solid ${T.border}`, borderRadius: 4,
                      padding: "5px 8px", fontSize: 13, color: T.text, fontFamily: "'JetBrains Mono', monospace", outline: "none"
                    }}
                    placeholder="e.g. Python | React" />
                </div>
              </div>
              <div>
                <div style={{ fontSize: 10, color: T.textDim, marginBottom: 3 }}>Description</div>
                <input value={editForm.description || ''} onChange={e => setEditForm(p => ({ ...p, description: e.target.value }))}
                  onKeyDown={e => { if (e.key === 'Enter') saveMeta(); if (e.key === 'Escape') setEditing(false); }}
                  style={{
                    width: "100%", background: T.bg, border: `1px solid ${T.border}`, borderRadius: 4,
                    padding: "5px 8px", fontSize: 13, color: T.text, fontFamily: "'DM Sans', sans-serif", outline: "none"
                  }}
                  placeholder="Short project description" />
              </div>
              <div style={{ display: "flex", gap: 8, justifyContent: "flex-end" }}>
                <button onClick={() => setEditing(false)}
                  style={{
                    padding: "5px 12px", borderRadius: 4, border: `1px solid ${T.border}`, background: "transparent",
                    color: T.textMuted, fontSize: 12, cursor: "pointer", fontFamily: "'DM Sans', sans-serif"
                  }}>
                  Cancel
                </button>
                <button onClick={saveMeta} disabled={saving}
                  style={{
                    padding: "5px 12px", borderRadius: 4, border: "none", background: T.accent, color: T.bg,
                    fontSize: 12, fontWeight: 600, cursor: saving ? "default" : "pointer", opacity: saving ? 0.7 : 1,
                    display: "flex", alignItems: "center", gap: 5, fontFamily: "'DM Sans', sans-serif"
                  }}>
                  <I name={saving ? "refresh" : "save"} size={11} color={T.bg}
                    style={saving ? { animation: "spin 0.6s linear infinite" } : {}} />
                  {saving ? "Saving..." : "Save"}
                </button>
              </div>
            </div>
          ) : (
            <div style={{ display: "flex", alignItems: "center", gap: 12, padding: "6px 0" }}>
              <span className="mono" style={{ fontSize: 17, fontWeight: 700, color: T.accent }}>{meta.name || projectName}</span>
              {(meta.tech_stack || stats?.tech_stack) && (
                <Badge color={T.purple}>{meta.tech_stack || stats?.tech_stack}</Badge>
              )}
              {meta.description && (
                <span style={{ fontSize: 12, color: T.textDim, fontStyle: "italic" }}>{meta.description}</span>
              )}
              <Badge color={mcpStatus?.configured ? T.accent : T.textMuted}>{mcpStatus?.configured ? "MCP Active" : "MCP Off"}</Badge>
              <span style={{ flex: 1 }} />
              <span className="mono" style={{ fontSize: 11, color: T.textDim }}>{stats?.project_path || ""}</span>
              <button onClick={openEdit} title="Edit project info"
                style={{
                  padding: "3px 6px", borderRadius: 4, border: `1px solid ${T.border}`, background: "transparent",
                  cursor: "pointer", display: "flex", alignItems: "center", flexShrink: 0
                }}>
                <I name="edit" size={11} color={T.textDim} />
              </button>
            </div>
          )}

          {/* ── Row 2: Hero stats strip ── */}
          <div style={{ display: "flex", gap: 10, flexWrap: "wrap" }}>
            <StatBox label="Tokens Saved" value={saved >= 1000 ? (saved / 1000).toFixed(1) + "K" : saved} sub={`${pct}% rate \u00b7 $${cost} saved`} color={T.accent} loading={loading} />
            <StatBox label="Files" value={stats?.index?.files_indexed || 0} sub={`${stats?.index?.total_chunks || 0} chunks \u00b7 ${((orig / 1000) || 0).toFixed(1)}K tokens`} color={T.blue} loading={loading} />
            <StatBox label="Sessions" value={stats?.sessions_count || 0} sub={`${stats?.total_decisions || 0} decisions \u00b7 ${memFacts.length} facts`} color={T.warn} loading={loading} />
            {hasClaudeTokens && (
              <StatBox label="API Cost" value={`$${apiCost}`}
                sub={`${((ct.total_input_tokens || 0) / 1000).toFixed(1)}K in \u00b7 ${((ct.total_output_tokens || 0) / 1000).toFixed(1)}K out`}
                color={T.purple} />
            )}
            {sourceEntries.length > 0 && (
              <StatBox label="By Source" value={sourceEntries[0][0]} sub={topSourceSummary} color={T.blue} />
            )}
            {hasBudget && (
              <StatBox label="Budget" value={`${budgetPct}%`}
                sub={`${b.response_tokens >= 1000 ? (b.response_tokens / 1000).toFixed(1) + "K" : b.response_tokens} C3 tokens \u00b7 ${b.call_count} calls`}
                color={budgetColor} />
            )}
          </div>

          {/* ── Row 3: Savings progress bar (inline, minimal) ── */}
          <div style={{ display: "flex", alignItems: "center", gap: 10 }}>
            <span style={{ fontSize: 11, color: T.textMuted, flexShrink: 0 }}>Savings</span>
            <ProgressBar value={pct} max={100} color={T.accent} height={6} />
            <span className="mono" style={{ fontSize: 12, color: T.accent, fontWeight: 600, flexShrink: 0 }}>{pct}%</span>
            {hasBudget && (<>
              <span style={{ color: T.border, margin: "0 4px" }}>|</span>
              <span style={{ fontSize: 11, color: T.textMuted, flexShrink: 0 }}>Budget</span>
              <ProgressBar value={b.response_tokens} max={b.threshold || 35000} color={budgetColor} height={6} />
              <span className="mono" style={{ fontSize: 12, color: budgetColor, fontWeight: 600, flexShrink: 0 }}>
                {b.response_tokens >= 1000 ? (b.response_tokens / 1000).toFixed(1) + "K" : b.response_tokens}
              </span>
            </>)}
          </div>

          {/* ── Row 4: Claude Session Usage ── */}
          {(() => {
            const cu = claudeUsage;
            if (!cu || cu.sessions_found === 0) return null;
            const cr = cu.cache_read_tokens || 0;
            const cw = cu.cache_creation_tokens || 0;
            const totalIn = cu.total_input_tokens || 0;
            const totalOut = cu.total_output_tokens || 0;
            const baseIn = totalIn - cr - cw;
            const costIn = baseIn * 3 / 1e6;
            const costCW = cw * 3.75 / 1e6;
            const costCR = cr * 0.30 / 1e6;
            const costOut = totalOut * 15 / 1e6;
            const totalCost = costIn + costCW + costCR + costOut;
            const remaining = Math.max(0, monthlyBudget - totalCost);
            const usedPct = Math.min(100, Math.round((totalCost / monthlyBudget) * 100));
            const usageColor = usedPct >= 90 ? T.error : usedPct >= 70 ? T.warn : T.accent;
            const fmtK = n => n >= 1000 ? (n / 1000).toFixed(1) + "K" : String(n);
            const sessions = cu.sessions || [];

            // Session cost helper (for project-level breakdown)
            const sessionCost = s => {
              const r = s.cache_read_tokens || 0, w = s.cache_creation_tokens || 0;
              const inp = (s.input_tokens || 0) - r - w;
              return (inp * 3 + w * 3.75 + r * 0.30 + (s.output_tokens || 0) * 15) / 1e6;
            };
            const pctColor = p => p >= 90 ? T.error : p >= 70 ? T.warn : T.accent;

            // Global windows (all projects, matching Claude.ai settings display)
            const gw = cu.global_windows || {};
            const sess5h = gw.session_5h || {};
            const weekW = gw.weekly || {};
            const planLimits = gw.limits || {};

            // Format "Resets in X hr Y min" / "Resets in X min"
            const fmtResetIn = secs => {
              if (secs == null) return null;
              const h = Math.floor(secs / 3600);
              const m = Math.floor((secs % 3600) / 60);
              if (h > 0) return `Resets in ${h} hr${m > 0 ? ` ${m} min` : ""}`;
              if (m > 0) return `Resets in ${m} min`;
              return "Resets soon";
            };
            // Format "Resets Day H:MM AM/PM" for weekly
            const fmtResetDay = isoStr => {
              if (!isoStr) return null;
              const d = new Date(isoStr);
              return "Resets " + d.toLocaleDateString([], { weekday: "short" }) + " " +
                d.toLocaleTimeString([], { hour: "numeric", minute: "2-digit" });
            };

            const saveBudget = () => {
              const v = parseFloat(budgetInput);
              if (!isNaN(v) && v > 0) {
                setMonthlyBudget(v);
                localStorage.setItem("c3-claude-budget", String(v));
              }
              setEditingBudget(false);
            };

            // Reusable window usage row
            const WindowRow = ({ label, pct, tokensFmt, limitFmt, resetStr, accentColor }) => (
              <div style={{ background: T.surfaceAlt, border: `1px solid ${T.border}`, borderRadius: 6, padding: "8px 12px" }}>
                <div style={{ display: "flex", alignItems: "center", gap: 8, marginBottom: 5 }}>
                  <span style={{ fontSize: 11, fontWeight: 600, color: accentColor, textTransform: "uppercase", letterSpacing: 0.8 }}>{label}</span>
                  <span className="mono" style={{ fontSize: 10, color: T.textDim }}>{tokensFmt}{limitFmt ? ` / ${limitFmt}` : ""} tokens</span>
                  <span style={{ flex: 1 }} />
                  {resetStr && <span className="mono" style={{ fontSize: 10, color: T.textDim }}>{resetStr}</span>}
                  <Badge color={pctColor(pct)}>{pct}% used</Badge>
                </div>
                <ProgressBar value={pct} max={100} color={pctColor(pct)} height={5} />
              </div>
            );

            return (
              <Section label="Claude Session Usage" icon="zap" color={T.purple}
                open={showClaudeUsage} onToggle={() => setShowClaudeUsage(!showClaudeUsage)}
                badge={<Badge color={T.purple}>${totalCost.toFixed(2)} · {cu.sessions_found} sessions</Badge>}>

                {/* Current 5-hour session + Weekly usage bars (global, all projects) */}
                {(sess5h.total_tokens > 0 || weekW.total_tokens > 0) && (
                  <div style={{ display: "flex", flexDirection: "column", gap: 6, marginBottom: 10 }}>
                    {sess5h.total_tokens != null && (
                      <WindowRow label="Current Session (5h)"
                        pct={sess5h.pct_used || 0}
                        tokensFmt={sess5h.total_tokens_fmt || "0"}
                        limitFmt={sess5h.limit_tokens_fmt}
                        resetStr={fmtResetIn(sess5h.resets_in_seconds)}
                        accentColor={T.blue} />
                    )}
                    {weekW.total_tokens != null && (
                      <WindowRow label="This Week (7d)"
                        pct={weekW.pct_used || 0}
                        tokensFmt={weekW.total_tokens_fmt || "0"}
                        limitFmt={weekW.limit_tokens_fmt}
                        resetStr={fmtResetDay(weekW.reset_at)}
                        accentColor={T.purple} />
                    )}
                    {gw.subscription_type && (
                      <div style={{ fontSize: 10, color: T.textDim, display: "flex", alignItems: "center", gap: 8, justifyContent: "flex-end" }}>
                        <span>Plan: <span style={{ color: T.textMuted }}>{gw.subscription_type}</span></span>
                        <span style={{ color: T.textDim }}>·</span>
                        <span>Weekly resets:
                          <select value={weeklyResetWd} onChange={e => {
                            const v = parseInt(e.target.value);
                            setWeeklyResetWd(v);
                            localStorage.setItem("c3-weekly-wd", String(v));
                            api.get(`/api/claude_usage?weekly_reset_weekday=${v}&weekly_reset_hour_utc=${weeklyResetHr}`).then(setClaudeUsage).catch(() => {});
                          }} style={{ background: T.bg, border: `1px solid ${T.border}`, borderRadius: 3, color: T.textMuted, fontSize: 10, marginLeft: 4 }}>
                            {["Mon","Tue","Wed","Thu","Fri","Sat","Sun"].map((d,i) => <option key={i} value={i}>{d}</option>)}
                          </select>
                          <select value={weeklyResetHr} onChange={e => {
                            const v = parseInt(e.target.value);
                            setWeeklyResetHr(v);
                            localStorage.setItem("c3-weekly-hr", String(v));
                            api.get(`/api/claude_usage?weekly_reset_weekday=${weeklyResetWd}&weekly_reset_hour_utc=${v}`).then(setClaudeUsage).catch(() => {});
                          }} style={{ background: T.bg, border: `1px solid ${T.border}`, borderRadius: 3, color: T.textMuted, fontSize: 10, marginLeft: 3 }}>
                            {Array.from({length:24},(_,i)=><option key={i} value={i}>{String(i).padStart(2,"0")}:00 UTC</option>)}
                          </select>
                        </span>
                        <span style={{ color: T.textDim }}>· limits approximate</span>
                      </div>
                    )}
                  </div>
                )}

                {/* Token summary row */}
                <div style={{ display: "grid", gridTemplateColumns: "repeat(4, 1fr)", gap: 8, marginBottom: 10 }}>
                  {[
                    { label: "Input", value: fmtK(baseIn), sub: `$${costIn.toFixed(3)}`, color: T.blue },
                    { label: "Cache Write", value: fmtK(cw), sub: `$${costCW.toFixed(3)}`, color: T.warn },
                    { label: "Cache Read", value: fmtK(cr), sub: `$${costCR.toFixed(3)}`, color: T.accent },
                    { label: "Output", value: fmtK(totalOut), sub: `$${costOut.toFixed(3)}`, color: T.purple },
                  ].map(s => (
                    <div key={s.label} style={{ background: `${s.color}12`, border: `1px solid ${s.color}30`, borderRadius: 6, padding: "7px 10px" }}>
                      <div style={{ fontSize: 10, color: T.textMuted, textTransform: "uppercase", letterSpacing: 0.8 }}>{s.label}</div>
                      <div className="mono" style={{ fontSize: 15, fontWeight: 700, color: s.color, marginTop: 2 }}>{s.value}</div>
                      <div className="mono" style={{ fontSize: 10, color: T.textDim }}>{s.sub}</div>
                    </div>
                  ))}
                </div>
                {/* Total cost + remaining balance */}
                <div style={{ background: T.surfaceAlt, border: `1px solid ${T.border}`, borderRadius: 6, padding: "10px 12px", marginBottom: 10 }}>
                  <div style={{ display: "flex", alignItems: "center", gap: 10, marginBottom: 6 }}>
                    <span style={{ fontSize: 12, color: T.textMuted, flex: 1 }}>Total cost this project</span>
                    <span className="mono" style={{ fontSize: 14, fontWeight: 700, color: usageColor }}>${totalCost.toFixed(4)}</span>
                    <span style={{ fontSize: 12, color: T.textDim }}>/ </span>
                    {editingBudget ? (
                      <input
                        autoFocus
                        value={budgetInput}
                        onChange={e => setBudgetInput(e.target.value)}
                        onBlur={saveBudget}
                        onKeyDown={e => { if (e.key === "Enter") saveBudget(); if (e.key === "Escape") setEditingBudget(false); }}
                        style={{
                          width: 64, background: T.bg, border: `1px solid ${T.border}`, borderRadius: 4,
                          padding: "2px 6px", fontSize: 12, color: T.text, fontFamily: "'JetBrains Mono', monospace", outline: "none"
                        }}
                        placeholder={String(monthlyBudget)}
                      />
                    ) : (
                      <button onClick={() => { setBudgetInput(String(monthlyBudget)); setEditingBudget(true); }}
                        style={{ background: "none", border: `1px solid ${T.border}`, borderRadius: 4, padding: "2px 6px", color: T.textDim, fontSize: 12, cursor: "pointer", fontFamily: "'JetBrains Mono', monospace" }}>
                        ${monthlyBudget.toFixed(0)} budget
                      </button>
                    )}
                  </div>
                  <ProgressBar value={usedPct} max={100} color={usageColor} height={6} />
                  <div style={{ display: "flex", justifyContent: "space-between", marginTop: 4 }}>
                    <span className="mono" style={{ fontSize: 10, color: T.textDim }}>{usedPct}% used</span>
                    <span className="mono" style={{ fontSize: 10, color: remaining > 0 ? T.accent : T.error }}>
                      {remaining > 0 ? `$${remaining.toFixed(2)} remaining` : "Over budget"}
                    </span>
                  </div>
                </div>
                {/* Extra usage: per-session table */}
                {sessions.length > 0 && (
                  <div>
                    <button onClick={() => setShowClaudeExtra(!showClaudeExtra)}
                      style={{
                        width: "100%", padding: "6px 0", background: "none", border: `1px solid ${T.border}`,
                        borderRadius: 6, color: T.textMuted, fontSize: 11, cursor: "pointer",
                        fontFamily: "'JetBrains Mono', monospace", display: "flex", alignItems: "center", justifyContent: "center", gap: 6
                      }}>
                      <I name={showClaudeExtra ? "chevronUp" : "chevronDown"} size={11} color={T.textMuted} />
                      {showClaudeExtra ? "Hide" : "Show"} per-session breakdown ({sessions.length})
                    </button>
                    {showClaudeExtra && (
                      <div style={{ marginTop: 8, display: "flex", flexDirection: "column", gap: 4 }}>
                        {sessions.slice(0, 20).map((s, i) => {
                          const sCR = s.cache_read_tokens || 0;
                          const sCW = s.cache_creation_tokens || 0;
                          const sIn = s.input_tokens || 0;
                          const sOut = s.output_tokens || 0;
                          const sCost = ((sIn - sCR - sCW) * 3 + sCW * 3.75 + sCR * 0.30 + sOut * 15) / 1e6;
                          const sid = (s.session_id || "").slice(0, 16);
                          const dateStr = s.started ? new Date(s.started).toLocaleDateString([], { month: "short", day: "numeric", hour: "2-digit", minute: "2-digit" }) : "-";
                          return (
                            <div key={i} style={{ display: "flex", alignItems: "center", gap: 8, padding: "5px 8px", borderRadius: 5, background: T.surfaceAlt, border: `1px solid ${T.border}` }}>
                              <span className="mono" style={{ fontSize: 10, color: T.textDim, width: 120, flexShrink: 0, overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }}>{sid}</span>
                              <span className="mono" style={{ fontSize: 10, color: T.textDim, width: 120, flexShrink: 0 }}>{dateStr}</span>
                              <span className="mono" style={{ fontSize: 10, color: T.blue, flex: 1 }}>{fmtK(sIn)} in</span>
                              <span className="mono" style={{ fontSize: 10, color: T.purple }}>{fmtK(sOut)} out</span>
                              <Badge color={T.warn}>${sCost.toFixed(4)}</Badge>
                            </div>
                          );
                        })}
                        {sessions.length > 20 && (
                          <div style={{ fontSize: 11, color: T.textMuted, textAlign: "center", padding: 4 }}>+{sessions.length - 20} more sessions</div>
                        )}
                      </div>
                    )}
                  </div>
                )}
              </Section>
            );
          })()}

          {/* ── Row 5: Notifications (only if present) ── */}
          {notifications.length > 0 && (
            <div style={{ background: T.surface, border: `1px solid ${T.border}`, borderRadius: 8, padding: "12px 16px" }}>
              <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 10 }}>
                <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
                  <I name="zap" size={13} color={T.warn} />
                  <span style={{ fontSize: 12, fontWeight: 600, color: T.textMuted, textTransform: "uppercase", letterSpacing: 1 }}>Notifications</span>
                  <Badge color={T.warn}>{notifications.length}</Badge>
                </div>
                <button onClick={ackAllNotifications}
                  style={{
                    padding: "3px 8px", borderRadius: 4, border: `1px solid ${T.border}`, background: "transparent",
                    color: T.textMuted, fontSize: 10, cursor: "pointer", fontFamily: "'JetBrains Mono', monospace"
                  }}>
                  Dismiss all
                </button>
              </div>
              <div style={{ display: "flex", flexDirection: "column", gap: 4 }}>
                {notifications.slice(0, 5).map((n, i) => {
                  const sevColor = n.severity === "critical" ? T.error : n.severity === "warning" ? T.warn : T.blue;
                  return (
                    <div key={n.id || i} style={{
                      display: "flex", alignItems: "center", gap: 8, padding: "5px 10px", borderRadius: 6,
                      background: T.surfaceAlt, borderLeft: `3px solid ${sevColor}`
                    }}>
                      <Badge color={sevColor}>{n.severity}</Badge>
                      {n.ai_enhanced && <Badge color="#b38aff">AI</Badge>}
                      <span style={{ fontSize: 10, color: T.accent, fontWeight: 600, fontFamily: "'JetBrains Mono', monospace" }}>{n.agent}</span>
                      <span className="mono" style={{ fontSize: 11, color: T.text, flex: 1, overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }}>
                        {n.title}{n.message ? ` - ${n.message}` : ""}
                      </span>
                      <button onClick={() => ackNotification(n.id)}
                        style={{
                          width: 20, height: 20, borderRadius: 4, border: "none", background: "transparent",
                          cursor: "pointer", display: "flex", alignItems: "center", justifyContent: "center", flexShrink: 0
                        }}>
                        <I name="x" size={12} color={T.textMuted} />
                      </button>
                    </div>
                  );
                })}
                {notifications.length > 5 && (
                  <div style={{ fontSize: 11, color: T.textMuted, textAlign: "center", padding: 4 }}>
                    +{notifications.length - 5} more
                  </div>
                )}
              </div>
            </div>
          )}

          {/* ── Row 6: Collapsible sections (closed by default) ── */}
          <Section label="Recent Tool Calls" icon="terminal" color={T.blue} open={showTools}
            onToggle={() => setShowTools(!showTools)}
            badge={recentToolCalls.length > 0 && <Badge color={T.blue}>{recentToolCalls.length}</Badge>}>
            {recentToolCalls.length === 0 ? (
              <div style={{ padding: 12, textAlign: "center", color: T.textMuted, fontSize: 13 }}>No MCP tool calls recorded yet</div>
            ) : (
              <div style={{ display: "flex", flexDirection: "column", gap: 4 }}>
                {recentToolCalls.map((tc, i) => (
                  <div key={i} style={{ display: "flex", alignItems: "center", gap: 10, padding: "5px 10px", borderRadius: 6, background: T.surfaceAlt }}>
                    <Badge color={getToolColor(tc.tool || "")}>{tc.tool || "unknown"}</Badge>
                    <span className="mono" style={{ fontSize: 11, color: T.textMuted, flex: 1, overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }}>
                      {typeof tc.args === 'object' ? JSON.stringify(tc.args).slice(0, 80) : String(tc.args || "").slice(0, 80)}
                    </span>
                    {tc.timestamp && <span className="mono" style={{ fontSize: 10, color: T.textDim, flexShrink: 0 }}>{localTime(tc.timestamp)}</span>}
                  </div>
                ))}
              </div>
            )}
          </Section>

          <Section label="File Compression" icon="minimize" color={T.accent} open={showFiles}
            onToggle={() => setShowFiles(!showFiles)}
            badge={files.length > 0 && <Badge color={T.accent}>{files.length} files</Badge>}>
            {(() => {
              const PREVIEW_COUNT = 8;
              const sorted = [...files].map(f => {
                const p = f.origTokens > 0 ? Math.round(((f.origTokens - f.compTokens) / f.origTokens) * 100) : 0;
                return { ...f, pct: p, saved: f.origTokens - f.compTokens };
              }).sort((a, bb) => bb.saved - a.saved);
              const visible = showAllFiles ? sorted : sorted.slice(0, PREVIEW_COUNT);
              const hasMore = sorted.length > PREVIEW_COUNT;
              const byType = {};
              sorted.forEach(f => { byType[f.type] = (byType[f.type] || 0) + 1; });
              const topTypes = Object.entries(byType).sort((a, bb) => bb[1] - a[1]).slice(0, 5);
              return (<>
                {files.length === 0 && !loading && (
                  <div style={{ padding: 20, textAlign: "center", color: T.textMuted, fontSize: 13 }}>
                    No files indexed yet. Run <code className="mono" style={{ color: T.accent }}>c3 init</code> first.
                  </div>
                )}
                {files.length > 0 && (
                  <div style={{ display: "flex", gap: 6, marginBottom: 10 }}>
                    {topTypes.map(([ext, count]) => (
                      <span key={ext} className="mono" style={{
                        fontSize: 9, padding: "1px 5px", borderRadius: 3,
                        background: `${colorMap[ext] || T.textMuted}15`, color: colorMap[ext] || T.textMuted
                      }}>
                        .{ext} {count}
                      </span>
                    ))}
                  </div>
                )}
                <div style={{ display: "flex", flexDirection: "column", gap: 6 }}>
                  {visible.map((f, i) => {
                    const c = colorMap[f.type] || T.text;
                    return (
                      <div key={i} style={{ display: "flex", alignItems: "center", gap: 12 }}>
                        <div className="mono" style={{ width: 200, overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap", fontSize: 12, color: T.text }}>{f.path}</div>
                        <ProgressBar value={f.pct} max={100} color={c} height={7} />
                        <span className="mono" style={{ fontSize: 11, color: c, minWidth: 80, textAlign: "right" }}>{f.origTokens}\u2192{f.compTokens}</span>
                        <Badge color={c}>{f.pct}%</Badge>
                      </div>
                    );
                  })}
                </div>
                {hasMore && (
                  <button onClick={() => setShowAllFiles(!showAllFiles)}
                    style={{
                      width: "100%", padding: "8px 0", marginTop: 8, background: "none", border: `1px solid ${T.border}`,
                      borderRadius: 6, color: T.accent, fontSize: 11, cursor: "pointer", fontFamily: "'JetBrains Mono', monospace",
                      display: "flex", alignItems: "center", justifyContent: "center", gap: 6
                    }}>
                    <I name={showAllFiles ? "chevronUp" : "chevronDown"} size={12} color={T.accent} />
                    {showAllFiles ? "Show top 8" : `Show all ${sorted.length} files`}
                  </button>
                )}
              </>);
            })()}
          </Section>
        </div>
      );
    };

    // ─── Compressor ───────────────────────────
    const Compressor = ({ files }) => {
      const [selectedFile, setSelectedFile] = useState("");
      const [filterQuery, setFilterQuery] = useState("");
      const [sortBy, setSortBy] = useState("name");
      const [hoveredFile, setHoveredFile] = useState(null);
      const [mode, setMode] = useState("smart");
      const [result, setResult] = useState(null);
      const [compressing, setCompressing] = useState(false);
      const [batchResult, setBatchResult] = useState(null);
      const [batching, setBatching] = useState(false);
      const [batchExpanded, setBatchExpanded] = useState(false);
      const [history, setHistory] = useState([]);
      const [activeHistory, setActiveHistory] = useState(null);
      const [copied, setCopied] = useState(false);
      const [dictionary, setDictionary] = useState(null);
      const [dictOpen, setDictOpen] = useState(false);
      const [protectedFiles, setProtectedFiles] = useState([]);

      useEffect(() => { api.get('/api/protocol/dictionary').then(setDictionary).catch(() => { }); }, []);
      useEffect(() => {
        api.get('/api/compress/protected-files')
          .then(r => setProtectedFiles(r.protected_files || []))
          .catch(() => { });
      }, []);

      const fileList = files || [];
      const modes = [
        { key: "map", desc: "Structural map" },
        { key: "dense_map", desc: "Detailed map" },
        { key: "smart", desc: "Adaptive" },
        { key: "diff", desc: "Changes only" },
      ];
      const colorMap = { tsx: T.blue, ts: T.purple, py: T.accent, jsx: T.blue, js: T.warn, yaml: T.warn, json: T.textMuted, md: T.textMuted, css: T.purple, html: T.error, r: T.accent, R: T.accent, sh: T.warn };
      const getExt = (p) => { const m = p.match(/\.(\w+)$/); return m ? m[1] : ""; };

      const filtered = fileList
        .filter(f => !filterQuery || f.path.toLowerCase().includes(filterQuery.toLowerCase()))
        .sort((a, b) => {
          if (sortBy === "tokens") return b.tokens - a.tokens;
          if (sortBy === "type") return getExt(a.path).localeCompare(getExt(b.path));
          return a.path.localeCompare(b.path);
        });

      const totalFiles = fileList.length;
      const totalTokens = fileList.reduce((s, f) => s + (f.tokens || 0), 0);
      const avgSavings = history.length > 0 ? Math.round(history.reduce((s, h) => s + h.savings, 0) / history.length) : 0;
      const lastCompressed = history.length > 0 ? history[0].time : null;

      const handleCompress = async () => {
        if (!selectedFile) return;
        setCompressing(true);
        setActiveHistory(null);
        try {
          const r = await api.post('/api/compress', { file: selectedFile, mode });
          setResult(r);
          if (!r.error) {
            const entry = { file: selectedFile, mode: r.mode || mode, savings: r.savings_pct || 0, time: new Date().toISOString(), result: r };
            setHistory(prev => [entry, ...prev].slice(0, 10));
          }
        } catch (e) { setResult({ error: e.message }); }
        setCompressing(false);
      };

      const handleBatch = async () => {
        setBatching(true);
        setBatchResult(null);
        setBatchExpanded(false);
        try {
          const r = await api.post('/api/compress/batch', { mode });
          setBatchResult(r);
        } catch (e) { setBatchResult({ error: e.message }); }
        setBatching(false);
      };

      const handleCopy = (text) => {
        navigator.clipboard.writeText(text);
        setCopied(true);
        setTimeout(() => setCopied(false), 1500);
      };

      const displayResult = activeHistory ? activeHistory.result : result;

      return (
        <div className="fade-up" style={{ display: "flex", flexDirection: "column", gap: 16 }}>
          {/* Stats Row */}
          <div style={{ display: "flex", gap: 12, flexWrap: "wrap" }}>
            <StatBox label="Total Files" value={totalFiles} sub="indexed" color={T.blue} />
            <StatBox label="Total Tokens" value={totalTokens.toLocaleString()} sub="across all files" color={T.purple} />
            <StatBox label="Avg Savings" value={history.length > 0 ? `${avgSavings}%` : "—"} sub={history.length > 0 ? `from ${history.length} compressions` : "no data yet"} color={T.accent} />
            <StatBox label="Last Compressed" value={lastCompressed ? timeAgo(lastCompressed) : "—"} sub={lastCompressed ? history[0].file.split('/').pop() : "never"} color={T.warn} />
          </div>

          {/* Controls Card */}
          <div style={{ background: T.surface, border: `1px solid ${T.border}`, borderRadius: 8, padding: 18 }}>
            <div style={{ display: "flex", gap: 16, flexWrap: "wrap" }}>
              {/* File Picker */}
              <div style={{ flex: "1 1 220px", minWidth: 200 }}>
                <label style={{ display: "block", fontSize: 11, fontWeight: 600, color: T.textMuted, textTransform: "uppercase", letterSpacing: 1, marginBottom: 6 }}>File</label>
                <div style={{ display: "flex", gap: 6, marginBottom: 6 }}>
                  <div style={{ flex: 1, position: "relative" }}>
                    <I name="search" size={12} color={T.textMuted} style={{ position: "absolute", left: 8, top: 9 }} />
                    <input value={filterQuery} onChange={e => setFilterQuery(e.target.value)} placeholder="Filter files..."
                      className="mono" style={{ width: "100%", padding: "7px 10px 7px 26px", borderRadius: 6, background: T.surfaceAlt, border: `1px solid ${T.border}`, color: T.text, fontSize: 11, outline: "none" }} />
                  </div>
                  <select value={sortBy} onChange={e => setSortBy(e.target.value)}
                    style={{ padding: "7px 8px", borderRadius: 6, background: T.surfaceAlt, border: `1px solid ${T.border}`, color: T.textMuted, fontSize: 11, outline: "none" }}>
                    <option value="name">Name</option>
                    <option value="tokens">Tokens</option>
                    <option value="type">Type</option>
                  </select>
                </div>
                <div style={{ maxHeight: 250, overflow: "auto", borderRadius: 6, border: `1px solid ${T.border}`, background: T.surfaceAlt }}>
                  {filtered.length === 0 && <div style={{ padding: 12, fontSize: 11, color: T.textDim, textAlign: "center" }}>No files match</div>}
                  {filtered.map((f, i) => {
                    const ext = getExt(f.path);
                    const isSelected = selectedFile === f.path;
                    const isHovered = hoveredFile === f.path;
                    return (
                      <div key={i} onClick={() => { setSelectedFile(f.path); setResult(null); setActiveHistory(null); }}
                        onMouseEnter={() => setHoveredFile(f.path)} onMouseLeave={() => setHoveredFile(null)}
                        className="mono" style={{
                          display: "flex", alignItems: "center", justifyContent: "space-between", gap: 8,
                          padding: "6px 10px", fontSize: 11, cursor: "pointer", borderBottom: `1px solid ${T.border}20`,
                          background: isSelected ? `${T.accent}15` : isHovered ? `${T.border}40` : "transparent",
                          color: isSelected ? T.accent : T.text, transition: "background 0.1s"
                        }}>
                        <div style={{ display: "flex", alignItems: "center", gap: 6, overflow: "hidden" }}>
                          <span style={{
                            padding: "1px 5px", borderRadius: 3, fontSize: 9, fontWeight: 700,
                            background: `${colorMap[ext] || T.textMuted}20`, color: colorMap[ext] || T.textMuted
                          }}>{ext}</span>
                          <span style={{ overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }}>{f.path}</span>
                        </div>
                        <span style={{ color: T.textMuted, fontSize: 10, flexShrink: 0 }}>{f.tokens}</span>
                      </div>
                    );
                  })}
                </div>
                {protectedFiles.length > 0 && (
                  <div className="mono" style={{ marginTop: 8, fontSize: 10, color: T.textDim, lineHeight: 1.5 }}>
                    Protected: {protectedFiles.join(", ")}
                  </div>
                )}
              </div>

              {/* Mode Selection */}
              <div style={{ flex: "0 0 auto", minWidth: 140 }}>
                <label style={{ display: "block", fontSize: 11, fontWeight: 600, color: T.textMuted, textTransform: "uppercase", letterSpacing: 1, marginBottom: 6 }}>Mode</label>
                <div style={{ display: "flex", flexDirection: "column", gap: 4 }}>
                  {modes.map(m => (
                    <button key={m.key} onClick={() => { setMode(m.key); setResult(null); setActiveHistory(null); }} className="mono"
                      style={{
                        padding: "8px 14px", borderRadius: 6, border: `1px solid ${mode === m.key ? T.accent + "60" : T.border}`,
                        background: mode === m.key ? T.accentDim : "transparent", color: mode === m.key ? T.accent : T.textMuted,
                        fontSize: 11, cursor: "pointer", textAlign: "left", transition: "all 0.15s"
                      }}>
                      <div style={{ fontWeight: 600 }}>{m.key}</div>
                      <div style={{ fontSize: 9, opacity: 0.7, marginTop: 2 }}>{m.desc}</div>
                    </button>
                  ))}
                </div>
              </div>

              {/* Actions */}
              <div style={{ flex: "0 0 auto", display: "flex", flexDirection: "column", gap: 8, justifyContent: "flex-end" }}>
                <Btn color={T.purple} onClick={handleCompress} disabled={!selectedFile || compressing}>
                  {compressing ? <I name="refresh" size={14} style={{ animation: "spin 0.6s linear infinite" }} /> : <I name="minimize" size={14} />}
                  {compressing ? "Compressing..." : "Compress"}
                </Btn>
                <Btn color={T.warn} variant="outline" onClick={handleBatch} disabled={batching}>
                  {batching ? <I name="refresh" size={14} style={{ animation: "spin 0.6s linear infinite" }} /> : <I name="zap" size={14} />}
                  {batching ? "Batching..." : "Batch All"}
                </Btn>
              </div>
            </div>
          </div>

          {/* Compression History */}
          {history.length > 0 && (
            <div style={{ background: T.surface, border: `1px solid ${T.border}`, borderRadius: 8, overflow: "hidden" }}>
              <div style={{ padding: "10px 14px", borderBottom: `1px solid ${T.border}`, background: T.surfaceAlt }}>
                <span style={{ fontSize: 11, fontWeight: 600, color: T.textMuted, textTransform: "uppercase", letterSpacing: 1 }}>
                  <I name="clock" size={12} color={T.textMuted} /> History
                </span>
              </div>
              {history.map((h, i) => {
                const isActive = activeHistory === h;
                return (
                  <div key={i} onClick={() => { setActiveHistory(isActive ? null : h); if (!isActive) setResult(null); }}
                    style={{
                      display: "flex", alignItems: "center", gap: 10, padding: "8px 14px", cursor: "pointer",
                      borderBottom: `1px solid ${T.border}20`, background: isActive ? `${T.accent}10` : "transparent",
                      transition: "background 0.1s"
                    }}>
                    <Badge color={colorMap[getExt(h.file)] || T.textMuted}>{h.file.split('/').pop()}</Badge>
                    <Badge color={T.purple}>{h.mode}</Badge>
                    <span className="mono" style={{ fontSize: 11, color: T.accent, fontWeight: 600 }}>{h.savings}%</span>
                    <span style={{ fontSize: 10, color: T.textDim, marginLeft: "auto" }}>{timeAgo(h.time)}</span>
                  </div>
                );
              })}
            </div>
          )}

          {/* Result View */}
          {displayResult && !displayResult.error && (
            <div style={{ display: "flex", gap: 12, flexWrap: "wrap" }}>
              <div style={{ flex: "0 0 200px", display: "flex", flexDirection: "column", gap: 12 }}>
                <StatBox label="Original" value={displayResult.original_tokens} sub="tokens" color={T.warn} />
                <StatBox label="Compressed" value={displayResult.compressed_tokens} sub="tokens" color={T.accent} />
                <StatBox label="Savings" value={`${displayResult.savings_pct}%`} sub={`${displayResult.saved_tokens} saved`} color={T.accent} />
                <div style={{ marginTop: 4 }}>
                  <ProgressBar value={displayResult.saved_tokens || 0} max={displayResult.original_tokens || 1} color={T.accent} height={8} />
                  <div style={{ fontSize: 10, color: T.textDim, marginTop: 4, textAlign: "center" }}>token reduction</div>
                </div>
              </div>
              <div style={{ flex: 1, minWidth: 300, background: T.surface, border: `1px solid ${T.border}`, borderRadius: 8, overflow: "hidden" }}>
                <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", padding: "10px 14px", borderBottom: `1px solid ${T.border}`, background: T.surfaceAlt }}>
                  <span className="mono" style={{ fontSize: 12, color: T.textMuted, display: "flex", alignItems: "center", gap: 6 }}>
                    <GlowDot /> {displayResult.filepath ? displayResult.filepath.split(/[/\\]/).pop() : "result"} — {displayResult.mode} mode
                  </span>
                  <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
                    <Badge>{displayResult.compressed_tokens} tokens</Badge>
                    <button onClick={() => handleCopy(displayResult.compressed)}
                      style={{
                        padding: "4px 10px", borderRadius: 4, border: `1px solid ${T.border}`, background: copied ? T.accentDim : "transparent",
                        color: copied ? T.accent : T.textMuted, fontSize: 11, cursor: "pointer", display: "flex", alignItems: "center", gap: 4, transition: "all 0.15s"
                      }}>
                      <I name={copied ? "check" : "copy"} size={12} />
                      {copied ? "Copied" : "Copy"}
                    </button>
                  </div>
                </div>
                <div style={{ overflow: "auto", maxHeight: 450 }}>
                  {(displayResult.compressed || "").split('\n').map((line, i) => (
                    <div key={i} style={{ display: "flex", fontSize: 12, lineHeight: 1.7, fontFamily: "'JetBrains Mono', monospace" }}>
                      <span style={{
                        width: 44, flexShrink: 0, textAlign: "right", padding: "0 10px 0 0", color: T.textDim,
                        userSelect: "none", borderRight: `1px solid ${T.border}30`
                      }}>{i + 1}</span>
                      <span style={{ padding: "0 12px", whiteSpace: "pre", color: T.text }}>{line}</span>
                    </div>
                  ))}
                </div>
              </div>
            </div>
          )}

          {/* Batch Result View */}
          {batchResult && !batchResult.error && (
            <div style={{ background: T.surface, border: `1px solid ${T.accent}30`, borderRadius: 8, overflow: "hidden" }}>
              <div style={{ padding: "14px 18px", background: T.accentDim, borderBottom: `1px solid ${T.accent}20` }}>
                <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", marginBottom: 10 }}>
                  <span style={{ fontSize: 13, fontWeight: 700, color: T.accent, display: "flex", alignItems: "center", gap: 6 }}>
                    <I name="zap" size={14} color={T.accent} /> Batch Compression Complete
                  </span>
                  <div style={{ display: "flex", gap: 8 }}>
                    <Badge color={T.blue}>{batchResult.files_processed} files</Badge>
                    <Badge color={T.purple}>{batchResult.total_compressed_tokens} tokens</Badge>
                    <Badge color={T.accent}>{batchResult.savings_pct}% saved</Badge>
                  </div>
                </div>
                <ProgressBar value={batchResult.total_original_tokens - batchResult.total_compressed_tokens} max={batchResult.total_original_tokens || 1} color={T.accent} height={8} />
                <div className="mono" style={{ fontSize: 10, color: T.textMuted, marginTop: 6 }}>
                  {batchResult.total_original_tokens.toLocaleString()} → {batchResult.total_compressed_tokens.toLocaleString()} tokens
                </div>
              </div>
              <div style={{ padding: "10px 14px" }}>
                <button onClick={() => setBatchExpanded(!batchExpanded)}
                  style={{
                    display: "flex", alignItems: "center", gap: 6, padding: "6px 12px", borderRadius: 6,
                    border: `1px solid ${T.border}`, background: "transparent", color: T.textMuted, fontSize: 11, cursor: "pointer"
                  }}>
                  <I name="chevron" size={12} style={{ transform: batchExpanded ? "rotate(90deg)" : "none", transition: "transform 0.15s" }} />
                  {batchExpanded ? "Hide" : "Show"} combined output
                  {batchExpanded && (
                    <span onClick={e => { e.stopPropagation(); handleCopy(batchResult.combined_output); }}
                      style={{
                        marginLeft: 8, padding: "2px 8px", borderRadius: 4, border: `1px solid ${T.border}`,
                        color: copied ? T.accent : T.textMuted, fontSize: 10, cursor: "pointer"
                      }}>
                      <I name={copied ? "check" : "copy"} size={10} /> {copied ? "Copied" : "Copy"}
                    </span>
                  )}
                </button>
                {batchExpanded && (
                  <pre className="mono" style={{
                    marginTop: 10, padding: 14, background: T.surfaceAlt, borderRadius: 6,
                    fontSize: 11, lineHeight: 1.6, color: T.text, overflow: "auto", maxHeight: 400, border: `1px solid ${T.border}`
                  }}>
                    {batchResult.combined_output}
                  </pre>
                )}
              </div>
            </div>
          )}

          {/* Error States */}
          {displayResult?.error && (
            <div style={{ padding: 16, background: T.errorDim, border: `1px solid ${T.error}30`, borderRadius: 8, color: T.error, fontSize: 13, display: "flex", alignItems: "center", gap: 8 }}>
              <I name="zap" size={14} color={T.error} /> {displayResult.error}
            </div>
          )}
          {batchResult?.error && (
            <div style={{ padding: 16, background: T.errorDim, border: `1px solid ${T.error}30`, borderRadius: 8, color: T.error, fontSize: 13, display: "flex", alignItems: "center", gap: 8 }}>
              <I name="zap" size={14} color={T.error} /> Batch error: {batchResult.error}
            </div>
          )}

          {/* Compression Dictionary (reference) */}
          {dictionary && (() => {
            const actions = Object.entries(dictionary.actions).map(([k, v]) => ({ code: v, term: k })).filter(e => e.code);
            const terms = Object.entries(dictionary.terms).map(([k, v]) => ({ code: v, term: k }));
            const custom = Object.entries(dictionary.custom || {});
            return (
              <div style={{ background: T.surface, border: `1px solid ${T.border}`, borderRadius: 8, overflow: "hidden" }}>
                <button onClick={() => setDictOpen(o => !o)}
                  style={{
                    width: "100%", display: "flex", alignItems: "center", gap: 10, padding: "12px 16px",
                    background: "transparent", border: "none", cursor: "pointer", textAlign: "left"
                  }}>
                  <I name="braces" size={14} color={T.purple} />
                  <span style={{ fontSize: 12, fontWeight: 600, color: T.textMuted, textTransform: "uppercase", letterSpacing: 1, flex: 1 }}>
                    Compression Dictionary
                  </span>
                  <Badge color={T.purple}>{actions.length + terms.length + custom.length} codes</Badge>
                  <I name="chevron" size={12} color={T.textDim} style={{ transform: dictOpen ? "rotate(90deg)" : "rotate(0deg)", transition: "transform 0.15s" }} />
                </button>
                {dictOpen && (
                  <div style={{ padding: "0 16px 16px", display: "flex", flexDirection: "column", gap: 14 }}>
                    <div>
                      <div style={{ fontSize: 10, fontWeight: 700, color: T.textDim, textTransform: "uppercase", letterSpacing: 1, marginBottom: 8 }}>
                        Actions ({actions.length})
                      </div>
                      <div style={{ display: "flex", flexWrap: "wrap", gap: 5 }}>
                        {actions.map(({ code, term }, i) => (
                          <span key={i} className="mono" style={{
                            padding: "2px 8px", borderRadius: 4, fontSize: 11,
                            background: T.surfaceAlt, border: `1px solid ${T.border}`
                          }}>
                            <span style={{ color: T.purple, fontWeight: 600 }}>{code}</span>
                            <span style={{ color: T.textDim }}>=</span>
                            <span style={{ color: T.textMuted }}>{term}</span>
                          </span>
                        ))}
                      </div>
                    </div>
                    <div>
                      <div style={{ fontSize: 10, fontWeight: 700, color: T.textDim, textTransform: "uppercase", letterSpacing: 1, marginBottom: 8 }}>
                        Terms ({terms.length})
                      </div>
                      <div style={{ display: "flex", flexWrap: "wrap", gap: 5 }}>
                        {terms.map(({ code, term }, i) => (
                          <span key={i} className="mono" style={{
                            padding: "2px 8px", borderRadius: 4, fontSize: 11,
                            background: T.surfaceAlt, border: `1px solid ${T.border}`
                          }}>
                            <span style={{ color: T.blue, fontWeight: 600 }}>{code}</span>
                            <span style={{ color: T.textDim }}>=</span>
                            <span style={{ color: T.textMuted }}>{term}</span>
                          </span>
                        ))}
                      </div>
                    </div>
                    {custom.length > 0 && (
                      <div>
                        <div style={{ fontSize: 10, fontWeight: 700, color: T.textDim, textTransform: "uppercase", letterSpacing: 1, marginBottom: 8 }}>
                          Project-Specific ({custom.length})
                        </div>
                        <div style={{ display: "flex", flexWrap: "wrap", gap: 5 }}>
                          {custom.map(([term, code], i) => (
                            <span key={i} className="mono" style={{
                              padding: "2px 8px", borderRadius: 4, fontSize: 11,
                              background: T.accentDim, border: `1px solid ${T.accent}30`
                            }}>
                              <span style={{ color: T.accent, fontWeight: 600 }}>{code}</span>
                              <span style={{ color: T.textDim }}>=</span>
                              <span style={{ color: T.textMuted }}>{term}</span>
                            </span>
                          ))}
                        </div>
                      </div>
                    )}
                  </div>
                )}
              </div>
            );
          })()}
        </div>
      );
    };

    // ─── Smart Index ──────────────────────────
    const SmartIndex = () => {
      const [query, setQuery] = useState("");
      const [results, setResults] = useState(null);
      const [searching, setSearching] = useState(false);
      const [indexStats, setIndexStats] = useState(null);
      const [rebuilding, setRebuilding] = useState(false);
      const [rebuildDone, setRebuildDone] = useState(false);
      const [topK, setTopK] = useState(5);
      const [maxTokens, setMaxTokens] = useState(4000);
      const [history, setHistory] = useState([]);
      const [activeHistory, setActiveHistory] = useState(null);
      const [historyExpanded, setHistoryExpanded] = useState(true);
      const [expandedResults, setExpandedResults] = useState(new Set());
      const [copied, setCopied] = useState(null);

      const colorMap = { tsx: T.blue, ts: T.purple, py: T.accent, jsx: T.blue, js: T.warn, yaml: T.warn, json: T.textMuted, md: T.textMuted, css: T.purple, html: T.error, r: T.accent, R: T.accent, sh: T.warn };
      const getExt = (p) => { const m = (p || "").match(/\.(\w+)$/); return m ? m[1] : ""; };

      useEffect(() => { api.get('/api/index/stats').then(setIndexStats).catch(() => { }); }, []);

      const handleSearch = async () => {
        if (!query.trim()) return;
        setSearching(true);
        setActiveHistory(null);
        setExpandedResults(new Set());
        setCopied(null);
        try {
          const r = await api.post('/api/search', { query, top_k: topK, max_tokens: maxTokens });
          setResults(r);
          if (r?.results) {
            setHistory(prev => [{ query: query.trim(), results: r, time: new Date().toISOString(), topK, maxTokens }, ...prev].slice(0, 10));
          }
        } catch (e) { setResults({ error: e.message }); }
        setSearching(false);
      };

      const handleRebuild = async () => {
        setRebuilding(true);
        setRebuildDone(false);
        try {
          await api.post('/api/index/rebuild');
          const s = await api.get('/api/index/stats');
          setIndexStats(s);
          setRebuildDone(true);
          setTimeout(() => setRebuildDone(false), 2000);
        } catch (e) { }
        setRebuilding(false);
      };

      const handleCopy = (text, id) => {
        navigator.clipboard.writeText(text);
        setCopied(id);
        setTimeout(() => setCopied(null), 1500);
      };

      const toggleExpand = (idx) => {
        setExpandedResults(prev => {
          const next = new Set(prev);
          next.has(idx) ? next.delete(idx) : next.add(idx);
          return next;
        });
      };

      const restoreHistory = (entry) => {
        setActiveHistory(entry);
        setResults(entry.results);
        setQuery(entry.query);
        setExpandedResults(new Set());
        setCopied(null);
      };

      const displayResults = results?.results;
      const totalTokens = results?.context_tokens || 0;

      const copyAll = () => {
        if (!displayResults) return;
        const text = displayResults.map(r => `// ${r.file}${r.name ? " → " + r.name : ""} (${r.type}, L${r.lines})\n${r.content}`).join("\n\n");
        handleCopy(text, "all");
      };

      return (
        <div className="fade-up" style={{ display: "flex", flexDirection: "column", gap: 16 }}>
          {/* Stats Row */}
          <div style={{ display: "flex", gap: 12, flexWrap: "wrap" }}>
            <StatBox label="Files Indexed" value={indexStats?.files_indexed || 0} color={T.blue} />
            <StatBox label="Chunks" value={indexStats?.total_chunks || 0} color={T.purple} />
            <StatBox label="Codebase Tokens" value={(indexStats?.total_tokens_in_codebase || 0).toLocaleString()} color={T.accent} />
            <StatBox label="Symbols" value={indexStats?.unique_symbols || 0} color={T.warn} />
            <StatBox label="Index Size" value={`${indexStats?.index_size_kb || 0}KB`} color={T.textMuted} />
          </div>

          {/* Search Controls Card */}
          <div style={{ background: T.surface, border: `1px solid ${T.border}`, borderRadius: 8, padding: 18 }}>
            <div style={{ display: "flex", gap: 10 }}>
              <div style={{ flex: 1, display: "flex", alignItems: "center", gap: 8, padding: "0 14px", borderRadius: 6, background: T.surfaceAlt, border: `1px solid ${T.border}` }}>
                <I name="search" size={14} color={T.textMuted} />
                <input value={query} onChange={e => setQuery(e.target.value)}
                  onKeyDown={e => e.key === "Enter" && handleSearch()}
                  placeholder='Search your codebase: "fix metrics calculation"'
                  className="mono"
                  style={{ flex: 1, padding: "10px 0", background: "transparent", border: "none", color: T.text, fontSize: 13, outline: "none" }} />
              </div>
            </div>
            <div style={{ display: "flex", gap: 12, alignItems: "center", marginTop: 12, flexWrap: "wrap" }}>
              <div style={{ display: "flex", alignItems: "center", gap: 6 }}>
                <label style={{ fontSize: 11, fontWeight: 600, color: T.textMuted, textTransform: "uppercase", letterSpacing: 1 }}>Results</label>
                <select value={topK} onChange={e => setTopK(Number(e.target.value))}
                  style={{ padding: "6px 8px", borderRadius: 6, background: T.surfaceAlt, border: `1px solid ${T.border}`, color: T.text, fontSize: 12, outline: "none" }}>
                  {[3, 5, 10, 15, 20].map(n => <option key={n} value={n}>{n}</option>)}
                </select>
              </div>
              <div style={{ display: "flex", alignItems: "center", gap: 6 }}>
                <label style={{ fontSize: 11, fontWeight: 600, color: T.textMuted, textTransform: "uppercase", letterSpacing: 1 }}>Max Tokens</label>
                <select value={maxTokens} onChange={e => setMaxTokens(Number(e.target.value))}
                  style={{ padding: "6px 8px", borderRadius: 6, background: T.surfaceAlt, border: `1px solid ${T.border}`, color: T.text, fontSize: 12, outline: "none" }}>
                  {[2000, 4000, 8000].map(n => <option key={n} value={n}>{n.toLocaleString()}</option>)}
                </select>
              </div>
              <div style={{ flex: 1 }} />
              <Btn color={T.blue} onClick={handleSearch} disabled={searching}>
                {searching ? <I name="refresh" size={14} style={{ animation: "spin 0.6s linear infinite" }} /> : <I name="search" size={14} />}
                Search
              </Btn>
              <Btn variant="outline" onClick={handleRebuild} disabled={rebuilding}>
                {rebuildDone ? <I name="check" size={12} color={T.accent} /> : <I name="refresh" size={12} style={rebuilding ? { animation: "spin 0.6s linear infinite" } : {}} />}
                {rebuildDone ? "Done" : "Rebuild"}
              </Btn>
            </div>
          </div>

          {/* Search History */}
          {history.length > 0 && (
