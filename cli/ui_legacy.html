    // ─── Agents Tab ───────────────────────────
    const AgentsTab = () => {
      const [config, setConfig] = useState(null);
      const [models, setModels] = useState([]);
      const [loading, setLoading] = useState(true);
      const [saving, setSaving] = useState(false);
      const [expandedAgents, setExpandedAgents] = useState({});
      const [history, setHistory] = useState([]);
      const toggleExpanded = (name) => setExpandedAgents(prev => ({ ...prev, [name]: !prev[name] }));

      const load = async () => {
        try {
          const [cfgRes, modelsRes, histRes] = await Promise.all([
            fetch(`${API}/api/agents/config`).then(r => r.json()),
            fetch(`${API}/api/ollama/models`).then(r => r.json()).catch(() => ({ models: [] })),
            fetch(`${API}/api/notifications/history`).then(r => r.json()).catch(() => []),
          ]);
          setConfig(cfgRes);
          setModels(modelsRes.models || []);
          setHistory(Array.isArray(histRes) ? histRes : []);
        } catch (e) { console.error(e); }
        setLoading(false);
      };

      useEffect(() => { load(); }, []);

      const updateAgent = async (agentName, key, value) => {
        setSaving(true);
        try {
          const res = await fetch(`${API}/api/agents/config`, {
            method: "PUT",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ [agentName]: { [key]: value } }),
          });
          setConfig(await res.json());
        } catch (e) { console.error(e); }
        setSaving(false);
      };

      if (loading) return (<div style={{ padding: 24, color: T.text }}>Loading agent config...</div>);
      if (!config || config.error) return (<div style={{ padding: 24, color: T.error }}>Failed to load agent config</div>);

      const cardStyle = {
        background: T.surface, border: `1px solid ${T.border}`, borderRadius: 10,
        padding: 20, marginBottom: 16
      };
      const toggleRow = {
        display: "flex", justifyContent: "space-between", alignItems: "center",
        padding: "8px 0", borderBottom: `1px solid ${T.border}22`

      const OnOff = ({ on, onClick, labelOn = "ON", labelOff = "OFF" }) => (
        <button onClick={onClick} style={{
          padding: "4px 12px", borderRadius: 6, border: `1px solid ${T.border}`,
          background: on ? T.accent + "22" : T.error + "22",
          color: on ? T.accent : T.error,
          cursor: "pointer", fontSize: 12, fontWeight: 600, minWidth: 60
        }}>{on ? labelOn : labelOff}</button>
      );

      const agentDescriptions = {
        IndexStaleness: "Monitors file changes and triggers index rebuild",
        MemoryPruner: "Finds duplicate facts using similarity detection",
        ClaudeMdDrift: "Checks CLAUDE.md for staleness when files change",
        ContextBudget: "Monitors token budget, warns before threshold crossings, and auto-snapshots at L2",
        SessionInsight: "Analyzes session activity to surface coaching tips",
        AutonomyPlanner: "Builds proactive next-step plans from tool telemetry and context pressure",
        ClaudeMdUpdater: "Auto-maintains CLAUDE.md using local AI, memory, and session data",
        FileMemory: "Maintains structural file maps with line ranges for targeted reads",
        DelegateCoach: "Watches activity log for missed local AI delegation opportunities and emits actionable coaching",
      };

      const numInput = {
        width: 80, padding: "4px 8px", borderRadius: 6, border: `1px solid ${T.border}`,
        background: T.bg, color: T.text, fontSize: 13, textAlign: "right"
      };

      const renderAdvanced = (name, cfg) => {
        if (name === "IndexStaleness") return (<>
          <div style={toggleRow}>
            <span style={{ fontSize: 13, color: T.text }}>Warn Threshold (files)</span>
            <input type="number" value={cfg.warn_threshold ?? 5} min={1}
              onChange={e => { const v = parseInt(e.target.value); if (v >= 1) updateAgent(name, "warn_threshold", v); }}
              style={numInput} />
          </div>
          <div style={{ ...toggleRow, borderBottom: "none" }}>
            <span style={{ fontSize: 13, color: T.text }}>Rebuild Threshold (files)</span>
            <input type="number" value={cfg.rebuild_threshold ?? 15} min={1}
              onChange={e => { const v = parseInt(e.target.value); if (v >= 1) updateAgent(name, "rebuild_threshold", v); }}
              style={numInput} />
          </div>
        </>);
        if (name === "MemoryPruner") return (<>
          <div style={toggleRow}>
            <span style={{ fontSize: 13, color: T.text }}>Embed Model</span>
            {models.length > 0 ? (
              <select value={cfg.embed_model || "nomic-embed-text"}
                onChange={e => updateAgent(name, "embed_model", e.target.value)}
                style={{ padding: "4px 8px", borderRadius: 6, border: `1px solid ${T.border}`, background: T.bg, color: T.text, fontSize: 12, fontFamily: "monospace", cursor: "pointer", minWidth: 140 }}>
                {models.map(m => <option key={m} value={m}>{m}</option>)}
                {!models.includes(cfg.embed_model) && cfg.embed_model && <option value={cfg.embed_model}>{cfg.embed_model} (not found)</option>}
              </select>
            ) : (
              <span style={{ fontSize: 12, color: T.textMuted, fontFamily: "monospace" }}>{cfg.embed_model || "nomic-embed-text"}</span>
            )}
          </div>
          <div style={{ ...toggleRow, borderBottom: "none" }}>
            <span style={{ fontSize: 13, color: T.text }}>Similarity Threshold</span>
            <input type="number" value={cfg.similarity_threshold ?? 0.8} min={0.1} max={1.0} step={0.05}
              onChange={e => { const v = parseFloat(e.target.value); if (v >= 0.1 && v <= 1.0) updateAgent(name, "similarity_threshold", v); }}
              style={numInput} />
          </div>
        </>);
        if (name === "SessionInsight") return (
          <div style={{ ...toggleRow, borderBottom: "none" }}>
            <span style={{ fontSize: 13, color: T.text }}>Min Tool Calls</span>
            <input type="number" value={cfg.min_tool_calls ?? 10} min={1}
              onChange={e => { const v = parseInt(e.target.value); if (v >= 1) updateAgent(name, "min_tool_calls", v); }}
              style={numInput} />
          </div>
        );
        if (name === "AutonomyPlanner") return (<>
          <div style={toggleRow}>
            <span style={{ fontSize: 13, color: T.text }}>Lookback Tool Calls</span>
            <input type="number" value={cfg.lookback_tool_calls ?? 30} min={10} max={100}
              onChange={e => { const v = parseInt(e.target.value); if (v >= 10 && v <= 100) updateAgent(name, "lookback_tool_calls", v); }}
              style={numInput} />
          </div>
          <div style={toggleRow}>
            <span style={{ fontSize: 13, color: T.text }}>Cooldown (s)</span>
            <input type="number" value={cfg.cooldown_seconds ?? 600} min={60} max={3600} step={30}
              onChange={e => { const v = parseInt(e.target.value); if (v >= 60 && v <= 3600) updateAgent(name, "cooldown_seconds", v); }}
              style={numInput} />
          </div>
          <div style={toggleRow}>
            <span style={{ fontSize: 13, color: T.text }}>Min Signal Score</span>
            <input type="number" value={cfg.min_signal_score ?? 2} min={1} max={5}
              onChange={e => { const v = parseInt(e.target.value); if (v >= 1 && v <= 5) updateAgent(name, "min_signal_score", v); }}
              style={numInput} />
          </div>
          <div style={{ ...toggleRow, borderBottom: "none" }}>
            <span style={{ fontSize: 13, color: T.text }}>Max Actions</span>
            <input type="number" value={cfg.max_actions ?? 3} min={1} max={6}
              onChange={e => { const v = parseInt(e.target.value); if (v >= 1 && v <= 6) updateAgent(name, "max_actions", v); }}
              style={numInput} />
          </div>
        </>);
        if (name === "ClaudeMdUpdater") return (<>
          <div style={toggleRow}>
            <span style={{ fontSize: 13, color: T.text }}>Auto-Apply Updates</span>
            <OnOff on={cfg.auto_apply !== false} onClick={() => updateAgent(name, "auto_apply", !(cfg.auto_apply !== false))}
              labelOn="AUTO" labelOff="DRY RUN" />
          </div>
          <div style={{ ...toggleRow, borderBottom: "none" }}>
            <span style={{ fontSize: 13, color: T.text }}>Min Fact Relevance to Promote</span>
            <input type="number" value={cfg.min_facts_for_promote ?? 2} min={1} max={10}
              onChange={e => { const v = parseInt(e.target.value); if (v >= 1 && v <= 10) updateAgent(name, "min_facts_for_promote", v); }}
              style={numInput} />
          </div>
        </>);
        if (name === "FileMemory") return (
          <div style={{ ...toggleRow, borderBottom: "none" }}>
            <span style={{ fontSize: 13, color: T.text }}>Max Files Per Cycle</span>
            <input type="number" value={cfg.max_files_per_cycle ?? 5} min={1} max={20}
              onChange={e => { const v = parseInt(e.target.value); if (v >= 1 && v <= 20) updateAgent(name, "max_files_per_cycle", v); }}
              style={numInput} />
          </div>
        );
        return null;
      };

      const hasAdvanced = name => ["IndexStaleness", "MemoryPruner", "SessionInsight", "AutonomyPlanner", "ClaudeMdUpdater", "FileMemory"].includes(name);

      return (
        <div>
          <h2 style={{ margin: "0 0 8px", color: T.text }}>Background Agents</h2>
          <p style={{ color: T.textMuted, marginBottom: 20, fontSize: 13 }}>
            Autonomous agents that run periodic checks and surface findings via notifications.
            AI-enhanced agents use local Ollama models for smarter analysis.
          </p>
          <p style={{ color: T.warning || "#f59e0b", marginBottom: 20, fontSize: 12, fontStyle: "italic" }}>
            Changes take effect on next MCP server restart.
          </p>

          <div style={{
            display: "grid",
            gridTemplateColumns: "repeat(4, 1fr)",
            gap: 16,
            marginBottom: 24
          }}>
            {Object.entries(config).map(([name, cfg]) => (
              <div key={name} style={{
                background: T.surface, border: `1px solid ${T.border}`, borderRadius: 10,
                padding: 16, display: "flex", flexDirection: "column"
              }}>
                <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start", marginBottom: 12 }}>
                  <div>
                    <h3 style={{ margin: 0, color: T.accent, fontSize: 14 }}>{name}</h3>
                    <p style={{ margin: "4px 0 0", fontSize: 11, color: T.textMuted, lineHeight: 1.3 }}>{agentDescriptions[name] || ""}</p>
                  </div>
                </div>

                <div style={{ display: "flex", justifyContent: "flex-end", marginBottom: 16 }}>
                  <OnOff on={cfg.enabled} onClick={() => updateAgent(name, "enabled", !cfg.enabled)} />
                </div>

                <div style={{ flex: 1 }}></div>

                <div style={{ ...toggleRow, padding: "6px 0", borderBottom: `1px solid ${T.border}22` }}>
                  <span style={{ fontSize: 12, color: T.text }}>Use AI</span>
                  <OnOff on={cfg.use_ai} onClick={() => updateAgent(name, "use_ai", !cfg.use_ai)} />
                </div>

                <div style={{ ...toggleRow, padding: "6px 0", borderBottom: `1px solid ${T.border}22` }}>
                  <span style={{ fontSize: 12, color: T.text }}>Interval (s)</span>
                  <input type="number" value={cfg.interval} min={10} step={10}
                    onChange={e => {
                      const v = parseInt(e.target.value);
                      if (v >= 10) updateAgent(name, "interval", v);
                    }}
                    style={{ ...numInput, width: 60, padding: "2px 6px", fontSize: 12 }} />
                </div>

                <div style={{ ...toggleRow, padding: "6px 0", borderBottom: hasAdvanced(name) ? `1px solid ${T.border}22` : "none" }}>
                  <span style={{ fontSize: 12, color: T.text }}>Model</span>
                  {models.length > 0 ? (
                    <select value={cfg.ai_model || "gemma3n:latest"}
                      onChange={e => updateAgent(name, "ai_model", e.target.value)}
                      style={{
                        padding: "2px 6px", borderRadius: 4, border: `1px solid ${T.border}`,
                        background: T.bg, color: T.text, fontSize: 11, fontFamily: "monospace",
                        cursor: "pointer", maxWidth: 100
                      }}>
                      {models.map(m => <option key={m} value={m}>{m}</option>)}
                      {!models.includes(cfg.ai_model) && cfg.ai_model &&
                        <option value={cfg.ai_model}>{cfg.ai_model} (off)</option>}
                    </select>
                  ) : (
                    <span style={{ fontSize: 11, color: T.textMuted, fontFamily: "monospace" }}>{cfg.ai_model || "gemma3n:latest"} <span style={{ color: T.error, fontSize: 9 }}>(off)</span></span>
                  )}
                </div>

                {hasAdvanced(name) && (
                  <div style={{ marginTop: 4 }}>
                    <button onClick={() => toggleExpanded(name)} style={{
                      background: "none", border: "none", color: T.textMuted, cursor: "pointer",
                      fontSize: 11, padding: "4px 0", display: "flex", alignItems: "center", gap: 4
                    }}>
                      <span style={{ transform: expandedAgents[name] ? "rotate(90deg)" : "none", transition: "transform 0.15s", display: "inline-block" }}>▶</span>
                      Advanced
                    </button>
                    {expandedAgents[name] && (
                      <div style={{ padding: "4px 0 0 8px", borderLeft: `2px solid ${T.border}33`, marginLeft: 4 }}>
                        {renderAdvanced(name, cfg)}
                      </div>
                    )}
                  </div>
                )}
              </div>
            ))}
          </div>

          <div style={{ marginTop: 16, textAlign: "center" }}>
            <button onClick={() => { setLoading(true); load(); }} style={{
              padding: "8px 24px", borderRadius: 8, border: `1px solid ${T.border}`,
              background: T.surface, color: T.accent, cursor: "pointer", fontSize: 13
            }}>Refresh Config</button>
          </div>

          <div style={{ marginTop: 32 }}>
            <h3 style={{ margin: "0 0 16px", color: T.text, fontSize: 15 }}>Agent Activity Console</h3>
            <div style={{
              background: T.surfaceAlt, borderRadius: 8, padding: 12, border: `1px solid ${T.border}`,
              height: 300, overflowY: "auto", fontFamily: "'JetBrains Mono', monospace", fontSize: 11,
              display: "flex", flexDirection: "column", gap: 8
            }}>
              {history.length === 0 ? (
                <div style={{ color: T.textDim, textAlign: "center", padding: 20 }}>No agent activity recorded yet.</div>
              ) : history.map(h => {
                const sevColor = h.severity === "critical" ? T.error : h.severity === "warning" ? T.warn : T.info;
                return (
                  <div key={h.id} style={{
                    background: T.bg, padding: "8px 12px", borderRadius: 6, border: `1px solid ${T.border}`,
                    display: "flex", gap: 10, alignItems: "flex-start"
                  }}>
                    <span style={{ color: T.textDim, flexShrink: 0 }}>{new Date(h.timestamp).toLocaleTimeString()}</span>
                    <span style={{
                      padding: "2px 6px", borderRadius: 4, background: sevColor + "22", color: sevColor,
                      fontSize: 10, fontWeight: 600, textTransform: "uppercase"
                    }}>{h.severity || "info"}</span>
                    {h.ai_enhanced && <span style={{
                      padding: "2px 6px", borderRadius: 4, background: "#b38aff22", color: "#b38aff",
                      fontSize: 10, fontWeight: 600
                    }}>AI</span>}
                    <div style={{ flex: 1, minWidth: 0 }}>
                      <div style={{ fontWeight: 600, color: T.text }}><span style={{ color: T.accent, marginRight: 6 }}>{h.agent}</span>{h.title}</div>
                      <div style={{ color: T.textMuted, marginTop: 4, whiteSpace: "pre-wrap", wordBreak: "break-word" }}>{h.message}</div>
                    </div>
                  </div>
                );
              })}
            </div>
          </div>
        </div>
      );
    };

    // ——— Proxy Tab ——————————————————————————————————————————
    const ProxyTab = () => {
      const [metrics, setMetrics] = useState(null);
      const [config, setConfig] = useState(null);
      const [liveState, setLiveState] = useState(null);
      const [toolData, setToolData] = useState(null);
      const [models, setModels] = useState([]);
      const [loading, setLoading] = useState(true);
      const [needsReconnect, setNeedsReconnect] = useState(false);
      const [expandedCat, setExpandedCat] = useState(null);

      const load = async () => {
        try {
          const [mRes, cRes, sRes, tRes, modelsRes] = await Promise.all([
            fetch(`${API}/api/proxy/metrics`).then(r => r.json()),
            fetch(`${API}/api/proxy/config`).then(r => r.json()),
            fetch(`${API}/api/proxy/state`).then(r => r.json()).catch(() => null),
            fetch(`${API}/api/proxy/tools`).then(r => r.json()).catch(() => null),
            fetch(`${API}/api/ollama/models`).then(r => r.json()).catch(() => ({ models: [] })),
          ]);
          setMetrics(mRes);
          setConfig(cRes);
          setLiveState(sRes && !sRes.error ? sRes : null);
          setToolData(tRes);
          setModels(modelsRes.models || []);
        } catch (e) { console.error(e); }
        setLoading(false);
      };

      useEffect(() => { load(); }, []);

      // Config update helper — marks reconnect needed for tool-visibility changes
      const updateConfig = async (key, value, affectsTools = false) => {
        try {
          const res = await fetch(`${API}/api/proxy/config`, {
            method: "PUT",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ [key]: value }),
          });
          const newCfg = await res.json();
          setConfig(newCfg);
          if (affectsTools) {
            setNeedsReconnect(true);
            // Refresh tool inventory with new config
            const tRes = await fetch(`${API}/api/proxy/tools`).then(r => r.json()).catch(() => null);
            setToolData(tRes);
          }
        } catch (e) { console.error(e); }
      };

      // Toggle a category in always_visible
      const toggleCategory = async (cat) => {
        const current = config?.always_visible || ["all"];
        let next;
        if (current.includes("all")) {
          // Switching from "all" to specific: include everything except toggled one
          next = allCategories.filter(c => c !== cat);
        } else if (current.includes(cat)) {
          next = current.filter(c => c !== cat);
          if (next.length === 0) next = ["all"]; // Reset to all if nothing selected
        } else {
          next = [...current, cat];
          // If all are now selected, simplify to "all"
          if (allCategories.every(c => next.includes(c))) next = ["all"];
        }
        await updateConfig("always_visible", next, true);
      };

      // Pin all / unpin all
      const pinAll = async () => {
        await updateConfig("always_visible", ["all"], true);
      };
      const pinCoreOnly = async () => {
        await updateConfig("always_visible", ["core"], true);
      };

      if (loading) return (<div style={{ padding: 24, color: T.text }}>Loading proxy data...</div>);

      const cardStyle = {
        background: T.surface, border: `1px solid ${T.border}`, borderRadius: 10,

      const statRow = {
        display: "flex", justifyContent: "space-between", padding: "6px 0",

      const Stat = ({ label, value }) => (
        <div style={statRow}>
          <span style={{ color: T.textMuted }}>{label}</span>
          <span style={{ color: T.text, fontFamily: "monospace" }}>{String(value ?? "\u2014")}</span>
        </div>
      );
      const cfgInput = {
        width: 80, padding: "4px 8px", borderRadius: 6, border: `1px solid ${T.border}`,
        background: T.bg, color: T.text, fontSize: 13, textAlign: "right"

      const hasMetrics = metrics && !metrics.error;
      const alwaysVis = config?.always_visible || ["all"];
      const filterOn = config?.filter_tools !== false;
      const allCategories = ["core", "session", "memory", "analysis", "meta"];
      const catColors = {
        core: T.accent, session: T.purple, memory: T.blue,
        analysis: "#e879f9", meta: T.textMuted
      };
      const catDescriptions = {
        core: "Search, compress, read, filter, validate",
        session: "Session start/save, snapshot, restore, budget status",
        memory: "Memory add/recall/query, SLTM",
        analysis: "Delegate tasks to local LLM (Ollama)",
        meta: "Status, notifications, health diagnostics",
      };

      // Compute visible/hidden tool counts
      const categories = toolData?.categories || {};
      const visibleCount = toolData ? toolData.tools.filter(t => t.visible).length : 0;
      const totalCount = toolData ? toolData.tools.length : 0;
      const hiddenCount = totalCount - visibleCount;

      return (
        <div>
          <h2 style={{ margin: "0 0 20px", color: T.text }}>Advanced MCP Proxy</h2>
          <p style={{ color: T.textMuted, marginBottom: 20, fontSize: 13 }}>
            Optional proxy mode for dynamic tool filtering. Direct MCP mode is the recommended default.
          </p>

          {/* Reconnect banner */}
          {needsReconnect && (
            <div style={{
              background: T.warn + "18", border: `1px solid ${T.warn}55`, borderRadius: 10,
              padding: "14px 20px", marginBottom: 16, display: "flex", alignItems: "center",
              justifyContent: "space-between", gap: 12
            }}>
              <div>
                <div style={{ color: T.warn, fontWeight: 600, fontSize: 13, marginBottom: 2 }}>
                  Tool visibility changed
                </div>
                <div style={{ color: T.textMuted, fontSize: 12 }}>
                  The current session still sees the old tool list. To apply changes, restart the session or run <code style={{ background: T.bg, padding: "1px 5px", borderRadius: 4, fontSize: 11 }}>/mcp</code> to reconnect the MCP server.
                </div>
              </div>
              <button onClick={() => setNeedsReconnect(false)} style={{
                padding: "4px 12px", borderRadius: 6, border: `1px solid ${T.warn}55`,
                background: "transparent", color: T.warn, cursor: "pointer", fontSize: 11,
                flexShrink: 0, fontWeight: 600
              }}>Dismiss</button>
            </div>
          )}

          {/* Tool Visibility — primary control */}
          <div style={cardStyle}>
            <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 14 }}>
              <h3 style={{ margin: 0, color: T.accent, fontSize: 15 }}>Tool Visibility</h3>
              <div style={{ display: "flex", gap: 6, alignItems: "center" }}>
                <span style={{
                  fontSize: 12, fontFamily: "monospace", padding: "3px 10px", borderRadius: 6,
                  background: hiddenCount > 0 ? T.warn + "18" : T.accent + "18",
                  color: hiddenCount > 0 ? T.warn : T.accent,
                  border: `1px solid ${hiddenCount > 0 ? T.warn : T.accent}33`
                }}>{visibleCount}/{totalCount} visible</span>
              </div>
            </div>

            {/* Filtering mode selector */}
            <div style={{ display: "flex", gap: 8, marginBottom: 16 }}>
              <button onClick={() => updateConfig("filter_tools", false, true)} style={{
                padding: "6px 16px", borderRadius: 8, border: `1px solid ${!filterOn ? T.accent : T.border}`,
                background: !filterOn ? T.accent + "22" : "transparent",
                color: !filterOn ? T.accent : T.textMuted,
                cursor: "pointer", fontSize: 12, fontWeight: !filterOn ? 600 : 400
              }}>Show All Tools</button>
              <button onClick={() => updateConfig("filter_tools", true, true)} style={{
                padding: "6px 16px", borderRadius: 8, border: `1px solid ${filterOn ? T.accent : T.border}`,
                background: filterOn ? T.accent + "22" : "transparent",
                color: filterOn ? T.accent : T.textMuted,
                cursor: "pointer", fontSize: 12, fontWeight: filterOn ? 600 : 400
              }}>Filter by Category</button>
            </div>

            {/* Category toggles — only interactive when filtering is on */}
            {filterOn && (
              <div style={{ marginBottom: 8 }}>
                <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 10 }}>
                  <span style={{ color: T.textMuted, fontSize: 12 }}>Toggle categories to pin them as always visible:</span>
                  <div style={{ display: "flex", gap: 6 }}>
                    <button onClick={pinAll} style={{
                      padding: "2px 10px", borderRadius: 6, border: `1px solid ${T.border}`,
                      background: "transparent", color: T.accent, cursor: "pointer", fontSize: 11
                    }}>Pin All</button>
                    <button onClick={pinCoreOnly} style={{
                      padding: "2px 10px", borderRadius: 6, border: `1px solid ${T.border}`,
                      background: "transparent", color: T.textMuted, cursor: "pointer", fontSize: 11
                    }}>Core Only</button>
                  </div>
                </div>
              </div>
            )}

            {/* Category cards */}
            <div style={{ display: "flex", flexDirection: "column", gap: 6 }}>
              {allCategories.map(cat => {
                const isPinned = !filterOn || alwaysVis.includes("all") || alwaysVis.includes(cat);
                const catInfo = categories[cat];
                const toolCount = catInfo ? catInfo.tools.length : 0;
                const color = catColors[cat] || T.accent;
                const isExpanded = expandedCat === cat;

                return (
                  <div key={cat} style={{
                    border: `1px solid ${isPinned ? color + "44" : T.border}`,
                    borderRadius: 8, overflow: "hidden",
                    background: isPinned ? color + "08" : "transparent",

                    <div style={{
                      display: "flex", alignItems: "center", padding: "8px 14px", gap: 10,

                      {filterOn && (
                        <button onClick={(e) => { e.stopPropagation(); toggleCategory(cat); }} style={{
                          width: 20, height: 20, borderRadius: 4, border: `1px solid ${isPinned ? color : T.border}`,
                          background: isPinned ? color + "33" : "transparent",
                          color: isPinned ? color : T.textMuted, cursor: "pointer",
                          display: "flex", alignItems: "center", justifyContent: "center",
                          fontSize: 12, lineHeight: 1, padding: 0, flexShrink: 0
                        }}>{isPinned ? "\u2713" : ""}</button>
                      )}
                      <span style={{
                        color: isPinned ? color : T.textMuted, fontWeight: 600, fontSize: 13, flex: 1
                      }}>{cat}</span>
                      <span style={{ color: T.textMuted, fontSize: 11 }}>{toolCount} tools</span>
                      <span style={{
                        padding: "2px 8px", borderRadius: 4, fontSize: 10, fontWeight: 600,
                        background: isPinned ? T.accent + "22" : T.error + "22",
                        color: isPinned ? T.accent : T.error,
                      }}>{isPinned ? "VISIBLE" : "HIDDEN"}</span>
                      <span style={{ color: T.textMuted, fontSize: 11, transform: isExpanded ? "rotate(180deg)" : "rotate(0deg)", transition: "transform 0.15s" }}>{"\u25BC"}</span>
                    </div>
                    {/* Expanded: show tools */}
                    {isExpanded && (
                      <div style={{ padding: "0 14px 10px", borderTop: `1px solid ${T.border}22` }}>
                        <p style={{ color: T.textMuted, fontSize: 11, margin: "8px 0 6px" }}>{catDescriptions[cat]}</p>
                        <div style={{ display: "flex", gap: 6, flexWrap: "wrap" }}>
                          {(catInfo?.tools || []).map(toolName => (
                            <span key={toolName} style={{
                              padding: "3px 10px", borderRadius: 6, fontSize: 11, fontFamily: "monospace",
                              background: isPinned ? color + "14" : T.bg,
                              color: isPinned ? color : T.textMuted,
                              border: `1px solid ${isPinned ? color + "33" : T.border}`
                            }}>{toolName}</span>
                          ))}
                        </div>
                      </div>
                    )}
                  </div>
                );
              })}
            </div>

            {/* Hidden tools warning */}
            {filterOn && hiddenCount > 0 && (
              <div style={{
                marginTop: 12, padding: "8px 14px", borderRadius: 8,
                background: T.warn + "12", border: `1px solid ${T.warn}33`,
                fontSize: 12, color: T.warn
              }}>
                {hiddenCount} tool{hiddenCount > 1 ? "s" : ""} hidden from {liveState?.ide_display || 'the IDE'}. Unpinned categories may still appear dynamically based on conversation context.
              </div>
            )}
          </div>

          {/* Proxy Settings */}
          <div style={cardStyle}>
            <h3 style={{ margin: "0 0 12px", color: T.accent, fontSize: 15 }}>Proxy Settings</h3>
            <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", padding: "8px 0", borderBottom: `1px solid ${T.border}22` }}>
              <span style={{ fontSize: 13, color: T.text }}>Proxy Enabled</span>
              <button onClick={() => updateConfig("PROXY_DISABLE", !config?.PROXY_DISABLE, true)} style={{
                padding: "4px 12px", borderRadius: 6, border: `1px solid ${T.border}`,
                background: config?.PROXY_DISABLE ? T.error + "22" : T.accent + "22",
                color: config?.PROXY_DISABLE ? T.error : T.accent,
                cursor: "pointer", fontSize: 12, fontWeight: 600
              }}>{config?.PROXY_DISABLE ? "DISABLED" : "ENABLED"}</button>
            </div>
            <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", padding: "8px 0", borderBottom: `1px solid ${T.border}22` }}>
              <span style={{ fontSize: 13, color: T.text }}>Context Injection</span>
              <button onClick={() => updateConfig("inject_context_summary", !config?.inject_context_summary)} style={{
                padding: "4px 12px", borderRadius: 6, border: `1px solid ${T.border}`,
                background: config?.inject_context_summary ? T.accent + "22" : T.error + "22",
                color: config?.inject_context_summary ? T.accent : T.error,
                cursor: "pointer", fontSize: 12, fontWeight: 600
              }}>{config?.inject_context_summary ? "ENABLED" : "DISABLED"}</button>
            </div>
            <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", padding: "8px 0", borderBottom: `1px solid ${T.border}22` }}>
              <span style={{ fontSize: 13, color: T.text }}>SLM Classification</span>
              <button onClick={() => updateConfig("use_slm", !config?.use_slm)} style={{
                padding: "4px 12px", borderRadius: 6, border: `1px solid ${T.border}`,
                background: config?.use_slm ? T.accent + "22" : T.error + "22",
                color: config?.use_slm ? T.accent : T.error,
                cursor: "pointer", fontSize: 12, fontWeight: 600
              }}>{config?.use_slm ? "ENABLED" : "DISABLED"}</button>
            </div>
            <div style={statRow}>
              <span style={{ color: T.textMuted }}>Max Tools</span>
              <input type="number" value={config?.max_tools ?? 30} min={1} max={50}
                onChange={e => { const v = parseInt(e.target.value); if (v >= 1 && v <= 50) updateConfig("max_tools", v, true); }}
                style={cfgInput} />
            </div>
            <div style={statRow}>
              <span style={{ color: T.textMuted }}>Context Window</span>
              <input type="number" value={config?.context_window_size ?? 10} min={1} max={50}
                onChange={e => { const v = parseInt(e.target.value); if (v >= 1 && v <= 50) updateConfig("context_window_size", v); }}
                style={cfgInput} />
            </div>
            <div style={{ ...statRow, borderBottom: "none" }}>
              <span style={{ color: T.textMuted }}>SLM Model</span>
              {models.length > 0 ? (
                <select value={config?.slm_model || "gemma3n:latest"}
                  onChange={e => updateConfig("slm_model", e.target.value)}
                  style={{ padding: "4px 8px", borderRadius: 6, border: `1px solid ${T.border}`, background: T.bg, color: T.text, fontSize: 12, fontFamily: "monospace", cursor: "pointer", minWidth: 140 }}>
                  {models.map(m => <option key={m} value={m}>{m}</option>)}
                  {config?.slm_model && !models.includes(config.slm_model) && <option value={config.slm_model}>{config.slm_model} (not found)</option>}
                </select>
              ) : (
                <span style={{ fontSize: 12, color: T.textMuted, fontFamily: "monospace" }}>{config?.slm_model || "gemma3n:latest"}</span>
              )}
            </div>
          </div>

          {/* Live Context */}
          <div style={cardStyle}>
            <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 14 }}>
              <h3 style={{ margin: 0, color: T.accent, fontSize: 15 }}>
                Live Context {liveState?.ide_display && <span style={{ fontSize: 12, color: T.textDim, fontWeight: "normal" }}>({liveState.ide_display})</span>}
              </h3>
              <button onClick={load} title="Refresh" style={{
                padding: "2px 6px", borderRadius: 4, border: `1px solid ${T.border}`,
                background: "transparent", cursor: "pointer", display: "flex", alignItems: "center"
              }}>
                <I name="refresh" size={12} color={T.textDim} />
              </button>
            </div>
            {liveState ? (<>
              <div style={statRow}>
                <span style={{ color: T.textMuted }}>Detected Goal</span>
                <span style={{
                  color: T.text, fontFamily: "monospace", fontSize: 12,
                  ...(liveState.current_goal ? { background: T.accent + "18", padding: "2px 8px", borderRadius: 6 } : {})
                }}>{liveState.current_goal || "\u2014"}</span>
              </div>
              <div style={{ padding: "8px 0", borderBottom: `1px solid ${T.border}22` }}>
                <span style={{ color: T.textMuted, fontSize: 13 }}>Recent Files</span>
                <div style={{ display: "flex", gap: 6, flexWrap: "wrap", marginTop: 6 }}>
                  {(liveState.recent_files || []).length > 0
                    ? liveState.recent_files.map((f, i) => (
                      <span key={i} style={{
                        padding: "2px 8px", borderRadius: 6, fontSize: 11, fontFamily: "monospace",
                        background: T.blue + "18", color: T.blue, border: `1px solid ${T.blue}33`
                      }}>{f.split("/").pop().split("\\").pop()}</span>
                    ))
                    : <span style={{ color: T.textMuted, fontSize: 12 }}>None yet</span>
                  }
                </div>
              </div>
              <div style={{ padding: "8px 0", borderBottom: `1px solid ${T.border}22` }}>
                <span style={{ color: T.textMuted, fontSize: 13 }}>Recent Decisions</span>
                {(liveState.recent_decisions || []).length > 0
                  ? <ul style={{ margin: "6px 0 0", paddingLeft: 18, fontSize: 12, color: T.text }}>
                    {liveState.recent_decisions.map((d, i) => <li key={i} style={{ marginBottom: 2 }}>{d}</li>)}
                  </ul>
                  : <p style={{ color: T.textMuted, fontSize: 12, margin: "6px 0 0" }}>None yet</p>
                }
              </div>
              <div style={{ padding: "8px 0", borderBottom: `1px solid ${T.border}22` }}>
                <span style={{ color: T.textMuted, fontSize: 13 }}>Recent Tool Calls</span>
                {(liveState.recent_tools || []).length > 0
                  ? <div style={{ marginTop: 6 }}>
                    {liveState.recent_tools.map((t, i) => (
                      <div key={i} style={{ fontSize: 12, padding: "3px 0", color: T.text, fontFamily: "monospace" }}>
                        <span style={{ color: T.accent }}>{t.name}</span> <span style={{ color: T.textMuted }}>{t.summary}</span>
                      </div>
                    ))}
                  </div>
                  : <p style={{ color: T.textMuted, fontSize: 12, margin: "6px 0 0" }}>None yet</p>
                }
              </div>
              {liveState.context_line && (
                <div style={{ padding: "8px 0" }}>
                  <span style={{ color: T.textMuted, fontSize: 13 }}>Injected Context Line</span>
                  <pre style={{
                    margin: "6px 0 0", padding: 10, borderRadius: 6, fontSize: 11,
                    background: T.bg, color: T.text, fontFamily: "monospace",
                    whiteSpace: "pre-wrap", wordBreak: "break-all",
                    border: `1px solid ${T.border}33`
                  }}>{liveState.context_line}</pre>
                </div>
              )}
            </>) : (
              <p style={{ color: T.textMuted, fontSize: 13 }}>No live state yet. Start an IDE session to see proxy state.</p>
            )}
          </div>

          {/* Metrics */}
          <div style={{ display: "flex", gap: 16, flexWrap: "wrap" }}>
            <div style={cardStyle}>
              <h3 style={{ margin: "0 0 12px", color: T.accent, fontSize: 15 }}>Traffic</h3>
              {hasMetrics ? (<>
                <Stat label="Messages forwarded" value={metrics.messages_forwarded} />
                <Stat label="Tools/list filtered" value={metrics.tools_list_filtered} />
                <Stat label="Tool calls intercepted" value={metrics.tools_calls_intercepted} />
                <Stat label="Errors" value={metrics.errors} />
                <Stat label="Uptime" value={metrics.uptime_seconds ? `${metrics.uptime_seconds}s` : "\u2014"} />
              </>) : <p style={{ color: T.textMuted, fontSize: 13 }}>{metrics?.hint || "No metrics yet"}</p>}
            </div>

            <div style={cardStyle}>
              <h3 style={{ margin: "0 0 12px", color: T.accent, fontSize: 15 }}>Context Injection</h3>
              {hasMetrics ? (<>
                <Stat label="Context injections" value={metrics.context_injections} />
                <Stat label="List changed sent" value={metrics.list_changed_sent} />
                <Stat label="Total tools available" value={metrics.total_tools_available} />
                <Stat label="Active tools" value={metrics.active_tool_count} />
                <Stat label="Token savings est." value={
                  metrics.total_tools_available && metrics.active_tool_count
                    ? `~${Math.round((1 - metrics.active_tool_count / metrics.total_tools_available) * 100)}%`
                    : "\u2014"
                } />
              </>) : <p style={{ color: T.textMuted, fontSize: 13 }}>{metrics?.hint || "No metrics yet"}</p>}
            </div>
          </div>

          <div style={{ marginTop: 16, textAlign: "center" }}>
            <button onClick={() => { setLoading(true); load(); }} style={{
              padding: "8px 24px", borderRadius: 8, border: `1px solid ${T.border}`,
              background: T.surface, color: T.accent, cursor: "pointer", fontSize: 13
            }}>Refresh All</button>
          </div>
        </div>
      );
    };

    // ─── Conversations Tab ────────────────────
    const ConversationsTab = ({ persistedState = {}, onPersistState = () => { } }) => {
      const PAGE_SIZE = 200;
      const [sessions, setSessions] = useState([]);
      const [selected, setSelected] = useState(persistedState.selected || null);
      const [turns, setTurns] = useState([]);
      const [loadedCount, setLoadedCount] = useState(0);
      const [hasMore, setHasMore] = useState(false);
      const [loadingMore, setLoadingMore] = useState(false);
      const [searchQ, setSearchQ] = useState(persistedState.searchQ || '');
      const [searchResults, setSearchResults] = useState(null);
      const [searchLoading, setSearchLoading] = useState(false);
      const [syncing, setSyncing] = useState(false);
      const [syncMsg, setSyncMsg] = useState('');
      const [loading, setLoading] = useState(false);
      const [loadErr, setLoadErr] = useState('');
      const [turnErr, setTurnErr] = useState('');
      const [initialLoaded, setInitialLoaded] = useState(false);
      const [stats, setStats] = useState(null);
      const [showToc, setShowToc] = useState(persistedState.showToc ?? true);
      const [chatView, setChatView] = useState(persistedState.chatView || 'chat');  // 'chat' | 'plans' | 'todos'
      const [plans, setPlans] = useState([]);
      const [todos, setTodos] = useState([]);
      const [searchScope, setSearchScope] = useState(persistedState.searchScope || 'global'); // 'global' | 'session'
      const [editingId, setEditingId] = useState(null);
      const [editingTitle, setEditingTitle] = useState('');
      const [isNarrow, setIsNarrow] = useState(() => window.innerWidth < 1100);
      const [showSessionList, setShowSessionList] = useState(() => persistedState.showSessionList ?? true);
      const [titleOverrides, setTitleOverrides] = useState(() => {
        try { return JSON.parse(localStorage.getItem('c3_conv_titles') || '{}'); } catch { return {}; }
      });
      const threadRef = React.useRef(null);
      const searchReqRef = React.useRef(0);
      const autoSyncAttemptedRef = React.useRef(false);

      const getTitle = (s) => titleOverrides[s.session_id] || s.title || 'Untitled';
      const saveTitle = (sid, title) => {
        const next = { ...titleOverrides, [sid]: title.trim() || undefined };
        if (!title.trim()) delete next[sid];
        setTitleOverrides(next);
        localStorage.setItem('c3_conv_titles', JSON.stringify(next));
        setEditingId(null);
      };

      useEffect(() => {
        const onResize = () => setIsNarrow(window.innerWidth < 1100);
        window.addEventListener('resize', onResize);
        return () => window.removeEventListener('resize', onResize);
      }, []);

      useEffect(() => {
        if (!isNarrow) setShowSessionList(true);
        if (isNarrow) setShowToc(false);
      }, [isNarrow]);

      useEffect(() => {
        onPersistState({ selected, searchQ, searchScope, chatView, showToc, showSessionList });
      }, [selected, searchQ, searchScope, chatView, showToc, showSessionList, onPersistState]);

      const loadAll = useCallback(async (opts = {}) => {
        const background = !!opts.background;
        if (!background) setLoadErr('');
        const [sessionsRes, statsRes] = await Promise.allSettled([
          api.get('/api/conversations?limit=200'),
          api.get('/api/conversations/stats'),
        ]);

        if (sessionsRes.status === 'fulfilled') {
          const list = Array.isArray(sessionsRes.value) ? sessionsRes.value : [];
          setSessions(list);
        } else if (!background) {
          setLoadErr(`Failed to load conversations: ${sessionsRes.reason?.message || 'Unknown error'}`);
        }

        if (statsRes.status === 'fulfilled') {
          setStats(statsRes.value || null);
        } else if (!background) {
          setLoadErr(prev => prev || `Failed to load conversation stats: ${statsRes.reason?.message || 'Unknown error'}`);
        }
        if (!background) setInitialLoaded(true);
      }, []);

      useEffect(() => { loadAll(); }, [loadAll]);

      useEffect(() => {
        if (!sessions.length) {
          if (selected) {
            setSelected(null);
            setTurns([]);
            setLoadedCount(0);
            setHasMore(false);
          }
          return;
        }
        if (selected && sessions.some(s => s.session_id === selected)) return;
        setTurns([]);
        setLoadedCount(0);
        setHasMore(false);
        setSelected(sessions[0].session_id);
      }, [sessions, selected]);

      const selectSession = useCallback(async (sid, initialView = 'chat', highlightTurnId = null, opts = {}) => {
        setSelected(sid);
        setTurnErr('');
        if (!opts.keepSearch) {
          setSearchResults(null);
          setSearchQ('');
        }
        setChatView(initialView);
        setPlans([]);
        setTodos([]);
        setLoading(true);
        try {
          const sidEnc = encodeURIComponent(sid);
          const t = await api.get(`/api/conversations/${sidEnc}?offset=0&limit=${PAGE_SIZE}`);
          const rows = Array.isArray(t) ? t : [];
          setTurns(rows);
          setLoadedCount(rows.length);
          const meta = sessions.find(s => s.session_id === sid);
          const totalTurns = meta?.turns || 0;
          setHasMore(totalTurns > 0 ? rows.length < totalTurns : rows.length === PAGE_SIZE);
          if (initialView === 'todos') computeTodos(rows);
          else if (initialView === 'plans') {
            if (meta) await loadPlans(meta, rows);
            else setPlans(extractPlansFromTurns(rows));
          }
        } catch (e) {
          setTurns([]);
          setLoadedCount(0);
          setHasMore(false);
          setTurnErr(`Failed to load conversation items: ${e.message || 'Unknown error'}`);
        }
        setLoading(false);
        if (isNarrow) setShowSessionList(false);
        setTimeout(() => {
          if (threadRef.current) threadRef.current.scrollTop = 0;
          if (highlightTurnId) scrollToTurn(highlightTurnId);
        }, 80);
      }, [sessions, loadPlans, computeTodos, isNarrow]);

      useEffect(() => {
        if (!selected || sessions.length === 0 || turns.length > 0 || loading) return;
        selectSession(selected, chatView, null, { keepSearch: true });
      }, [selected, sessions, turns.length, chatView, selectSession, loading]);

      const loadMoreTurns = useCallback(async () => {
        if (!selected || loadingMore || !hasMore) return;
        setLoadingMore(true);
        try {
          const sidEnc = encodeURIComponent(selected);
          const next = await api.get(`/api/conversations/${sidEnc}?offset=${loadedCount}&limit=${PAGE_SIZE}`);
          const rows = Array.isArray(next) ? next : [];
          setTurns(prev => [...prev, ...rows]);
          const newCount = loadedCount + rows.length;
          setLoadedCount(newCount);
          const meta = sessions.find(s => s.session_id === selected);
          const totalTurns = meta?.turns || 0;
          setHasMore(totalTurns > 0 ? newCount < totalTurns : rows.length === PAGE_SIZE);
        } catch (e) {
          setTurnErr(`Failed to load more conversation items: ${e.message || 'Unknown error'}`);
        }
        setLoadingMore(false);
      }, [selected, loadingMore, hasMore, loadedCount, sessions]);

      const refreshSelectedTurns = useCallback(async () => {
        if (!selected) return;
        try {
          const limit = Math.max(PAGE_SIZE, loadedCount || 0);
          const sidEnc = encodeURIComponent(selected);
          const t = await api.get(`/api/conversations/${sidEnc}?offset=0&limit=${limit}`);
          const rows = Array.isArray(t) ? t : [];
          setTurns(rows);
          setLoadedCount(rows.length);
          const meta = sessions.find(s => s.session_id === selected);
          const totalTurns = meta?.turns || 0;
          setHasMore(totalTurns > 0 ? rows.length < totalTurns : rows.length === PAGE_SIZE);
        } catch (e) {
          // Keep existing turns if background refresh fails.
        }
      }, [selected, loadedCount, sessions]);

      useEffect(() => {
        const iv = setInterval(() => {
          loadAll({ background: true });
          refreshSelectedTurns();
        }, 15000);
        return () => clearInterval(iv);
      }, [loadAll, refreshSelectedTurns]);

      const sync = async () => {
        setSyncing(true); setSyncMsg('');
        setLoadErr('');
        try {
          const r = await api.get('/api/conversations/sync?source=all&force=1');
          if (r.error && !r.synced) {
            setSyncMsg(`[!] ${r.error}`);
          } else {
            const sourceBits = r.by_source
              ? Object.entries(r.by_source).map(([k, v]) => `${k}:${v}`).join(' | ')
              : '';
            const availabilityBits = r.available_sources
              ? ` | Sources: claude=${r.available_sources.claude ? 'yes' : 'no'}, gemini=${r.available_sources.gemini ? 'yes' : 'no'}, imports=${r.available_sources.imports ? 'yes' : 'no'}`
              : '';
            const ideBits = r.ide
              ? ` | IDE: ${r.ide.display_name || r.ide.active || r.ide.detected || 'unknown'}`
              : '';
            const warningBits = Array.isArray(r.warnings) && r.warnings.length > 0
              ? ` | Note: ${r.warnings.join(' | ')}`
              : '';
            setSyncMsg(`Synced ${r.synced} session(s), ${r.total} total${sourceBits ? ` (${sourceBits})` : ''}${ideBits}${availabilityBits}${warningBits}`);
            await loadAll();
          }
        } catch (e) {
          setSyncMsg(`[!] Sync failed: ${e.message || 'Unknown error'}`);
        }
        setSyncing(false);
        setTimeout(() => setSyncMsg(''), 5000);
      };

      useEffect(() => {
        if (autoSyncAttemptedRef.current) return;
        if (!initialLoaded) return;
        if (sessions.length > 0 || syncing) return;
        autoSyncAttemptedRef.current = true;
        sync();
      }, [initialLoaded, sessions.length, syncing]);

      useEffect(() => {
        const q = searchQ.trim();
        if (!q) {
          setSearchResults(null);
          setSearchLoading(false);
          return;
        }
        const reqId = ++searchReqRef.current;
        setSearchLoading(true);
        const timer = setTimeout(async () => {
          try {
            const sid = searchScope === 'session' && selected ? `&session_id=${encodeURIComponent(selected)}` : '';
            const r = await api.get(`/api/conversations/search?q=${encodeURIComponent(q)}&limit=40${sid}`);
            if (reqId === searchReqRef.current) setSearchResults(r);
          } catch (e) {
            if (reqId === searchReqRef.current) setSearchResults([]);
          } finally {
            if (reqId === searchReqRef.current) setSearchLoading(false);
          }
        }, 250);
        return () => clearTimeout(timer);
      }, [searchQ, searchScope, selected]);

      const scrollToTurn = (id) => {
        const el = document.getElementById(`cturn-${id}`);
        if (el) el.scrollIntoView({ behavior: 'smooth', block: 'start' });
      };

      const openSearchResult = (r) => {
        const turnId = String(r.turn_key || '').split(':').slice(1).join(':') || r.id || null;
        selectSession(r.session_id, 'chat', turnId);
      };

      function extractPlansFromTurns(turnList) {
        const items = [];
        const seen = new Set();
        const bulletRe = /^\s*[-*]\s+(.+)$/;
        const numRe = /^\s*\d+[.)]\s+(.+)$/;
        const directRe = /^\s*(?:plan|decision|next steps?)\s*[:\-]\s+(.+)$/i;
        const headingRe = /^\s*#{1,6}\s*(?:plan|next steps?|todo|implementation plan)\b/i;

        for (const t of (turnList || [])) {
          if (t.role !== 'assistant') continue;
          let inPlanSection = false;
          const lines = (t.text || '').split('\n');
          for (const raw of lines) {
            const line = raw.trim();
            if (!line) {
              inPlanSection = false;
              continue;
            }
            if (headingRe.test(line)) {
              inPlanSection = true;
              continue;
            }
            const direct = line.match(directRe);
            if (direct) {
              const text = direct[1].trim();
              const key = text.toLowerCase();
              if (text && !seen.has(key)) {
                seen.add(key);
                items.push({
                  decision: text,
                  timestamp: t.ts ? new Date(t.ts * 1000).toISOString() : '',
                  source: 'derived',
                });
              }
              continue;
            }
            if (inPlanSection) {
              const m = line.match(bulletRe) || line.match(numRe);
              if (!m) continue;
              const text = (m[1] || '').trim();
              if (!text) continue;
              const key = text.toLowerCase();
              if (!seen.has(key)) {
                seen.add(key);
                items.push({
                  decision: text,
                  timestamp: t.ts ? new Date(t.ts * 1000).toISOString() : '',
                  source: 'derived',
                });
              }
            }
          }
        }
        return items;
      }

      async function loadPlans(meta, turnList = turns) {
        const derived = extractPlansFromTurns(turnList);
        if (!meta) {
          setPlans(derived);
          return;
        }
        const since = new Date(meta.started * 1000).toISOString();
        const until = new Date((meta.ended + 1) * 1000).toISOString();
        try {
          const r = await api.get(`/api/activity?type=decision&since=${encodeURIComponent(since)}&until=${encodeURIComponent(until)}&limit=200`);
          const logged = (r || []).reverse();
          const merged = [...logged, ...derived];
          setPlans(merged);
        } catch (e) {
          setPlans(derived);
        }
      }

      function computeTodos(turnList) {
        const checkboxRe = /^\s*[-*]\s+\[([ xX])\]\s+(.+)$/;
        const todoTagRe = /^\s*(?:TODO|Todo|todo)\s*[:\-]\s+(.+)$/;
        const bulletTaskRe = /^\s*[-*]\s+(.+)$/;
        const numTaskRe = /^\s*\d+[.)]\s+(.+)$/;
        const seen = new Set();
        const items = [];
        for (const t of turnList) {
          const lines = (t.text || '').split('\n');
          for (const line of lines) {
            const m = line.match(checkboxRe);
            if (m) {
              const text = m[2].trim();
              const key = `${t.id}:${text.toLowerCase()}`;
              if (seen.has(key)) continue;
              seen.add(key);
              items.push({
                checked: m[1].toLowerCase() === 'x',
                text,
                turnId: t.id,
                role: t.role,
                ts: t.ts,
              });
              continue;
            }
            const tag = line.match(todoTagRe);
            const bullet = line.match(bulletTaskRe);
            const num = line.match(numTaskRe);
            const text = (tag?.[1] || bullet?.[1] || num?.[1] || '').trim();
            if (!text || text.length < 8) continue;
            const lowered = text.toLowerCase();
            if (lowered.startsWith('http://') || lowered.startsWith('https://')) continue;
            const key = `${t.id}:${lowered}`;
            if (seen.has(key)) continue;
            seen.add(key);
            items.push({
              checked: false,
              text,
              turnId: t.id,
              role: t.role,
              ts: t.ts,
            });
          }
        }
        setTodos(items);
      }

      const handleViewChange = useCallback(async (view) => {
        setChatView(view);
        if (view === 'plans') await loadPlans(sessions.find(s => s.session_id === selected));
        else if (view === 'todos') computeTodos(turns);
      }, [selected, sessions, turns, loadPlans, computeTodos]);

      const tocItems = turns.filter(t => t.role === 'user');
      const selectedMeta = sessions.find(s => s.session_id === selected);

      const fmtTs = (ts) => {
        if (!ts) return '';
        return new Date(ts * 1000).toLocaleString(undefined, { month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit' });
      };
      const relDate = (ts) => {
        if (!ts) return '';
        const d = Math.floor((Date.now() - ts * 1000) / 86400000);
        if (d === 0) return 'Today';
        if (d === 1) return 'Yesterday';
        if (d < 7) return `${d}d ago`;
        return new Date(ts * 1000).toLocaleDateString(undefined, { month: 'short', day: 'numeric' });
      };
      const fmtTok = (n) => n >= 1000 ? `${(n / 1000).toFixed(1)}K` : String(n);
      const sourceLabel = (raw) => {
        const s = (raw || 'manual').toLowerCase();
        const labels = {
          claude: 'Claude',
          codex: 'Codex',
          cursor: 'Cursor',
          copilot: 'Copilot',
          gemini: 'Gemini',
          imports: 'Import',
          api: 'API',
          manual: 'Manual',
        };
        return labels[s] || s.charAt(0).toUpperCase() + s.slice(1);
      };
      const sourceColor = (raw) => {
        const s = (raw || 'manual').toLowerCase();
        if (s === 'claude') return T.accent;
        if (s === 'codex') return T.blue;
        if (s === 'cursor') return T.teal || '#0d9488';
        if (s === 'copilot') return T.green || '#16a34a';
        if (s === 'gemini') return T.purple || '#9333ea';
        if (s === 'api') return T.orange || '#f59e0b';
        return T.textDim;
      };

      const showSearchResults = searchResults !== null;
      const sessionScopedSearch = searchScope === 'session' && !!selected;

      return (
        <div style={{ display: 'flex', height: '100%', overflow: 'hidden', margin: '-24px', flexDirection: isNarrow ? 'column' : 'row' }}>

          {/* ── Session list ── */}
          <div style={{
            width: isNarrow ? '100%' : 252,
            height: isNarrow ? (showSessionList ? 210 : 0) : 'auto',
            minHeight: 0,
            flexShrink: 0,
            background: T.surface,
            borderRight: isNarrow ? 'none' : `1px solid ${T.border}`,
            borderBottom: isNarrow && showSessionList ? `1px solid ${T.border}` : 'none',
            display: 'flex', flexDirection: 'column', overflow: 'hidden'
          }}>

            <div style={{ padding: '12px 12px 10px', borderBottom: `1px solid ${T.border}` }}>
              <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', marginBottom: 6 }}>
                <span style={{ fontSize: 11, fontWeight: 700, color: T.textMuted, textTransform: 'uppercase', letterSpacing: 1 }}>
                  Conversations
                </span>
                <button onClick={sync} disabled={syncing} title="Sync from available transcript/import sources"
                  style={{
                    display: 'flex', alignItems: 'center', gap: 4, padding: '3px 8px', borderRadius: 4,
                    border: `1px solid ${T.border}`, background: 'transparent', cursor: syncing ? 'default' : 'pointer',
                    opacity: syncing ? 0.6 : 1, fontSize: 10, color: T.textMuted
                  }}>
                  <I name="refresh" size={10} color={T.textMuted}
                    style={syncing ? { animation: 'spin 0.6s linear infinite' } : {}} />
                  Sync
                </button>
              </div>
              {stats && (
                <div style={{ fontSize: 10, color: T.textDim, display: 'flex', gap: 10 }}>
                  <span>{stats.sessions} sessions</span>
                  <span>{stats.turns} turns</span>
                  <span>{fmtTok(stats.user_tokens + stats.assistant_tokens)} tok</span>
                </div>
              )}
              {syncMsg && (
                <div style={{
                  fontSize: 10, marginTop: 5, padding: '3px 6px', borderRadius: 4,
                  background: syncMsg.startsWith('[!]') ? `${T.error}15` : `${T.accent}12`,
                  color: syncMsg.startsWith('[!]') ? T.error : T.accent, lineHeight: 1.4
                }}>
                  {syncMsg}
                </div>
              )}
              {loadErr && (
                <div style={{
                  fontSize: 10, marginTop: 5, padding: '3px 6px', borderRadius: 4,
                  background: `${T.error}15`, color: T.error, lineHeight: 1.4
                }}>
                  {loadErr}
                </div>
              )}
            </div>

            <div style={{ flex: 1, overflowY: 'auto' }}>
              {sessions.length === 0 ? (
                <div style={{ padding: '24px 16px', textAlign: 'center', color: T.textDim, fontSize: 12, lineHeight: 1.6 }}>
                  No conversations yet.<br />
                  Click <strong style={{ color: T.textMuted }}>Sync</strong> to load available transcript/import sources.
                </div>
              ) : sessions.map(s => {
                const active = selected === s.session_id;
                const isEditing = editingId === s.session_id;
                const title = getTitle(s);
                return (
                  <div key={s.session_id}
                    role="button"
                    tabIndex={0}
                    style={{
                      padding: '9px 12px', borderBottom: `1px solid ${T.border}50`,
                      cursor: 'pointer', transition: 'background 0.1s',
                      borderLeft: `3px solid ${active ? T.accent : 'transparent'}`,
                      background: active ? T.accentDim : 'transparent'
                    }}
                    onClick={() => { if (!isEditing) selectSession(s.session_id); }}
                    onKeyDown={(e) => {
                      if (!isEditing && (e.key === 'Enter' || e.key === ' ')) {
                        e.preventDefault();
                        selectSession(s.session_id);
                      }
                    }}
                    onMouseEnter={e => { if (!active) e.currentTarget.style.background = T.surfaceAlt; }}
                    onMouseLeave={e => { if (!active) e.currentTarget.style.background = 'transparent'; }}>

                    {/* Title row */}
                    {isEditing ? (
                      <input autoFocus value={editingTitle}
                        onChange={e => setEditingTitle(e.target.value)}
                        onKeyDown={e => { if (e.key === 'Enter') saveTitle(s.session_id, editingTitle); if (e.key === 'Escape') setEditingId(null); }}
                        onBlur={() => saveTitle(s.session_id, editingTitle)}
                        onClick={e => e.stopPropagation()}
                        style={{
                          width: '100%', fontSize: 12, padding: '2px 6px', borderRadius: 4,
                          border: `1px solid ${T.accent}`, background: T.bg, color: T.text,
                          outline: 'none', boxSizing: 'border-box', marginBottom: 4
                        }} />
                    ) : (
                      <div style={{ display: 'flex', alignItems: 'center', gap: 4, marginBottom: 3 }}>
                        <div style={{
                          fontSize: 12, fontWeight: active ? 600 : 400, color: active ? T.text : T.textMuted,
                          overflow: 'hidden', textOverflow: 'ellipsis', whiteSpace: 'nowrap', flex: 1
                        }}
                          title={title}>
                          {title}
                        </div>
                        <button onClick={e => { e.stopPropagation(); setEditingId(s.session_id); setEditingTitle(title); }}
                          title="Rename"
                          style={{
                            background: 'none', border: 'none', cursor: 'pointer', padding: '1px 3px',
                            color: T.textDim, fontSize: 10, opacity: 0.35, flexShrink: 0,
                            transition: 'opacity 0.15s'
                          }}
                          onMouseEnter={e => e.currentTarget.style.opacity = 1}
                          onMouseLeave={e => e.currentTarget.style.opacity = 0.35} onFocus={e => e.currentTarget.style.opacity = 1} onBlur={e => e.currentTarget.style.opacity = 0.35}>
                          Rename
                        </button>
                      </div>
                    )}

                    {/* Meta + quick-action row */}
                    <div style={{ display: 'flex', gap: 4, alignItems: 'center', flexWrap: 'wrap' }}>
                      <span style={{ fontSize: 10, color: T.textDim }}>{relDate(s.started)}</span>
                      <span style={{ fontSize: 10, color: T.textDim }}>|</span>
                      <span style={{ fontSize: 10, color: T.textDim }}>{s.turns} turns</span>
                      <span style={{
                        fontSize: 9, color: sourceColor(s.source), background: `${sourceColor(s.source)}18`,
                        borderRadius: 3, padding: '0 4px'
                      }}>
                        {sourceLabel(s.source)}
                      </span>
                      {s.compressed && (
                        <span style={{
                          fontSize: 9, color: T.accent, background: `${T.accent}18`,
                          borderRadius: 3, padding: '0 4px'
                        }}>gz</span>
                      )}
                      <div style={{ marginLeft: 'auto', display: 'flex', gap: 3 }}>
                        {[['Plans', 'plans', T.accent], ['Todos', 'todos', T.blue]].map(([label, view, color]) => (
                          <button key={view} onClick={e => { e.stopPropagation(); selectSession(s.session_id, view); }}
                            title={`Open ${label}`}
                            style={{
                              fontSize: 8, padding: '1px 5px', borderRadius: 3, cursor: 'pointer',
                              border: `1px solid ${color}40`, background: `${color}12`,
                              color, fontWeight: 700, letterSpacing: 0.3
                            }}>
                            {label}
                          </button>
                        ))}
                      </div>
                    </div>
                  </div>
                );
              })}
            </div>
          </div>

          {/* ── Main panel ── */}
          <div style={{ flex: 1, display: 'flex', flexDirection: 'column', overflow: 'hidden' }}>

            {/* Search bar */}
            <div style={{
              padding: '10px 16px', borderBottom: `1px solid ${T.border}`,
              display: 'flex', gap: 8, alignItems: 'center', flexShrink: 0, background: T.surface
            }}>
              <div style={{ flex: 1, position: 'relative' }}>
                <I name="search" size={13} color={T.textDim}
                  style={{ position: 'absolute', left: 9, top: '50%', transform: 'translateY(-50%)', pointerEvents: 'none' }} />
                <input value={searchQ}
                  onChange={e => setSearchQ(e.target.value)}
                  placeholder={sessionScopedSearch ? 'Search in this session...' : 'Search all conversations...'}
                  style={{
                    width: '100%', padding: '7px 10px 7px 30px', borderRadius: 6,
                    border: `1px solid ${T.border}`, background: T.bg, color: T.text,
                    fontSize: 13, outline: 'none', boxSizing: 'border-box'
                  }}
                  onFocus={e => e.target.style.borderColor = T.accent}
                  onBlur={e => e.target.style.borderColor = T.border} />
              </div>
              {isNarrow && (
                <button onClick={() => setShowSessionList(v => !v)}
                  style={{
                    padding: '5px 10px', borderRadius: 4, border: `1px solid ${T.border}`,
                    background: 'transparent', cursor: 'pointer', fontSize: 11, color: T.textMuted
                  }}>
                  {showSessionList ? 'Hide sessions' : 'Show sessions'}
                </button>
              )}
              {/* Search scope toggle */}
              <div style={{
                display: 'flex', gap: 1, background: T.surfaceAlt, borderRadius: 6, padding: 2,
                border: `1px solid ${T.border}`, flexShrink: 0
              }}>
                {[['All', 'global'], ['Session', 'session']].map(([label, scope]) => {
                  const active = searchScope === scope;
                  const disabled = scope === 'session' && !selected;
                  return (
                    <button key={scope} aria-label={`Search scope ${label}`} onClick={() => { if (!disabled) setSearchScope(scope); }}
                      style={{
                        padding: '3px 8px', borderRadius: 4, fontSize: 10, cursor: disabled ? 'default' : 'pointer',
                        border: 'none', transition: 'all 0.15s',
                        background: active ? T.accent : 'transparent',
                        color: active ? '#fff' : disabled ? T.textDim : T.textMuted,
                        fontWeight: active ? 600 : 400, opacity: disabled ? 0.45 : 1
                      }}>
                      {label}
                    </button>
                  );
                })}
              </div>
              {searchQ && (
                <button onClick={() => setSearchQ('')}
                  style={{
                    padding: '5px 10px', borderRadius: 4, border: `1px solid ${T.border}`,
                    background: 'transparent', cursor: 'pointer', fontSize: 11, color: T.textMuted
                  }}>
                  Clear
                </button>
              )}
              {selected && !showSearchResults && (
                <div style={{
                  display: 'flex', gap: 2, background: T.surfaceAlt, borderRadius: 6, padding: 2,
                  border: `1px solid ${T.border}`, flexShrink: 0
                }}>
                  {['Chat', 'Plans', 'Todos'].map(v => {
                    const vk = v.toLowerCase();
                    const active = chatView === vk;
                    return (
                      <button key={vk} onClick={() => handleViewChange(vk)}
                        style={{
                          padding: '3px 10px', borderRadius: 4, fontSize: 11, cursor: 'pointer',
                          border: 'none', transition: 'all 0.15s',
                          background: active ? T.accent : 'transparent',
                          color: active ? '#fff' : T.textMuted, fontWeight: active ? 600 : 400
                        }}>
                        {v}
                      </button>
                    );
                  })}
                </div>
              )}
              {selected && !showSearchResults && chatView === 'chat' && (
                <button onClick={() => setShowToc(t => !t)} title={showToc ? 'Hide contents' : 'Show contents'}
                  style={{
                    padding: '5px 10px', borderRadius: 4, fontSize: 11, cursor: 'pointer',
                    border: `1px solid ${showToc ? T.accent + '60' : T.border}`,
                    background: showToc ? T.accentDim : 'transparent',
                    color: showToc ? T.accent : T.textMuted
                  }}>
                  ToC
                </button>
              )}
            </div>

            {/* Content area */}
            <div style={{ flex: 1, display: 'flex', overflow: 'hidden' }}>

              {/* Search results overlay */}
              {showSearchResults ? (
                <div style={{ flex: 1, overflowY: 'auto', padding: '16px 20px' }}>
                  <div style={{ fontSize: 11, color: T.textMuted, marginBottom: 14, display: 'flex', gap: 8, alignItems: 'center' }}>
                    <span>{searchLoading ? 'Searching...' : `${searchResults.length} result${searchResults.length !== 1 ? 's' : ''}`}</span>
                    {sessionScopedSearch && <span style={{ color: T.textDim }}>in this session</span>}
                    {searchScope === 'global' && searchResults.length > 0 && (
                      <span style={{ color: T.textDim }}>
                        across {[...new Set(searchResults.map(r => r.session_id))].length} sessions
                      </span>
                    )}
                  </div>
